<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PySeekho — Master Python Interactively</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c16;--bg2:#111425;--bg3:#191d34;--card:#1a1e36;
  --border:#282d52;--accent:#7c6af7;--accent2:#5ee7b5;
  --accent3:#f7c76a;--accent4:#f76a8a;--text:#e8eaf6;
  --muted:#7a7e9e;--correct:#5ee7b5;--wrong:#f76a8a;
  --mono:'Space Mono',monospace;--sans:'Nunito',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg2);}::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px;}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(124,106,247,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(124,106,247,.03) 1px,transparent 1px);background-size:60px 60px;}
.glow-orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.08;pointer-events:none;z-index:0;animation:orbFloat 20s ease-in-out infinite alternate;}
.glow-orb.a{width:400px;height:400px;background:var(--accent);top:-100px;left:-100px;}
.glow-orb.b{width:300px;height:300px;background:var(--accent2);bottom:-50px;right:-50px;animation-delay:-10s;}
.glow-orb.c{width:250px;height:250px;background:var(--accent3);top:50%;left:50%;animation-delay:-5s;}
@keyframes orbFloat{0%{transform:translate(0,0)}50%{transform:translate(40px,30px)}100%{transform:translate(-20px,50px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes popIn{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes timerPulse{0%,100%{box-shadow:0 0 0 0 rgba(247,106,138,.4)}50%{box-shadow:0 0 0 8px rgba(247,106,138,0)}}
.fade-up{animation:fadeUp .4s ease both;}

/* NAV */
nav{background:rgba(17,20,37,.9);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:200;backdrop-filter:blur(20px);}
.logo{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--accent);letter-spacing:-1px;white-space:nowrap;}
.logo span{color:var(--accent2);}
.nav-links{display:flex;gap:2px;flex-wrap:wrap;}
.nav-btn{background:transparent;border:1px solid transparent;color:var(--muted);padding:5px 10px;border-radius:8px;cursor:pointer;font-family:var(--sans);font-size:11px;font-weight:700;transition:all .2s;white-space:nowrap;}
.nav-btn:hover{color:var(--text);background:var(--bg3);}
.nav-btn.active{background:var(--accent);color:#fff;}
.nav-hint{font-size:10px;color:var(--accent3);font-weight:700;padding:3px 8px;background:rgba(247,199,106,.1);border-radius:12px;border:1px solid rgba(247,199,106,.2);white-space:nowrap;}

/* LAYOUT */
.app{display:flex;height:calc(100vh - 52px);position:relative;z-index:1;}
.sidebar{width:190px;background:rgba(17,20,37,.6);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;backdrop-filter:blur(8px);}
.sb-section{padding:12px 12px 6px;font-size:9px;font-weight:800;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.sb-item{padding:7px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;border-radius:8px;margin:1px 5px;transition:all .15s;font-size:12px;font-weight:600;color:var(--muted);}
.sb-item:hover{background:var(--bg3);color:var(--text);}
.sb-item.active{background:rgba(124,106,247,.15);color:var(--accent);}
.sb-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sb-badge{margin-left:auto;font-size:9px;font-family:var(--mono);background:var(--bg3);padding:1px 5px;border-radius:8px;}
.sb-badge.new{background:rgba(94,231,181,.15);color:var(--accent2);}
.content{flex:1;overflow-y:auto;}
.hidden{display:none!important;}

/* CARDS & SHARED */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;}
.lh{padding:14px 22px;border-bottom:1px solid var(--border);background:rgba(17,20,37,.7);display:flex;align-items:center;gap:10px;flex-wrap:wrap;backdrop-filter:blur(8px);position:sticky;top:0;z-index:10;}
.lh-back{background:transparent;border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.lh-back:hover{border-color:var(--accent);color:var(--accent);}
.lh-title{font-size:15px;font-weight:800;}
.lh-prog{flex:1;min-width:60px;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.lh-prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .3s;}
.lh-count{font-size:11px;color:var(--muted);font-family:var(--mono);}
.btn{border:none;border-radius:9px;font-family:var(--sans);font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.btn:hover:not(:disabled){transform:translateY(-1px);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.btn-primary{background:var(--accent);color:#fff;padding:9px 20px;font-size:13px;}
.btn-primary:hover:not(:disabled){background:#6a59e0;box-shadow:0 4px 16px rgba(124,106,247,.4);}
.btn-success{background:var(--accent2);color:#0d1a12;padding:9px 20px;font-size:13px;}
.btn-success:hover:not(:disabled){box-shadow:0 4px 16px rgba(94,231,181,.3);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);padding:8px 14px;font-size:12px;}
.btn-ghost:hover{border-color:var(--muted);color:var(--text);}
.btn-danger{background:rgba(247,106,138,.15);border:1px solid rgba(247,106,138,.3);color:var(--wrong);padding:8px 14px;font-size:12px;}

/* DASHBOARD */
#view-dashboard{padding:22px;}
.dash-top{display:grid;grid-template-columns:1.3fr 1fr;gap:14px;margin-bottom:18px;}
.dash-hero{background:linear-gradient(135deg,var(--bg3),rgba(124,106,247,.08));border:1px solid var(--border);border-radius:16px;padding:26px;position:relative;overflow:hidden;}
.dash-hero::after{content:'';position:absolute;top:-30px;right:-30px;width:140px;height:140px;border-radius:50%;background:var(--accent);opacity:.05;}
.dash-hero h1{font-size:20px;font-weight:900;margin-bottom:6px;}
.dash-hero h1 span{color:var(--accent2);}
.dash-hero p{color:var(--muted);font-size:12px;line-height:1.5;margin-bottom:14px;}
.dash-hero-btns{display:flex;gap:8px;flex-wrap:wrap;}
.xp-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.xp-ring{width:100px;height:100px;position:relative;margin-bottom:10px;}
.xp-ring svg{width:100%;height:100%;transform:rotate(-90deg);}
.xp-ring circle{fill:none;stroke-width:6;stroke-linecap:round;}
.xp-ring .bg-ring{stroke:var(--bg3);}
.xp-ring .fg-ring{stroke:var(--accent);transition:stroke-dashoffset .8s ease;}
.xp-ring .fg-ring.gold{stroke:var(--accent3);}
.xp-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.xp-lvl{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--accent);}
.xp-lvl.gold{color:var(--accent3);}
.xp-label{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:1px;}
.xp-bar{width:100%;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:5px;}
.xp-bar-fill{height:100%;border-radius:3px;transition:width .5s;}
.xp-text{font-size:10px;color:var(--muted);}

.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;transition:all .2s;cursor:default;}
.stat-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.stat-icon{font-size:18px;margin-bottom:5px;}
.stat-num{font-family:var(--mono);font-size:22px;font-weight:700;margin-bottom:2px;}
.stat-label{font-size:10px;color:var(--muted);font-weight:600;}

/* Daily hint banner */
.hint-banner{background:linear-gradient(135deg,rgba(124,106,247,.08),rgba(94,231,181,.05));border:1px solid rgba(124,106,247,.2);border-radius:12px;padding:14px 18px;margin-bottom:18px;display:flex;gap:12px;align-items:flex-start;cursor:pointer;transition:all .2s;}
.hint-banner:hover{border-color:var(--accent);}
.hint-icon{font-size:22px;flex-shrink:0;}
.hint-content{flex:1;}
.hint-label{font-size:10px;font-weight:800;color:var(--accent);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
.hint-text{font-size:13px;line-height:1.5;}
.hint-code{font-family:var(--mono);font-size:11px;background:var(--bg2);padding:4px 10px;border-radius:6px;color:var(--accent3);margin-top:6px;border-left:3px solid var(--accent);display:inline-block;}

.dash-cols{display:grid;grid-template-columns:1.4fr 1fr;gap:14px;}

/* Streak Calendar */
.streak-cal{display:grid;grid-template-columns:repeat(13,1fr);gap:3px;margin-top:10px;}
.sc-day{width:100%;aspect-ratio:1;border-radius:3px;background:var(--bg3);transition:all .2s;cursor:default;}
.sc-day:hover{transform:scale(1.2);}
.sc-day.level-0{background:var(--bg3);}
.sc-day.level-1{background:rgba(94,231,181,.25);}
.sc-day.level-2{background:rgba(94,231,181,.5);}
.sc-day.level-3{background:rgba(94,231,181,.75);}
.sc-day.level-4{background:var(--accent2);}
.sc-day.today{outline:2px solid var(--accent);outline-offset:1px;}

.topic-progress-list{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
.tp-item{display:flex;align-items:center;gap:10px;}
.tp-icon{font-size:14px;width:20px;text-align:center;}
.tp-name{font-size:12px;font-weight:700;width:80px;}
.tp-bar{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.tp-fill{height:100%;border-radius:3px;transition:width .5s;}
.tp-pct{font-size:10px;color:var(--muted);font-family:var(--mono);width:30px;text-align:right;}
.tp-stars{font-size:10px;width:40px;}

/* QUIZ */
.diff-selector{display:flex;gap:6px;padding:10px 22px;background:var(--bg2);border-bottom:1px solid var(--border);}
.diff-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);padding:5px 14px;border-radius:8px;cursor:pointer;font-size:11px;font-weight:700;transition:all .2s;}
.diff-btn:hover{border-color:var(--accent);color:var(--text);}
.diff-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.q-area{padding:22px;max-width:660px;}
.q-badge{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);padding:3px 10px;border-radius:16px;font-size:10px;color:var(--muted);margin-bottom:12px;font-weight:700;}
.q-diff{font-size:9px;padding:2px 7px;border-radius:8px;font-weight:800;margin-left:6px;}
.q-diff.basic{background:rgba(94,231,181,.15);color:var(--correct);}
.q-diff.inter{background:rgba(247,199,106,.15);color:var(--accent3);}
.q-diff.adv{background:rgba(247,106,138,.15);color:var(--wrong);}
.q-text{font-size:17px;font-weight:800;line-height:1.4;margin-bottom:18px;}
.opts{display:flex;flex-direction:column;gap:7px;margin-bottom:18px;}
.opt{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:11px 15px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;text-align:left;color:var(--text);display:flex;align-items:center;gap:10px;width:100%;}
.opt:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,.06);}
.opt.correct{border-color:var(--correct);background:rgba(94,231,181,.08);color:var(--correct);}
.opt.wrong{border-color:var(--wrong);background:rgba(247,106,138,.08);color:var(--wrong);}
.opt:disabled{cursor:default;}
.opt-l{width:24px;height:24px;border-radius:6px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;flex-shrink:0;}
.opt.correct .opt-l{background:var(--correct);color:#0d1a12;}
.opt.wrong .opt-l{background:var(--wrong);color:#1a0d10;}
.expl{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 15px;margin-bottom:14px;font-size:12px;line-height:1.6;display:none;}
.expl.show{display:block;animation:fadeUp .3s ease;}
.expl-t{font-size:10px;font-weight:700;color:var(--accent2);margin-bottom:4px;letter-spacing:1px;text-transform:uppercase;}
.expl-code{font-family:var(--mono);background:var(--bg2);padding:6px 10px;border-radius:6px;font-size:11px;margin-top:6px;color:var(--accent3);border-left:3px solid var(--accent);line-height:1.6;white-space:pre;}
.q-acts{display:flex;gap:8px;align-items:center;}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:30px;text-align:center;max-width:440px;margin:28px auto;}
.result-emoji{font-size:44px;margin-bottom:10px;}
.result-score{font-family:var(--mono);font-size:42px;font-weight:700;color:var(--accent2);margin-bottom:5px;}
.result-bd{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0;}
.rb-item{background:var(--bg3);border-radius:10px;padding:12px;}
.rb-num{font-family:var(--mono);font-size:20px;font-weight:700;margin-bottom:2px;}
.rb-label{font-size:10px;color:var(--muted);}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 22px;background:rgba(17,20,37,.6);backdrop-filter:blur(8px);}
.tab{padding:9px 15px;cursor:pointer;font-size:12px;font-weight:700;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;white-space:nowrap;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-content{display:none;}.tab-content.active{display:block;}

/* ══ PYTHON RUNNER ══ */
.runner-wrap{padding:22px;display:grid;grid-template-columns:1fr 1fr;gap:16px;height:calc(100vh - 140px);}
.runner-panel{display:flex;flex-direction:column;gap:10px;}
.runner-label{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.runner-label .badge{background:var(--bg3);border:1px solid var(--border);padding:2px 8px;border-radius:8px;font-size:9px;}
.code-editor{flex:1;background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;padding:16px;font-family:var(--mono);font-size:13px;color:var(--text);resize:none;outline:none;transition:border-color .2s;line-height:1.7;min-height:200px;}
.code-editor:focus{border-color:var(--accent);}
.output-box{flex:1;background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;padding:16px;font-family:var(--mono);font-size:12px;overflow-y:auto;min-height:200px;line-height:1.7;}
.output-line{margin-bottom:2px;}
.output-line.out{color:var(--accent2);}
.output-line.err{color:var(--wrong);}
.output-line.sys{color:var(--muted);font-style:italic;}
.runner-btns{display:flex;gap:8px;align-items:center;}
.run-btn{background:linear-gradient(135deg,#22c55e,#16a34a);border:none;color:#fff;padding:9px 22px;border-radius:9px;font-family:var(--sans);font-size:13px;font-weight:800;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;}
.run-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(34,197,94,.3);}
.run-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.template-chips{display:flex;gap:6px;flex-wrap:wrap;}
.tmpl{background:var(--bg3);border:1px solid var(--border);padding:4px 10px;border-radius:12px;font-size:11px;color:var(--muted);cursor:pointer;transition:all .2s;}
.tmpl:hover{border-color:var(--accent);color:var(--accent);}
.pyodide-status{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;}
.pyodide-status .dot{width:7px;height:7px;border-radius:50%;background:var(--accent3);animation:pulse 1.5s infinite;}
.pyodide-status .dot.ready{background:var(--accent2);animation:none;}
.pyodide-status .dot.error{background:var(--wrong);animation:none;}

/* ══ CHALLENGE MODE ══ */
.challenge-wrap{padding:22px;max-width:660px;}
.timer-ring{width:90px;height:90px;position:relative;margin:0 auto 16px;}
.timer-ring svg{width:100%;height:100%;transform:rotate(-90deg);}
.timer-ring circle{fill:none;stroke-width:7;stroke-linecap:round;}
.timer-bg{stroke:var(--bg3);}
.timer-fg{stroke:var(--accent2);transition:stroke-dashoffset .1s linear;}
.timer-fg.warn{stroke:var(--accent3);}
.timer-fg.danger{stroke:var(--wrong);animation:timerPulse 1s infinite;}
.timer-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.timer-num{font-family:var(--mono);font-size:24px;font-weight:700;}
.timer-num.warn{color:var(--accent3);}
.timer-num.danger{color:var(--wrong);}
.challenge-header{text-align:center;margin-bottom:20px;}
.challenge-header h2{font-size:18px;font-weight:900;margin-bottom:4px;}
.challenge-header p{font-size:12px;color:var(--muted);}
.ch-score-bar{display:flex;gap:8px;justify-content:center;margin-bottom:16px;}
.ch-score-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.ch-score-num{font-family:var(--mono);font-size:18px;font-weight:700;}
.ch-score-label{font-size:10px;color:var(--muted);}
.challenge-selector{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:420px;margin:0 auto 24px;}
.ch-mode-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 14px;text-align:center;cursor:pointer;transition:all .2s;}
.ch-mode-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.ch-mode-card .icon{font-size:28px;margin-bottom:8px;}
.ch-mode-card h4{font-size:13px;font-weight:800;margin-bottom:3px;}
.ch-mode-card p{font-size:10px;color:var(--muted);}

/* ══ ERROR DETECTIVE ══ */
.detective-wrap{padding:22px;max-width:700px;}
.buggy-code{background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;padding:16px;font-family:var(--mono);font-size:13px;line-height:1.8;margin-bottom:14px;position:relative;}
.bug-line{color:var(--text);}
.bug-line.highlighted{background:rgba(247,106,138,.08);border-left:3px solid var(--wrong);padding-left:8px;color:var(--text);}
.bug-input{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;font-family:var(--sans);font-size:13px;color:var(--text);width:100%;outline:none;transition:border-color .2s;margin-bottom:10px;}
.bug-input:focus{border-color:var(--accent);}
.hint-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(247,199,106,.1);border:1px solid rgba(247,199,106,.2);padding:5px 12px;border-radius:16px;font-size:11px;color:var(--accent3);cursor:pointer;transition:all .2s;margin-right:6px;margin-bottom:6px;}
.hint-pill:hover{background:rgba(247,199,106,.2);}
.hint-reveal{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--muted);margin-bottom:10px;display:none;}
.hint-reveal.show{display:block;animation:fadeUp .2s ease;}
.detective-score{display:flex;gap:10px;margin-bottom:18px;}
.det-stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;flex:1;}
.det-stat-num{font-family:var(--mono);font-size:20px;font-weight:700;}
.det-stat-label{font-size:10px;color:var(--muted);}

/* ══ CHEAT SHEET ══ */
.cheat-wrap{padding:22px;}
.cheat-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.cheat-tab{background:var(--bg3);border:1px solid var(--border);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .2s;}
.cheat-tab:hover{border-color:var(--accent);color:var(--text);}
.cheat-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.cheat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.cheat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;}
.cheat-card h4{font-size:13px;font-weight:800;margin-bottom:10px;color:var(--accent2);}
.cheat-code{background:var(--bg2);border-radius:8px;padding:10px 14px;font-family:var(--mono);font-size:11px;color:var(--accent3);line-height:1.7;border-left:3px solid var(--accent);white-space:pre;overflow-x:auto;position:relative;}
.cheat-copy{position:absolute;top:6px;right:6px;background:var(--bg3);border:1px solid var(--border);color:var(--muted);padding:2px 8px;border-radius:5px;font-size:10px;cursor:pointer;font-family:var(--sans);transition:all .2s;}
.cheat-copy:hover{border-color:var(--accent);color:var(--accent);}
.cheat-desc{font-size:11px;color:var(--muted);margin-bottom:6px;line-height:1.5;}

/* ══ ANALYTICS ══ */
.analytics-wrap{padding:22px;}
.analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;}
.chart-card h3{font-size:13px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.bar-chart{display:flex;flex-direction:column;gap:8px;}
.bar-row{display:flex;align-items:center;gap:10px;}
.bar-label{font-size:11px;color:var(--muted);width:70px;text-align:right;flex-shrink:0;}
.bar-track{flex:1;height:18px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .8s ease;display:flex;align-items:center;padding-left:8px;}
.bar-val{font-size:10px;font-family:var(--mono);font-weight:700;color:rgba(255,255,255,.8);}
.donut-wrap{position:relative;width:130px;height:130px;margin:0 auto 12px;}
.donut-wrap svg{width:100%;height:100%;}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.donut-num{font-family:var(--mono);font-size:22px;font-weight:700;}
.donut-label{font-size:10px;color:var(--muted);}
.legend{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.weak-topics{display:flex;flex-direction:column;gap:8px;}
.weak-item{display:flex;align-items:center;gap:10px;background:var(--bg3);border-radius:8px;padding:10px 12px;}
.weak-icon{font-size:16px;}
.weak-info{flex:1;}
.weak-name{font-size:12px;font-weight:700;}
.weak-pct{font-size:10px;color:var(--wrong);}
.weak-suggest{font-size:10px;color:var(--accent);font-weight:700;cursor:pointer;}

/* ══ MASTERY ══ */
.mastery-wrap{padding:22px;}
.mastery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}
.mastery-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;transition:all .2s;cursor:pointer;}
.mastery-card:hover{transform:translateY(-2px);}
.mastery-card.locked{opacity:.5;}
.mastery-icon{font-size:28px;margin-bottom:8px;}
.mastery-name{font-size:14px;font-weight:800;margin-bottom:4px;}
.mastery-progress{font-size:11px;color:var(--muted);margin-bottom:10px;}
.mastery-levels{display:flex;gap:4px;}
.ml{flex:1;height:6px;border-radius:3px;background:var(--bg3);}
.ml.done{background:var(--accent2);}
.ml.partial{background:var(--accent3);}
.mastery-badge{font-size:10px;font-weight:800;padding:3px 8px;border-radius:8px;margin-top:8px;display:inline-block;}
.mb-bronze{background:rgba(205,127,50,.15);color:#cd7f32;}
.mb-silver{background:rgba(192,192,192,.15);color:#c0c0c0;}
.mb-gold{background:rgba(247,199,106,.15);color:var(--accent3);}
.mb-locked{background:var(--bg3);color:var(--muted);}

/* ASK */
#view-ask{display:flex;flex-direction:column;height:calc(100vh - 52px);}
.ask-header{padding:14px 22px;border-bottom:1px solid var(--border);background:rgba(17,20,37,.85);backdrop-filter:blur(16px);display:flex;align-items:center;gap:10px;}
.ask-ai-badge{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,rgba(124,106,247,.2),rgba(94,231,181,.1));border:1px solid rgba(124,106,247,.3);padding:3px 10px;border-radius:16px;font-size:10px;font-weight:700;color:var(--accent2);}
.ask-ai-dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:pulse 2s infinite;}
.ask-mode-tabs{display:flex;gap:4px;margin-left:auto;}
.ask-mode-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);padding:5px 11px;border-radius:8px;cursor:pointer;font-size:11px;font-weight:700;transition:all .2s;}
.ask-mode-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.ask-mode-btn:hover:not(.active){border-color:var(--accent);}
.ask-body{flex:1;overflow-y:auto;padding:18px 22px;display:flex;flex-direction:column;gap:14px;}
.ask-welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 20px;text-align:center;gap:18px;}
.ask-welcome-icon{font-size:52px;animation:orbFloat 4s ease-in-out infinite;}
.ask-welcome h2{font-size:20px;font-weight:900;}
.ask-welcome h2 span{color:var(--accent);}
.ask-welcome p{color:var(--muted);font-size:12px;max-width:400px;line-height:1.6;}
.quick-actions{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;width:100%;max-width:480px;}
.qa-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;cursor:pointer;transition:all .2s;text-align:left;}
.qa-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.qa-icon{font-size:18px;margin-bottom:5px;}
.qa-title{font-size:12px;font-weight:800;margin-bottom:2px;}
.qa-desc{font-size:10px;color:var(--muted);}
.chat-msg{display:flex;gap:10px;animation:fadeUp .3s ease;max-width:720px;}
.chat-avatar{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px;}
.chat-user .chat-avatar{background:linear-gradient(135deg,var(--accent),#5b4ac7);color:#fff;font-size:11px;font-weight:800;}
.chat-bot .chat-avatar{background:linear-gradient(135deg,#1a3d2e,var(--accent2));color:#0d1a12;font-size:16px;}
.chat-bubble{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 15px;flex:1;line-height:1.6;font-size:13px;}
.chat-user .chat-bubble{border-color:rgba(124,106,247,.3);background:rgba(124,106,247,.05);}
.chat-bot .chat-bubble{border-color:rgba(94,231,181,.12);background:rgba(94,231,181,.02);}
.chat-bubble code{font-family:var(--mono);background:var(--bg2);padding:1px 5px;border-radius:4px;font-size:11px;color:var(--accent3);}
.chat-bubble pre{background:var(--bg2);padding:10px 14px;border-radius:9px;margin:8px 0;font-family:var(--mono);font-size:11px;overflow-x:auto;border-left:3px solid var(--accent2);color:var(--accent3);line-height:1.6;position:relative;}
.chat-bubble .copy-code{position:absolute;top:6px;right:6px;background:var(--bg3);border:1px solid var(--border);color:var(--muted);padding:2px 7px;border-radius:5px;font-size:10px;cursor:pointer;font-family:var(--sans);transition:all .2s;font-weight:700;}
.chat-bubble .copy-code:hover{border-color:var(--accent);color:var(--accent);}
.chat-bubble ul,.chat-bubble ol{margin:6px 0 6px 18px;}
.chat-bubble li{margin-bottom:3px;}
.chat-bubble h3{font-size:13px;font-weight:800;margin:8px 0 5px;color:var(--accent2);}
.chat-bubble p{margin-bottom:6px;}
.chat-bubble p:last-child{margin-bottom:0;}
.chat-meta{font-size:10px;color:var(--muted);margin-top:6px;display:flex;align-items:center;gap:8px;}
.chat-meta .xp-earn{color:var(--accent3);font-weight:700;}
.typing-indicator{display:flex;gap:4px;align-items:center;padding:3px 0;}
.typing-indicator span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 1.2s infinite;}
.typing-indicator span:nth-child(2){animation-delay:.2s;background:var(--accent2);}
.typing-indicator span:nth-child(3){animation-delay:.4s;background:var(--accent3);}
.ask-footer{padding:14px 22px;border-top:1px solid var(--border);background:rgba(10,12,22,.95);backdrop-filter:blur(16px);}
.ask-suggestions{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.ask-sug{background:var(--bg3);border:1px solid var(--border);padding:3px 10px;border-radius:14px;font-size:11px;color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap;}
.ask-sug:hover{border-color:var(--accent);color:var(--accent);}
.ask-input-row{display:flex;gap:8px;align-items:flex-end;}
.ask-input-box{flex:1;background:var(--card);border:1.5px solid var(--border);border-radius:11px;padding:11px 15px;font-family:var(--sans);font-size:13px;color:var(--text);resize:none;min-height:44px;max-height:140px;outline:none;transition:border-color .2s;line-height:1.5;}
.ask-input-box:focus{border-color:var(--accent);}
.ask-input-box::placeholder{color:var(--muted);}
.ask-send{background:linear-gradient(135deg,var(--accent),#5b4ac7);border:none;color:#fff;padding:11px 18px;border-radius:10px;font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;height:44px;white-space:nowrap;}
.ask-send:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 16px rgba(124,106,247,.4);}
.ask-send:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.ask-clear{background:transparent;border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:7px;font-size:10px;cursor:pointer;font-weight:700;transition:all .2s;margin-left:4px;}
.ask-clear:hover{border-color:var(--wrong);color:var(--wrong);}
.code-review-area{flex:1;background:var(--card);border:1.5px solid var(--border);border-radius:11px;padding:11px 15px;font-family:var(--mono);font-size:12px;color:var(--text);resize:none;min-height:90px;max-height:180px;outline:none;transition:border-color .2s;line-height:1.6;}
.code-review-area:focus{border-color:var(--accent2);}
.review-send{background:linear-gradient(135deg,var(--accent2),#3bc49a);border:none;color:#0d1a12;padding:11px 16px;border-radius:10px;font-family:var(--sans);font-size:13px;font-weight:800;cursor:pointer;transition:all .2s;height:44px;}
.review-send:hover:not(:disabled){transform:translateY(-1px);}

/* PRACTICE */
.code-block{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;font-family:var(--mono);font-size:13px;line-height:1.8;margin-bottom:14px;}
.code-blank{background:transparent;border:none;border-bottom:2px solid var(--accent);color:var(--accent2);font-family:var(--mono);font-size:13px;width:110px;text-align:center;outline:none;padding:0 4px;}
.code-blank.correct{border-color:var(--correct);color:var(--correct);}
.code-blank.wrong{border-color:var(--wrong);color:var(--wrong);}

/* FLASHCARDS */
.flash-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:34px;text-align:center;cursor:pointer;min-height:170px;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:all .3s;max-width:540px;margin:14px 0;user-select:none;}
.flash-card:hover{border-color:var(--accent);}
.flash-front{font-size:17px;font-weight:800;}
.flash-back{font-size:13px;color:var(--accent2);line-height:1.7;display:none;}
.flash-hint{font-size:10px;color:var(--muted);margin-top:10px;}
.flash-card.flipped .flash-front{display:none;}
.flash-card.flipped .flash-back{display:block;}
.flash-card.flipped{background:rgba(94,231,181,.04);border-color:var(--accent2);}

/* LEADERBOARD */
.lb-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 15px;display:flex;align-items:center;gap:10px;margin-bottom:5px;transition:all .2s;}
.lb-item:hover{transform:translateX(3px);}
.lb-rank{font-family:var(--mono);font-size:13px;font-weight:700;width:28px;text-align:center;}
.lb-name{font-weight:700;flex:1;font-size:13px;}
.lb-score{font-family:var(--mono);color:var(--accent2);font-weight:700;font-size:13px;}
.lb-me{border-color:var(--accent)!important;background:rgba(124,106,247,.06)!important;}
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;}
.badge-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 6px;text-align:center;transition:all .2s;}
.badge-item:hover{transform:translateY(-2px);}
.badge-icon{font-size:26px;margin-bottom:5px;}
.badge-name{font-size:10px;font-weight:700;margin-bottom:2px;}
.badge-desc{font-size:9px;color:var(--muted);}
.badge-item.locked{opacity:.3;filter:grayscale(1);}
.roadmap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;}
.rm-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px;display:flex;gap:10px;align-items:flex-start;transition:all .2s;}
.rm-item:hover{border-color:var(--accent);transform:translateY(-1px);}
.rm-icon{font-size:20px;flex-shrink:0;}
.rm-text h4{font-size:12px;font-weight:800;margin-bottom:2px;}
.rm-text p{font-size:10px;color:var(--muted);line-height:1.4;}
.rm-status{font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;margin-top:3px;display:inline-block;}
.rm-soon{background:rgba(94,231,181,.12);color:var(--correct);}
.rm-later{background:rgba(247,199,106,.12);color:var(--accent3);}
.rm-plan{background:rgba(139,143,173,.12);color:var(--muted);}

.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 16px;font-size:12px;font-weight:700;z-index:999;transform:translateY(60px);opacity:0;transition:all .3s;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-color:var(--correct);color:var(--correct);}
.toast.error{border-color:var(--wrong);color:var(--wrong);}
.toast.info{border-color:var(--accent);color:var(--accent);}

@media(max-width:768px){
  .sidebar{display:none;}
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .dash-top,.dash-cols,.analytics-grid,.runner-wrap{grid-template-columns:1fr;}
  .challenge-selector{grid-template-columns:1fr;}
  .runner-wrap{height:auto;}
}
</style>
</head>

const TOPICS=[

async function callClaude(messages,system){
  const resp=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system,messages})
  });
  if(!resp.ok)throw new Error(`API ${resp.status}`);
  const d=await resp.json();
  return d.content.find(b=>b.type==='text')?.text||'';
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtResp(txt){
  return txt
    .replace(/```python\n?([\s\S]*?)```/g,(_,c)=>{const id='c'+Math.random().toString(36).slice(2,7);return `<pre id="${id}"><button class="copy-code" onclick="cpCode('${id}')">Copy</button>${esc(c.trim())}</pre>`;})
    .replace(/```\n?([\s\S]*?)```/g,(_,c)=>`<pre>${esc(c.trim())}</pre>`)
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/^#{1,3} (.+)$/gm,'<h3>$1</h3>')
    .replace(/^[-*] (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>\n?)+/g,m=>`<ul>${m}</ul>`)
    .replace(/\n\n+/g,'</p><p>')
    .replace(/\n/g,'<br>');
}
function cpCode(id){const el=document.getElementById(id);if(!el)return;navigator.clipboard.writeText(el.innerText.replace(/^Copy\n/,'')).then(()=>showToast('Copied!','success'));}
function nowT(){return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});}

}

function renderCalendar(){
  const cal=document.getElementById('streak-cal');if(!cal)return;
  const today=new Date();const days=[];
  for(let i=90;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);days.push(d.toDateString());}
  cal.innerHTML=days.slice(-91).map(d=>{
    const cnt=state.calData[d]||0;
    const lvl=cnt===0?0:cnt<=2?1:cnt<=5?2:cnt<=8?3:4;
    const isToday=d===today.toDateString();
    return `<div class="sc-day level-${lvl}${isToday?' today':''}" title="${d}: ${cnt} questions"></div>`;
  }).join('');
}

function addActivity(icon,text,color){
  const t=new Date();const time=t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0');
  state.activity.push({icon,text,color,time});
  if(state.activity.length>25)state.activity=state.activity.slice(-25);
  // Update calendar
  const today=new Date().toDateString();
  state.calData[today]=(state.calData[today]||0)+1;
}

print('Hello World!')">${TEMPLATES['Hello World']}</textarea>

  }

    if(e.key==='Tab'){e.preventDefault();const s=e.target;const st=s.selectionStart;s.value=s.value.substring(0,st)+'    '+s.value.substring(s.selectionEnd);s.selectionStart=s.selectionEnd=st+4;}
  });

function setTemplate(name){
  const ed=document.getElementById('code-editor');
  if(ed)ed.value=TEMPLATES[name]||'';
}

async function loadPyodide(){
  try{
    const script=document.createElement('script');
    script.src='https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js';
    script.onload=async()=>{
      try{
        pyodideInst=await window.loadPyodide();
        pyReady=true;
        const dot=document.getElementById('py-dot');
        const st=document.getElementById('py-status');
        const btn=document.getElementById('run-btn');
        const out=document.getElementById('output-box');
        if(dot)dot.classList.add('ready');
        if(st)st.textContent='Ready!';
        if(btn)btn.disabled=false;
        if(out)out.innerHTML='<div class="output-line sys">✅ Pyodide ready! Code likho aur Run karo.</div>';
      }catch(e){setRunnerError('Pyodide init failed: '+e.message);}
    };
    script.onerror=()=>setRunnerError('Pyodide load nahi hua. Internet check karo.');
    document.head.appendChild(script);
  }catch(e){setRunnerError(e.message);}
}

function setRunnerError(msg){
  const dot=document.getElementById('py-dot');
  const st=document.getElementById('py-status');
  const out=document.getElementById('output-box');
  if(dot){dot.classList.remove('ready');dot.classList.add('error');}
  if(st)st.textContent='Error!';
  if(out)out.innerHTML=`<div class="output-line err">❌ ${esc(msg)}</div><div class="output-line sys">Tip: Internet se run karo ya cdnjs.cloudflare.com allow karo.</div>`;
}

async function runCode(){
  if(!pyReady){showToast('Pyodide abhi ready nahi!','error');return;}
  const code=document.getElementById('code-editor').value;
  const out=document.getElementById('output-box');
  const btn=document.getElementById('run-btn');
  out.innerHTML='<div class="output-line sys">▶ Running...</div>';
  btn.disabled=true;btn.textContent='⏳';
  try{
    let output=[];
    pyodideInst.globals.set('print_output',output);
    await pyodideInst.runPythonAsync(`
import sys, io
_old_stdout = sys.stdout
sys.stdout = io.StringIO()
try:
    exec("""${code.replace(/\\/g,'\\\\').replace(/"/g,'\\"').replace(/\n/g,'\\n')}""")
except Exception as e:
    print(f"Error: {type(e).__name__}: {e}")
finally:
    _output = sys.stdout.getvalue()
    sys.stdout = _old_stdout
    print_output.append(_output)
`);
    const result=output[0]||'';
    if(result.trim()){
      const lines=result.split('\n');
      out.innerHTML=lines.map(l=>l.startsWith('Error:')?
        `<div class="output-line err">❌ ${esc(l)}</div>`:
        `<div class="output-line out">${esc(l)}</div>`
      ).join('');
    } else {
      out.innerHTML='<div class="output-line sys">✅ Code chala — koi output nahi.</div>';
    }
    addActivity('▶','Code run kiya','var(--accent2)');addXP(3);checkBadges();save();
  }catch(e){
    out.innerHTML=`<div class="output-line err">❌ ${esc(e.message)}</div>`;
  }
  btn.disabled=false;btn.textContent='▶ Run';
}

let quizState={questions:[],idx:0,score:0,answered:false,topic:null,diff:0};
let tfState={questions:[],idx:0,score:0};
let practiceState={idx:0};

function startTopicQuiz(tid){showView('learn');initQuiz(tid,0);}
function startDiffQuiz(d){showView('learn');initQuiz(null,d);}

function initQuiz(tid,diff){
  let qs=tid?TOPICS.find(t=>t.id===tid).qs:[...QS];
  if(diff>0)qs=qs.filter(q=>q.d===diff);
  qs=shuffle([...qs]).slice(0,Math.min(qs.length,15));
  if(!qs.length)qs=shuffle([...QS]).slice(0,10);
  quizState={questions:qs,idx:0,score:0,answered:false,topic:tid,diff};
  renderLearnView();
}

function renderLearnView(){
  const v=document.getElementById('view-learn');
  const tName=quizState.topic?TOPICS.find(t=>t.id===quizState.topic)?.name+' Quiz':'Mixed Quiz';
  v.innerHTML=`
    <div class="tabs">
      <div class="tab active" onclick="switchTab('mcq',this)">MCQ Quiz</div>
      <div class="tab" onclick="switchTab('tf',this)">True / False</div>
    </div>
    <div id="tab-mcq" class="tab-content active">
      <div class="diff-selector">
        <button class="diff-btn ${!quizState.diff?'active':''}" onclick="initQuiz(${quizState.topic?`'${quizState.topic}'`:'null'},0)">All</button>
        <button class="diff-btn ${quizState.diff===1?'active':''}" onclick="initQuiz(${quizState.topic?`'${quizState.topic}'`:'null'},1)">★ Basic</button>
        <button class="diff-btn ${quizState.diff===2?'active':''}" onclick="initQuiz(${quizState.topic?`'${quizState.topic}'`:'null'},2)">★★ Mid</button>
        <button class="diff-btn ${quizState.diff===3?'active':''}" onclick="initQuiz(${quizState.topic?`'${quizState.topic}'`:'null'},3)">★★★ Adv</button>
      </div>
      <div class="lh"><button class="lh-back" onclick="showView('dashboard')">←</button><div class="lh-title">${tName}</div><div class="lh-prog"><div class="lh-prog-fill" id="qprog" style="width:0%"></div></div><div class="lh-count" id="qcount"></div></div>
      <div class="q-area" id="mcq-area"></div>
    </div>

      <div class="q-area" id="tf-area"></div>
    </div>`;

function renderMCQ(){
  const area=document.getElementById('mcq-area');if(!area)return;
  const{questions,idx}=quizState;
  if(idx>=questions.length){showResult();return;}
  const q=questions[idx];
  const dL=['','Basic','Intermediate','Advanced'],dC=['','basic','inter','adv'];
  document.getElementById('qprog').style.width=(idx/questions.length*100)+'%';
  document.getElementById('qcount').textContent=`${idx+1}/${questions.length}`;
  area.innerHTML=`
    <div class="q-badge">${TOPICS.find(t=>t.id===q.t)?.icon||'?'} ${TOPICS.find(t=>t.id===q.t)?.name||q.t}<span class="q-diff ${dC[q.d]}">${dL[q.d]}</span></div>
    <div class="q-text">${q.q}</div>
    <div class="opts" id="opts">${q.o.map((o,i)=>`<button class="opt" onclick="selOpt(${i})"><span class="opt-l">${'ABCD'[i]}</span>${esc(o)}</button>`).join('')}</div>
    <div class="expl" id="expl"><div class="expl-t">Explanation</div><div>${q.e}</div>${q.c?`<div class="expl-code">${esc(q.c)}</div>`:''}</div>
    <div class="q-acts"><button class="btn btn-primary hidden" id="btn-next" onclick="nextQ()">Next →</button><button class="btn btn-ghost" onclick="skipQ()">Skip</button></div>`;
  quizState.answered=false;
}

function selOpt(i){
  if(quizState.answered)return;quizState.answered=true;
  const q=quizState.questions[quizState.idx];
  document.querySelectorAll('.opt').forEach((o,idx)=>{o.disabled=true;if(idx===q.a)o.classList.add('correct');else if(idx===i)o.classList.add('wrong');});
  document.getElementById('expl').classList.add('show');
  document.getElementById('btn-next').classList.remove('hidden');
  const ok=i===q.a;const xpG=q.d*5+(ok?q.d*5:0);
  if(ok){quizState.score++;state.correct++;showToast(`+${xpG} XP ✓`,'success');}
  else showToast('Wrong!','error');
  state.solved++;addXP(xpG);
  if(!state.topicScores[q.t])state.topicScores[q.t]={done:0,correct:0};
  state.topicScores[q.t].done++;if(ok)state.topicScores[q.t].correct++;
  const today=new Date().toDateString();
  if(quizState.score>=8&&state.dailyDone!==today){state.dailyDone=today;addXP(50);addActivity('🔥','Daily complete! +50 XP','var(--accent3)');}
  addActivity(ok?'✔️':'✘',(ok?'Correct: ':'Wrong: ')+q.q.substring(0,35)+'...',ok?'var(--correct)':'var(--wrong)');
  updateStreak();checkBadges();save();
}
function nextQ(){quizState.idx++;renderMCQ();}
function skipQ(){quizState.idx++;renderMCQ();}

function showResult(){
  const area=document.getElementById('mcq-area');if(!area)return;
  const{questions,score}=quizState;const pct=Math.round(score/questions.length*100);
  const xpE=questions.reduce((s,q)=>s+q.d*5,0)+score*questions.reduce((s,q)=>s+q.d,0);
  area.innerHTML=`<div class="result-card fade-up"><div class="result-emoji">${pct>=80?'🎉':pct>=50?'👍':'😅'}</div><div class="result-score">${pct}%</div><div style="font-size:13px;color:var(--muted);margin-bottom:6px">${pct>=80?'Kamaal!':pct>=50?'Acha kiya!':'Practice karo!'}</div><div style="font-size:12px;color:var(--accent3);font-weight:700;margin-bottom:16px">+${xpE} XP mila</div><div class="result-bd"><div class="rb-item"><div class="rb-num" style="color:var(--accent2)">${score}</div><div class="rb-label">Correct</div></div><div class="rb-item"><div class="rb-num" style="color:var(--accent4)">${questions.length-score}</div><div class="rb-label">Wrong</div></div></div><button class="btn btn-primary" onclick="initQuiz(quizState.topic,quizState.diff)" style="margin-right:8px">Retry</button><button class="btn btn-ghost" onclick="showView('dashboard')">Home</button></div>`;
}

function initTF(){
  const qs=shuffle(QS.map(q=>{const isT=Math.random()>.5;return{text:isT?q.q:q.o[(q.a+1)%q.o.length]+' — sahi hai?',answer:isT,exp:q.e,d:q.d};})).slice(0,10);
  tfState={questions:qs,idx:0,score:0};renderTF();
}
function renderTF(){
  const area=document.getElementById('tf-area');if(!area)return;
  const{questions,idx}=tfState;
  if(idx>=questions.length){area.innerHTML=`<div class="result-card fade-up"><div class="result-emoji">🎯</div><div class="result-score">${Math.round(tfState.score/questions.length*100)}%</div><div style="font-size:13px;color:var(--muted)">True/False Complete!</div><button class="btn btn-primary" onclick="initTF()">Phir Se</button></div>`;return;}
  area.innerHTML=`<div class="q-badge">Q${idx+1}/${questions.length}</div><div class="q-text">"${questions[idx].text}"<br><br><span style="color:var(--muted);font-size:14px">True ya False?</span></div><div style="display:flex;gap:12px;margin-bottom:16px"><button class="opt" style="flex:1;justify-content:center;font-size:15px" onclick="ansTF(true)">✅ True</button><button class="opt" style="flex:1;justify-content:center;font-size:15px" onclick="ansTF(false)">❌ False</button></div><div class="expl hidden" id="tf-expl"><div class="expl-t">Answer</div><div id="tf-et"></div></div><button class="btn btn-primary hidden" id="tf-next">Next →</button>`;
}
function ansTF(val){
  const q=tfState.questions[tfState.idx];const ok=val===q.answer;
  if(ok)tfState.score++;
  document.querySelectorAll('.opt').forEach(o=>o.disabled=true);
  document.getElementById('tf-expl').classList.remove('hidden');
  document.getElementById('tf-et').textContent=(ok?'✅ Sahi! ':'❌ Galat! ')+q.exp;
  showToast(ok?'Sahi!':'Galat!',ok?'success':'error');
  const nb=document.getElementById('tf-next');nb.classList.remove('hidden');nb.onclick=()=>{tfState.idx++;renderTF();};
  state.solved++;if(ok)state.correct++;addXP(ok?q.d*5:q.d*2);
  addActivity(ok?'✔️':'✘','T/F: '+q.text.substring(0,30)+'...',ok?'var(--correct)':'var(--wrong)');
  updateStreak();checkBadges();save();
}
function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(el)el.classList.add('active');
  if(tab==='tf')initTF();else renderMCQ();
}

function startChallenge(secs){
  const qs=shuffle([...QS]);
  challengeState={active:true,score:0,wrong:0,skipped:0,questions:qs,idx:0,timeLeft:secs,total:secs,timer:null,mode:secs};
  renderChallengeActive();
  challengeState.timer=setInterval(()=>{
    challengeState.timeLeft--;
    updateTimerUI();
    if(challengeState.timeLeft<=0)endChallenge();
  },1000);
}

function renderChallengeActive(){
  const body=document.getElementById('ch-body');if(!body)return;
  const circ=2*Math.PI*38;
  const q=challengeState.questions[challengeState.idx%challengeState.questions.length];
  body.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="ch-score-bar">
        <div class="ch-score-item"><div class="ch-score-num" style="color:var(--accent2)" id="ch-sc">0</div><div class="ch-score-label">Score</div></div>
        <div class="ch-score-item"><div class="ch-score-num" style="color:var(--correct)" id="ch-cr">0</div><div class="ch-score-label">Correct</div></div>
        <div class="ch-score-item"><div class="ch-score-num" style="color:var(--wrong)" id="ch-wr">0</div><div class="ch-score-label">Wrong</div></div>
      </div>
      <div class="timer-ring">
        <svg viewBox="0 0 90 90"><circle class="timer-bg" cx="45" cy="45" r="38"/><circle class="timer-fg" id="timer-arc" cx="45" cy="45" r="38" stroke-dasharray="${circ}" stroke-dashoffset="0"/></svg>
        <div class="timer-center"><div class="timer-num" id="timer-num">${challengeState.timeLeft}</div></div>
      </div>
    </div>
    <div id="ch-question"></div>
    <button class="btn btn-ghost" onclick="chSkip()" style="margin-top:8px;font-size:11px">Skip →</button>`;
  renderChallengeQ(q);
}

function renderChallengeQ(q){
  const area=document.getElementById('ch-question');if(!area)return;
  const dL=['','★','★★','★★★'];
  area.innerHTML=`
    <div class="q-badge">${TOPICS.find(t=>t.id===q.t)?.icon||'?'} ${TOPICS.find(t=>t.id===q.t)?.name||q.t} <span class="q-diff ${['','basic','inter','adv'][q.d]}">${dL[q.d]}</span></div>
    <div class="q-text" style="font-size:15px">${q.q}</div>
    <div class="opts" id="ch-opts">${q.o.map((o,i)=>`<button class="opt" onclick="chAnswer(${i})"><span class="opt-l">${'ABCD'[i]}</span>${esc(o)}</button>`).join('')}</div>`;
}

function chAnswer(i){
  const q=challengeState.questions[challengeState.idx%challengeState.questions.length];
  const ok=i===q.a;
  document.querySelectorAll('#ch-opts .opt').forEach((o,idx)=>{
    o.disabled=true;
    if(idx===q.a)o.classList.add('correct');
    else if(idx===i)o.classList.add('wrong');
  });
  if(ok){challengeState.score+=10+(q.d*2);state.correct++;}
  else{challengeState.score=Math.max(0,challengeState.score-3);challengeState.wrong++;}
  state.solved++;addXP(ok?q.d*3:1);
  updateChallengeScoreUI();
  setTimeout(()=>{challengeState.idx++;if(challengeState.active)renderChallengeActive();},700);
}

function chSkip(){challengeState.skipped++;challengeState.idx++;if(challengeState.active)renderChallengeActive();}

function updateTimerUI(){
  const num=document.getElementById('timer-num');
  const arc=document.getElementById('timer-arc');
  if(!num||!arc)return;
  const t=challengeState.timeLeft,total=challengeState.total;
  const circ=2*Math.PI*38;
  const pct=t/total;arc.style.strokeDashoffset=circ*(1-pct);
  num.textContent=t;
  const cls=t<=10?'danger':t<=20?'warn':'';
  num.className='timer-num '+cls;arc.className='timer-fg '+cls;
}
function updateChallengeScoreUI(){
  const sc=document.getElementById('ch-sc'),cr=document.getElementById('ch-cr'),wr=document.getElementById('ch-wr');
  if(sc)sc.textContent=challengeState.score;
  if(cr)cr.textContent=challengeState.idx-challengeState.wrong-challengeState.skipped;
  if(wr)wr.textContent=challengeState.wrong;
}

function stopChallenge(){if(challengeState.timer)clearInterval(challengeState.timer);challengeState.active=false;}

function endChallenge(){
  stopChallenge();
  const{score,wrong,skipped,idx}=challengeState;
  const correct=Math.max(0,idx-wrong-skipped);
  if(score>state.challengeHS)state.challengeHS=score;
  addXP(Math.floor(score/2));addActivity('⚡',`Challenge: ${score} pts, ${correct} correct`,'var(--accent3)');
  checkBadges();save();
  const body=document.getElementById('ch-body');if(!body)return;
  body.innerHTML=`
    <div class="result-card fade-up" style="margin-top:20px">
      <div class="result-emoji">${score>=100?'🏆':score>=50?'🎉':'💪'}</div>
      <div class="result-score">${score}</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:12px">${score>=(state.challengeHS)?'🎊 New High Score!':score>=100?'Kamaal!':score>=50?'Acha tha!':'Practice karo!'}</div>
      <div class="result-bd">
        <div class="rb-item"><div class="rb-num" style="color:var(--accent2)">${correct}</div><div class="rb-label">Correct</div></div>
        <div class="rb-item"><div class="rb-num" style="color:var(--wrong)">${wrong}</div><div class="rb-label">Wrong</div></div>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:16px">Best: <strong style="color:var(--accent3)">${state.challengeHS}</strong></div>
      <button class="btn btn-primary" onclick="startChallenge(${challengeState.mode})" style="margin-right:8px">Phir Se ⚡</button>
      <button class="btn btn-ghost" onclick="renderChallenge()">Menu</button>
    </div>`;
}

function renderDetQ(){
  const body=document.getElementById('det-body');if(!body)return;

  document.getElementById('det-prog').style.width=(detectiveState.idx/BUGS.length*100)+'%';
  document.getElementById('det-count').textContent=`${detectiveState.idx+1}/${BUGS.length}`;
  const bug=BUGS[detectiveState.idx];
  detectiveState.answered=false;
  const lines=bug.code.split('\n');
  body.innerHTML=`
    <div class="detective-score">
      <div class="det-stat"><div class="det-stat-num" style="color:var(--accent2)">${detectiveState.score}</div><div class="det-stat-label">Found</div></div>
      <div class="det-stat"><div class="det-stat-num" style="color:var(--accent3)">${detectiveState.hintsUsed}</div><div class="det-stat-label">Hints</div></div>
    </div>
    <div class="q-badge" style="margin-bottom:12px">🐛 Bug #${detectiveState.idx+1}: ${bug.title}</div>
    <div class="q-text" style="font-size:15px;margin-bottom:14px">Is code mein kya galat hai? Bug dhundho!</div>
    <div class="buggy-code">${lines.map((l,i)=>`<div class="bug-line${i===bug.bugLine?' highlighted':''}">${i===bug.bugLine?'❌ ':''}<span style="color:var(--muted);margin-right:10px;font-size:10px">${i+1}</span>${esc(l)}</div>`).join('')}</div>
    <div style="margin-bottom:10px">
      <span class="hint-pill" onclick="showHint(1)">💡 Hint 1</span>
      <span class="hint-pill" onclick="showHint(2)">💡 Hint 2</span>
      <span class="hint-pill" onclick="showHint(3)">💡 Hint 3 (Answer)</span>
    </div>
    <div class="hint-reveal" id="h1">🤔 ${bug.hint1}</div>
    <div class="hint-reveal" id="h2">🔍 ${bug.hint2}</div>
    <div class="hint-reveal" id="h3">✅ ${bug.hint3}</div>
    <input class="bug-input" id="bug-ans" placeholder="Bug describe karo ya fix likho..." />
    <div id="det-fb" style="display:none;background:var(--bg3);border-radius:10px;padding:12px;margin-bottom:10px;font-size:12px;line-height:1.5;"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-success" onclick="checkBug()">Check 🔍</button>
      <button class="btn btn-ghost" onclick="nextBug()">Skip →</button>
    </div>`;
  setTimeout(()=>{const inp=document.getElementById('bug-ans');if(inp){inp.focus();inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkBug();});}},50);
}

function showHint(n){
  document.getElementById('h'+n).classList.add('show');
  if(!detectiveState['hint'+n+'used']){detectiveState.hintsUsed++;detectiveState['hint'+n+'used']=true;}
}

function checkBug(){
  if(detectiveState.answered)return;
  const val=document.getElementById('bug-ans').value.toLowerCase().trim();
  const bug=BUGS[detectiveState.idx];
  const ok=bug.answer.some(a=>val.includes(a.toLowerCase()));
  detectiveState.answered=true;
  const fb=document.getElementById('det-fb');fb.style.display='block';
  if(ok){
    detectiveState.score++;
    fb.style.borderLeft='3px solid var(--correct)';
    fb.innerHTML=`✅ <strong>Sahi dhundha!</strong><br>${bug.bug}<br><br><strong>Fix:</strong><pre style="background:var(--bg2);padding:8px;border-radius:6px;font-family:var(--mono);font-size:11px;color:var(--accent3);margin-top:6px">${esc(bug.fix)}</pre>`;
    showToast('Bug mila! +15 XP','success');addXP(15);
    addActivity('🔍','Bug dhundha: '+bug.title,'var(--accent2)');
  } else {
    fb.style.borderLeft='3px solid var(--accent3)';
    fb.innerHTML=`⚠️ <strong>Hint dekho!</strong> Bug: ${bug.bug}`;
    showToast('Aur hints dekho!','info');
  }
  checkBadges();save();
  setTimeout(nextBug, ok?2000:3000);
}

function nextBug(){detectiveState.idx++;renderDetQ();}

function renderMastery(){
  const el=document.getElementById('view-mastery');
  el.innerHTML=`
    <div class="lh"><button class="lh-back" onclick="showView('dashboard')">←</button><div class="lh-title">🏆 Topic Mastery</div></div>
    <div class="mastery-wrap">
      <p style="color:var(--muted);font-size:12px;margin-bottom:18px">Har topic ke 3 levels complete karo — Bronze → Silver → Gold 🥇</p>
      <div class="mastery-grid">
        ${TOPICS.map(t=>{
          const scores=state.topicScores[t.id]||{done:0,correct:0};
          const basic=t.qs.filter(q=>q.d===1).length;
          const mid=t.qs.filter(q=>q.d===2).length;
          const adv=t.qs.filter(q=>q.d===3).length;
          const done=scores.done||0;
          const l1=done>=basic,l2=done>=(basic+mid),l3=done>=t.qs.length;
          const badge=l3?'mb-gold':l2?'mb-silver':l1?'mb-bronze':'mb-locked';
          const badgeText=l3?'🥇 Gold':l2?'🥈 Silver':l1?'🥉 Bronze':'🔒 Locked';
          const pct=t.qs.length?Math.round(done/t.qs.length*100):0;
          return `<div class="mastery-card ${!done?'locked':''}" onclick="startTopicQuiz('${t.id}');showView('learn')">
            <div class="mastery-icon">${t.icon}</div>
            <div class="mastery-name">${t.name}</div>
            <div class="mastery-progress">${done}/${t.qs.length} questions (${pct}%)</div>
            <div class="mastery-levels">
              <div class="ml ${l1?'done':''}" title="Level 1: Basic (${basic} questions)"></div>
              <div class="ml ${l2?'done':l1?'partial':''}" title="Level 2: Intermediate (${mid} questions)"></div>
              <div class="ml ${l3?'done':l2?'partial':''}" title="Level 3: Advanced (${adv} questions)"></div>
            </div>
            <div class="mastery-badge ${badge}">${badgeText}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

let askMode='chat',chatHistory=[],isStreaming=false;

function renderAsk(){
  const el=document.getElementById('view-ask');
  el.style.cssText='display:flex;flex-direction:column;height:calc(100vh - 52px);';
  el.innerHTML=`
    <div class="ask-header">

      <div><div style="font-size:14px;font-weight:800">🤖 Python AI Tutor</div><div style="font-size:10px;color:var(--muted)">Powered by Claude</div></div>
      <div class="ask-ai-badge"><div class="ask-ai-dot"></div>AI Online</div>
      <div class="ask-mode-tabs">
        <button class="ask-mode-btn ${askMode==='chat'?'active':''}" onclick="setAskMode('chat')">💬 Chat</button>
        <button class="ask-mode-btn ${askMode==='review'?'active':''}" onclick="setAskMode('review')">🔍 Code Review</button>
      </div>
    </div>

      ${chatHistory.length?renderChats():renderAskWelcome()}

    <div class="ask-footer">

        ${['for loop kaise likhein?','list comprehension explain karo','try-except example do','lambda function kya hai?','decorator kya hota hai?'].map(s=>`<span class="ask-sug" onclick="fillSug('${s}')">${s}</span>`).join('')}

function renderAskWelcome(){
  return `<div class="ask-welcome">
    <div class="ask-welcome-icon">🐍</div>
    <h2>Python ke <span>Saare Sawaal</span> Poochho!</h2>
    <p>Real Claude AI se Python samjho — concepts, code review, errors fix, kuch bhi!</p>
    <div class="quick-actions">
      <div class="qa-card" onclick="fillSug('for loop ka ek example do jisme list ka har element print ho')"><div class="qa-icon">🔄</div><div class="qa-title">Loops Samjhao</div><div class="qa-desc">for, while, break, continue</div></div>
      <div class="qa-card" onclick="fillSug('class aur object kya hota hai? ek example do')"><div class="qa-icon">🏗️</div><div class="qa-title">OOP Basics</div><div class="qa-desc">Class, object, methods</div></div>
      <div class="qa-card" onclick="fillSug('list comprehension kya hai?')"><div class="qa-icon">📋</div><div class="qa-title">List Comprehension</div><div class="qa-desc">One-line list magic</div></div>
      <div class="qa-card" onclick="fillSug('mera code check karo').then?()=>{}:setAskMode('review')"><div class="qa-icon">🔍</div><div class="qa-title">Code Review</div><div class="qa-desc">Apna code paste karo</div></div>
    </div>
  </div>`;
}

function renderChats(){
  return chatHistory.map(msg=>`
    <div class="chat-msg chat-${msg.role==='user'?'user':'bot'}">
      <div class="chat-avatar">${msg.role==='user'?'U':'🤖'}</div>
      <div class="chat-bubble">
        ${msg.role==='user'?`<p>${esc(msg.content)}</p>`:fmtResp(msg.content)}
        <div class="chat-meta"><span>${msg.time}</span>${msg.role==='assistant'?'<span class="xp-earn">+5 XP</span>':''}</div>
      </div>
    </div>`).join('');
}

function renderChatInput(){
  return `<div class="ask-input-row">
    <textarea class="ask-input-box" id="ask-inp" placeholder="Python ke baare mein kuch bhi poochho... (Enter = Send)" rows="1"></textarea>
    <button class="ask-send" id="ask-btn" onclick="sendChat()">Send ↑</button>
    <button class="ask-clear" onclick="chatHistory=[];renderAsk()">Clear</button>
  </div>`;
}

function renderReviewInput(){
  return `<div class="ask-input-row">
    <textarea class="code-review-area" id="review-inp" placeholder="Apna Python code paste karo...&#10;&#10;def my_func(x)&#10;    return x * 2"></textarea>
    <div style="display:flex;flex-direction:column;gap:6px">
      <button class="review-send" id="review-btn" onclick="submitReview()">Review 🔍</button>
      <button class="ask-clear" onclick="chatHistory=[];renderAsk()">Clear</button>
    </div>
  </div>`;
}

function setAskMode(m){askMode=m;renderAsk();setTimeout(setupAskEvents,100);}

function setupAskEvents(){
  const inp=document.getElementById('ask-inp');
  if(inp){
    inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}});
    inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,140)+'px';});
  }
}

function fillSug(t){
  if(askMode==='review'){const el=document.getElementById('review-inp');if(el){el.value=t;el.focus();}return;}
  const el=document.getElementById('ask-inp');if(el){el.value=t;el.focus();el.dispatchEvent(new Event('input'));}
}

function addChatMsg(role,content){
  chatHistory.push({role,content,time:nowT()});
}

function appendTyping(){
  const body=document.getElementById('ask-body');if(!body)return;
  if(chatHistory.length===1){body.innerHTML=renderChats();}
  const ph=document.createElement('div');ph.className='chat-msg chat-bot';ph.id='typing-ph';
  ph.innerHTML=`<div class="chat-avatar">🤖</div><div class="chat-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
  body.appendChild(ph);body.scrollTop=body.scrollHeight;
}

async function sendChat(){
  const inp=document.getElementById('ask-inp');
  if(!inp||isStreaming)return;
  const text=inp.value.trim();if(!text)return;
  inp.value='';inp.style.height='auto';
  document.getElementById('ask-btn').disabled=true;
  isStreaming=true;
  addChatMsg('user',text);
  appendTyping();
  try{
    const msgs=chatHistory.slice(-12).map(m=>({role:m.role,content:m.content}));
    const resp=await callClaude(msgs,PY_SYSTEM);
    addChatMsg('assistant',resp);
    state.askCount++;addXP(5);checkBadges();
    addActivity('🤖','AI se poochha: '+text.substring(0,30)+'...','var(--accent)');save();
  }catch(e){
    addChatMsg('assistant',`❌ **Error aaya!**\n${e.message}\n\nKripya thodi der mein try karo.`);
  }
  isStreaming=false;
  document.getElementById('ask-btn').disabled=false;
  const body=document.getElementById('ask-body');
  if(body){body.innerHTML=renderChats();body.scrollTop=body.scrollHeight;}
  setupAskEvents();
}

async function submitReview(){
  const inp=document.getElementById('review-inp');
  if(!inp||isStreaming)return;
  const code=inp.value.trim();if(!code){showToast('Pehle code paste karo!','error');return;}
  document.getElementById('review-btn').disabled=true;
  isStreaming=true;
  const userMsg=`Please review this Python code:\n\`\`\`python\n${code}\n\`\`\``;
  addChatMsg('user',userMsg);
  inp.value='';
  askMode='chat';renderAsk();
  appendTyping();
  try{
    const resp=await callClaude([{role:'user',content:userMsg}],REVIEW_SYSTEM);
    addChatMsg('assistant',resp);
    state.askCount++;addXP(8);checkBadges();
    addActivity('🔍','Code review karwaya','var(--accent2)');save();
  }catch(e){
    addChatMsg('assistant',`❌ Review nahi ho paya. Error: ${e.message}`);
  }
  isStreaming=false;
  const body=document.getElementById('ask-body');
  if(body){body.innerHTML=renderChats();body.scrollTop=body.scrollHeight;}
  setupAskEvents();
}

      addActivity('🏆','Badge mila: '+b.n,'var(--accent3)');

  });

function updateStreak(){
  const today=new Date().toDateString();
  if(state.lastDate!==today){
    const yest=new Date(Date.now()-86400000).toDateString();
    state.streak=(state.lastDate===yest)?state.streak+1:1;
    state.lastDate=today;
  }
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+type;clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);}
