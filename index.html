<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PySeekho — Master Python</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070912;--bg2:#0d1022;--bg3:#141829;--card:#181e35;
  --border:#222a48;--accent:#6c63ff;--a2:#00f5c8;--a3:#ffd166;
  --a4:#ff6b9d;--a5:#74b9ff;--text:#e8ecff;--muted:#6b7399;
  --ok:#00f5c8;--err:#ff6b9d;
  --mono:'JetBrains Mono',monospace;--head:'Syne',sans-serif;--body:'Inter',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{font-size:14px;}
body{font-family:var(--body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:4px;}

/* BACKGROUND */
.bg-noise{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(108,99,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(108,99,255,.04) 1px,transparent 1px);background-size:48px 48px;}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;}
.orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(108,99,255,.12),transparent);top:-100px;left:-100px;animation:drift 25s ease-in-out infinite alternate;}
.orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(0,245,200,.08),transparent);bottom:-80px;right:-80px;animation:drift 20s ease-in-out infinite alternate-reverse;}
@keyframes drift{0%{transform:translate(0,0)}100%{transform:translate(60px,40px)}}

/* NAV */
nav{background:rgba(7,9,18,.92);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:12px;height:54px;position:sticky;top:0;z-index:200;backdrop-filter:blur(24px);}
.logo{font-family:var(--head);font-size:18px;font-weight:800;color:#fff;letter-spacing:-1px;display:flex;align-items:center;gap:6px;flex-shrink:0;}
.logo-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),var(--a2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.logo span{color:var(--a2);}
.nav-scroll{display:flex;gap:2px;overflow-x:auto;flex:1;-ms-overflow-style:none;scrollbar-width:none;}
.nav-scroll::-webkit-scrollbar{display:none;}
.nb{background:transparent;border:none;color:var(--muted);padding:6px 12px;border-radius:8px;cursor:pointer;font-family:var(--body);font-size:12px;font-weight:600;transition:all .18s;white-space:nowrap;display:flex;align-items:center;gap:5px;}
.nb:hover{color:var(--text);background:rgba(255,255,255,.05);}
.nb.active{background:rgba(108,99,255,.15);color:var(--accent);border:1px solid rgba(108,99,255,.2);}
.nav-level{background:linear-gradient(135deg,var(--accent),var(--a2));padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;color:#fff;font-family:var(--mono);flex-shrink:0;}

/* LAYOUT */
.app{display:flex;height:calc(100vh - 54px);position:relative;z-index:1;}
.sidebar{width:192px;background:rgba(13,16,34,.7);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;backdrop-filter:blur(8px);}
.sb-sec{padding:14px 12px 5px;font-size:9px;font-weight:700;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;}
.sbi{padding:7px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;border-radius:8px;margin:1px 5px;transition:all .15s;font-size:12px;font-weight:500;color:var(--muted);}
.sbi:hover{background:rgba(255,255,255,.04);color:var(--text);}
.sbi.active{background:rgba(108,99,255,.12);color:var(--accent);}
.sbi-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sbi-badge{margin-left:auto;font-size:9px;font-family:var(--mono);background:var(--bg3);padding:1px 6px;border-radius:8px;color:var(--muted);}
.sbi-badge.new{background:rgba(0,245,200,.12);color:var(--a2);}
.content{flex:1;overflow-y:auto;}
.hidden{display:none!important;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes timerPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,107,157,.4)}50%{box-shadow:0 0 0 10px rgba(255,107,157,0)}}
.fu{animation:fadeUp .35s ease both;}

/* SHARED COMPONENTS */
.lh{padding:14px 20px;border-bottom:1px solid var(--border);background:rgba(7,9,18,.85);display:flex;align-items:center;gap:10px;flex-wrap:wrap;backdrop-filter:blur(16px);position:sticky;top:0;z-index:10;}
.lh-back{background:transparent;border:1px solid var(--border);color:var(--muted);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.lh-back:hover{border-color:var(--accent);color:var(--accent);}
.lh-title{font-family:var(--head);font-size:15px;font-weight:700;}
.lh-prog{flex:1;min-width:60px;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.lh-pf{height:100%;background:linear-gradient(90deg,var(--accent),var(--a2));border-radius:2px;transition:width .4s;}
.lh-ct{font-size:11px;color:var(--muted);font-family:var(--mono);}
.btn{border:none;border-radius:9px;font-family:var(--body);font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;font-size:13px;}
.btn:hover:not(:disabled){transform:translateY(-1px);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-p{background:var(--accent);color:#fff;padding:9px 20px;}
.btn-p:hover:not(:disabled){background:#7a72ff;box-shadow:0 4px 20px rgba(108,99,255,.35);}
.btn-s{background:var(--a2);color:#021a14;padding:9px 20px;font-weight:700;}
.btn-s:hover:not(:disabled){box-shadow:0 4px 20px rgba(0,245,200,.25);}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--muted);padding:8px 14px;}
.btn-g:hover{border-color:var(--muted);color:var(--text);}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 16px;font-size:12px;font-weight:600;z-index:999;transform:translateY(60px);opacity:0;transition:all .3s;display:flex;align-items:center;gap:8px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-color:var(--ok);color:var(--ok);}
.toast.error{border-color:var(--err);color:var(--err);}
.toast.info{border-color:var(--accent);color:var(--accent);}

/* ═══ DASHBOARD ═══ */
#view-dashboard{padding:20px;}
.hero{background:linear-gradient(135deg,rgba(108,99,255,.08),rgba(0,245,200,.04));border:1px solid rgba(108,99,255,.15);border-radius:18px;padding:28px;margin-bottom:16px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(108,99,255,.08),transparent);border-radius:50%;}
.hero h1{font-family:var(--head);font-size:22px;font-weight:800;margin-bottom:6px;line-height:1.2;}
.hero h1 em{font-style:normal;color:var(--a2);}
.hero p{color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:16px;max-width:500px;}
.hero-btns{display:flex;gap:8px;flex-wrap:wrap;}
.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 12px;transition:border-color .2s;cursor:default;}
.stat:hover{border-color:rgba(108,99,255,.3);}
.stat-icon{font-size:20px;margin-bottom:6px;}
.stat-n{font-family:var(--mono);font-size:22px;font-weight:700;margin-bottom:2px;}
.stat-l{font-size:11px;color:var(--muted);}
.dash-cols{display:grid;grid-template-columns:1.5fr 1fr;gap:14px;}

/* XP Ring */
.xp-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;display:flex;flex-direction:column;align-items:center;text-align:center;}
.xp-ring{width:96px;height:96px;position:relative;margin-bottom:10px;}
.xp-ring svg{width:100%;height:100%;transform:rotate(-90deg);}
.xp-ring circle{fill:none;stroke-width:6;stroke-linecap:round;}
.xp-bg{stroke:var(--bg3);}
.xp-fg{stroke:var(--accent);transition:stroke-dashoffset .8s ease;}
.xp-fg.gold{stroke:var(--a3);}
.xp-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
.xp-lvl{font-family:var(--mono);font-size:24px;font-weight:700;color:var(--accent);}
.xp-sub{font-size:9px;color:var(--muted);letter-spacing:1px;font-weight:600;}
.xp-bar{width:100%;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-bottom:4px;}
.xp-bf{height:100%;border-radius:2px;transition:width .6s;}
.xp-txt{font-size:10px;color:var(--muted);}

/* Streak calendar */
.cal{display:grid;grid-template-columns:repeat(13,1fr);gap:3px;margin-top:10px;}
.cd{width:100%;aspect-ratio:1;border-radius:3px;cursor:default;transition:transform .15s;}
.cd:hover{transform:scale(1.3);}
.cd.l0{background:var(--bg3);}
.cd.l1{background:rgba(0,245,200,.2);}
.cd.l2{background:rgba(0,245,200,.45);}
.cd.l3{background:rgba(0,245,200,.7);}
.cd.l4{background:var(--a2);}
.cd.today{outline:2px solid var(--accent);outline-offset:1px;}

/* Topic bars */
.tp-list{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
.tp-row{display:flex;align-items:center;gap:8px;}
.tp-ic{font-size:13px;width:18px;text-align:center;}
.tp-nm{font-size:11px;font-weight:600;width:76px;color:var(--muted);}
.tp-track{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.tp-fill{height:100%;border-radius:3px;transition:width .6s;}
.tp-pct{font-size:9px;color:var(--muted);font-family:var(--mono);width:28px;text-align:right;}

/* Tip Banner */
.tip-banner{background:linear-gradient(135deg,rgba(108,99,255,.07),rgba(0,245,200,.04));border:1px solid rgba(108,99,255,.18);border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;gap:12px;align-items:flex-start;cursor:pointer;transition:border-color .2s;}
.tip-banner:hover{border-color:rgba(108,99,255,.4);}
.tip-code{font-family:var(--mono);font-size:11px;background:var(--bg2);padding:5px 10px;border-radius:6px;color:var(--a3);margin-top:6px;border-left:3px solid var(--accent);display:inline-block;}

/* ═══ QUIZ ═══ */
.diff-bar{display:flex;gap:6px;padding:10px 20px;background:var(--bg2);border-bottom:1px solid var(--border);}
.db{background:var(--bg3);border:1px solid var(--border);color:var(--muted);padding:5px 14px;border-radius:8px;cursor:pointer;font-size:11px;font-weight:600;transition:all .2s;}
.db:hover{border-color:var(--accent);color:var(--text);}
.db.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.q-area{padding:20px;max-width:680px;}
.q-badge{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);padding:3px 10px;border-radius:16px;font-size:10px;color:var(--muted);margin-bottom:12px;font-weight:600;}
.diff-tag{font-size:9px;padding:2px 7px;border-radius:8px;font-weight:700;margin-left:4px;}
.diff-tag.b{background:rgba(0,245,200,.12);color:var(--ok);}
.diff-tag.m{background:rgba(255,209,102,.12);color:var(--a3);}
.diff-tag.a{background:rgba(255,107,157,.12);color:var(--err);}
.q-text{font-family:var(--head);font-size:17px;font-weight:700;line-height:1.4;margin-bottom:18px;}
.opts{display:flex;flex-direction:column;gap:7px;margin-bottom:16px;}
.opt{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;cursor:pointer;font-size:13px;font-weight:500;transition:all .2s;text-align:left;color:var(--text);display:flex;align-items:center;gap:10px;width:100%;}
.opt:hover:not(:disabled){border-color:var(--accent);background:rgba(108,99,255,.06);}
.opt.correct{border-color:var(--ok);background:rgba(0,245,200,.06);color:var(--ok);}
.opt.wrong{border-color:var(--err);background:rgba(255,107,157,.06);color:var(--err);}
.opt:disabled{cursor:default;}
.opt-l{width:24px;height:24px;border-radius:6px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;flex-shrink:0;font-weight:700;}
.opt.correct .opt-l{background:var(--ok);color:#021a14;}
.opt.wrong .opt-l{background:var(--err);color:#1a0510;}
.expl{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:12px;font-size:12px;line-height:1.6;display:none;}
.expl.show{display:block;animation:fadeUp .25s ease;}
.expl-t{font-size:9px;font-weight:700;color:var(--a2);margin-bottom:5px;letter-spacing:1.5px;text-transform:uppercase;}
.expl-code{font-family:var(--mono);background:var(--bg2);padding:8px 12px;border-radius:7px;font-size:11px;margin-top:8px;color:var(--a3);border-left:3px solid var(--accent);line-height:1.7;white-space:pre;}
.q-acts{display:flex;gap:8px;align-items:center;}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:32px;text-align:center;max-width:440px;margin:28px auto;animation:popIn .35s ease;}
.result-score{font-family:var(--mono);font-size:48px;font-weight:700;color:var(--a2);margin-bottom:6px;}
.result-bd{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0;}
.rb{background:var(--bg3);border-radius:10px;padding:14px;}
.rb-n{font-family:var(--mono);font-size:22px;font-weight:700;margin-bottom:2px;}
.rb-l{font-size:10px;color:var(--muted);}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 20px;background:rgba(7,9,18,.7);backdrop-filter:blur(8px);}
.tab{padding:10px 14px;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;white-space:nowrap;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-content{display:none;}.tab-content.active{display:block;}

/* ═══ PYTHON RUNNER ═══ */
.runner-wrap{padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:16px;height:calc(100vh - 140px);min-height:400px;}
.runner-panel{display:flex;flex-direction:column;gap:8px;}
.panel-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:8px;}
.panel-label .badge{background:var(--bg3);border:1px solid var(--border);padding:2px 7px;border-radius:6px;font-size:9px;color:var(--muted);}
.code-editor{flex:1;background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;padding:16px;font-family:var(--mono);font-size:12.5px;color:var(--text);resize:none;outline:none;transition:border-color .2s;line-height:1.75;min-height:200px;tab-size:4;}
.code-editor:focus{border-color:var(--accent);}
.output-box{flex:1;background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;padding:16px;font-family:var(--mono);font-size:12px;overflow-y:auto;min-height:200px;line-height:1.75;}
.o-out{color:var(--a2);}
.o-err{color:var(--err);}
.o-sys{color:var(--muted);font-style:italic;}
.runner-btns{display:flex;gap:8px;align-items:center;}
.run-btn{background:linear-gradient(135deg,#16c97e,#0da066);border:none;color:#fff;padding:9px 22px;border-radius:9px;font-family:var(--body);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;}
.run-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(22,201,126,.25);}
.run-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.tmpl-chips{display:flex;gap:5px;flex-wrap:wrap;}
.tmpl{background:var(--bg3);border:1px solid var(--border);padding:4px 10px;border-radius:12px;font-size:11px;color:var(--muted);cursor:pointer;transition:all .2s;}
.tmpl:hover{border-color:var(--accent);color:var(--accent);}
.py-status{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;}
.py-dot{width:7px;height:7px;border-radius:50%;background:var(--a3);animation:pulse 1.5s infinite;}
.py-dot.ready{background:var(--a2);animation:none;}
.py-dot.error{background:var(--err);animation:none;}

/* ═══ CHALLENGE ═══ */
.challenge-wrap{padding:20px;max-width:680px;}
.timer-ring{width:88px;height:88px;position:relative;margin:0 auto 16px;}
.timer-ring svg{width:100%;height:100%;transform:rotate(-90deg);}
.timer-ring circle{fill:none;stroke-width:7;stroke-linecap:round;}
.t-bg{stroke:var(--bg3);}
.t-fg{stroke:var(--a2);transition:stroke-dashoffset .1s linear;}
.t-fg.warn{stroke:var(--a3);}
.t-fg.danger{stroke:var(--err);animation:timerPulse 1s infinite;}
.t-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.t-num{font-family:var(--mono);font-size:22px;font-weight:700;}
.t-num.warn{color:var(--a3);}
.t-num.danger{color:var(--err);}
.ch-header{text-align:center;margin-bottom:20px;}
.ch-header h2{font-family:var(--head);font-size:20px;font-weight:800;margin-bottom:4px;}
.ch-scores{display:flex;gap:8px;justify-content:center;margin-bottom:16px;}
.ch-sc-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 18px;text-align:center;}
.ch-sc-n{font-family:var(--mono);font-size:20px;font-weight:700;}
.ch-sc-l{font-size:10px;color:var(--muted);}
.ch-modes{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:420px;margin:0 auto 24px;}
.ch-mode{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 14px;text-align:center;cursor:pointer;transition:all .2s;}
.ch-mode:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 24px rgba(108,99,255,.12);}
.ch-mode .icon{font-size:28px;margin-bottom:8px;}
.ch-mode h4{font-family:var(--head);font-size:13px;font-weight:700;margin-bottom:3px;}
.ch-mode p{font-size:10px;color:var(--muted);}

/* ═══ BUG DETECTIVE ═══ */
.detective-wrap{padding:20px;max-width:720px;}
.buggy-code{background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;padding:16px;font-family:var(--mono);font-size:13px;line-height:1.8;margin-bottom:14px;}
.bug-line{color:var(--text);}
.bug-line.hl{background:rgba(255,107,157,.07);border-left:3px solid var(--err);padding-left:8px;}
.bug-input{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-family:var(--body);font-size:13px;color:var(--text);width:100%;outline:none;transition:border-color .2s;margin-bottom:10px;}
.bug-input:focus{border-color:var(--accent);}
.hint-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(255,209,102,.08);border:1px solid rgba(255,209,102,.18);padding:5px 12px;border-radius:16px;font-size:11px;color:var(--a3);cursor:pointer;transition:all .2s;margin-right:6px;margin-bottom:6px;}
.hint-pill:hover{background:rgba(255,209,102,.15);}
.hint-reveal{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--muted);margin-bottom:10px;display:none;}
.hint-reveal.show{display:block;animation:fadeUp .2s ease;}
.det-stats{display:flex;gap:10px;margin-bottom:18px;}
.det-stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;flex:1;}
.det-sn{font-family:var(--mono);font-size:20px;font-weight:700;}
.det-sl{font-size:10px;color:var(--muted);}

/* ═══ CHEAT SHEET ═══ */
.cheat-wrap{padding:20px;}
.cheat-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.ct{background:var(--bg3);border:1px solid var(--border);padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s;}
.ct:hover{border-color:var(--accent);color:var(--text);}
.ct.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.cheat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.cheat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;transition:border-color .2s;}
.cheat-card:hover{border-color:rgba(108,99,255,.3);}
.cheat-card h4{font-family:var(--head);font-size:13px;font-weight:700;margin-bottom:8px;color:var(--a2);}
.cheat-desc{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.5;}
.cheat-code{background:var(--bg2);border-radius:8px;padding:10px 14px;font-family:var(--mono);font-size:11px;color:var(--a3);line-height:1.7;border-left:3px solid var(--accent);white-space:pre;overflow-x:auto;position:relative;}
.cheat-copy{position:absolute;top:6px;right:6px;background:var(--bg3);border:1px solid var(--border);color:var(--muted);padding:2px 7px;border-radius:5px;font-size:10px;cursor:pointer;font-family:var(--body);transition:all .2s;}
.cheat-copy:hover{border-color:var(--accent);color:var(--accent);}

/* ═══ ANALYTICS ═══ */
.analytics-wrap{padding:20px;}
.analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;}
.chart-card h3{font-family:var(--head);font-size:13px;font-weight:700;margin-bottom:14px;}
.bar-chart{display:flex;flex-direction:column;gap:8px;}
.bar-row{display:flex;align-items:center;gap:10px;}
.bar-lbl{font-size:11px;color:var(--muted);width:80px;text-align:right;flex-shrink:0;}
.bar-track{flex:1;height:18px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .8s ease;display:flex;align-items:center;padding-left:8px;}
.bar-val{font-size:10px;font-family:var(--mono);font-weight:700;color:rgba(255,255,255,.8);}
.donut-wrap{position:relative;width:130px;height:130px;margin:0 auto 12px;}
.donut-wrap svg{width:100%;height:100%;}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.donut-n{font-family:var(--mono);font-size:22px;font-weight:700;}
.donut-l{font-size:10px;color:var(--muted);}
.legend{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.weak-list{display:flex;flex-direction:column;gap:8px;}
.weak-item{display:flex;align-items:center;gap:10px;background:var(--bg3);border-radius:8px;padding:10px 12px;}
.weak-ic{font-size:16px;}
.weak-info{flex:1;}
.weak-nm{font-size:12px;font-weight:600;}
.weak-pct{font-size:10px;color:var(--err);}
.weak-go{font-size:10px;color:var(--accent);font-weight:700;cursor:pointer;}

/* ═══ MASTERY ═══ */
.mastery-wrap{padding:20px;}
.mastery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.mastery-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;transition:all .2s;cursor:pointer;}
.mastery-card:hover{transform:translateY(-2px);border-color:rgba(108,99,255,.3);box-shadow:0 6px 24px rgba(108,99,255,.1);}
.mastery-card.locked{opacity:.45;}
.mastery-icon{font-size:26px;margin-bottom:8px;}
.mastery-name{font-family:var(--head);font-size:14px;font-weight:700;margin-bottom:4px;}
.mastery-prog{font-size:11px;color:var(--muted);margin-bottom:10px;}
.mastery-lvls{display:flex;gap:4px;}
.ml{flex:1;height:5px;border-radius:3px;background:var(--bg3);}
.ml.done{background:var(--a2);}
.ml.partial{background:var(--a3);}
.mbadge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px;margin-top:8px;display:inline-block;}
.mb-bronze{background:rgba(205,127,50,.15);color:#cd7f32;}
.mb-silver{background:rgba(192,192,192,.12);color:#c0c0c0;}
.mb-gold{background:rgba(255,209,102,.12);color:var(--a3);}
.mb-locked{background:var(--bg3);color:var(--muted);}

/* ═══ AI TUTOR ═══ */
#view-ask{display:flex;flex-direction:column;height:calc(100vh - 54px);}
.ask-hd{padding:14px 20px;border-bottom:1px solid var(--border);background:rgba(7,9,18,.9);backdrop-filter:blur(16px);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.ai-badge{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,rgba(108,99,255,.15),rgba(0,245,200,.08));border:1px solid rgba(108,99,255,.25);padding:4px 10px;border-radius:16px;font-size:10px;font-weight:700;color:var(--a2);}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--a2);}
.ask-body{flex:1;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:14px;}
.ask-welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;gap:16px;}
.aw-icon{font-size:52px;}
.aw h2{font-family:var(--head);font-size:22px;font-weight:800;}
.aw h2 span{color:var(--accent);}
.aw p{color:var(--muted);font-size:13px;max-width:440px;line-height:1.6;}
.quick-acts{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;width:100%;max-width:500px;}
.qa{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px;cursor:pointer;transition:all .2s;text-align:left;}
.qa:hover{border-color:rgba(108,99,255,.35);transform:translateY(-2px);box-shadow:0 4px 16px rgba(108,99,255,.1);}
.qa-icon{font-size:18px;margin-bottom:5px;}
.qa-title{font-size:12px;font-weight:700;margin-bottom:2px;}
.qa-desc{font-size:10px;color:var(--muted);}
.chat-msg{display:flex;gap:10px;animation:fadeUp .3s ease;max-width:740px;}
.chat-av{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:2px;}
.cu .chat-av{background:linear-gradient(135deg,var(--accent),#5049cc);color:#fff;font-size:11px;font-weight:700;}
.cb .chat-av{background:linear-gradient(135deg,#0f2e22,var(--a2));color:#021a14;}
.chat-bubble{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 15px;flex:1;line-height:1.65;font-size:13px;}
.cu .chat-bubble{border-color:rgba(108,99,255,.25);background:rgba(108,99,255,.05);}
.cb .chat-bubble{border-color:rgba(0,245,200,.1);}
.chat-bubble code{font-family:var(--mono);background:var(--bg2);padding:1px 5px;border-radius:4px;font-size:11px;color:var(--a3);}
.chat-bubble pre{background:var(--bg2);padding:10px 14px;border-radius:9px;margin:8px 0;font-family:var(--mono);font-size:11px;overflow-x:auto;border-left:3px solid var(--a2);color:var(--a3);line-height:1.65;position:relative;}
.chat-bubble .cp{position:absolute;top:6px;right:6px;background:var(--bg3);border:1px solid var(--border);color:var(--muted);padding:2px 7px;border-radius:5px;font-size:10px;cursor:pointer;font-family:var(--body);transition:all .2s;}
.chat-bubble .cp:hover{border-color:var(--accent);color:var(--accent);}
.chat-bubble ul,.chat-bubble ol{margin:6px 0 6px 18px;}
.chat-bubble li{margin-bottom:3px;}
.chat-bubble h3{font-size:13px;font-weight:700;margin:8px 0 5px;color:var(--a2);font-family:var(--head);}
.chat-bubble p{margin-bottom:6px;}
.chat-bubble p:last-child{margin-bottom:0;}
.chat-meta{font-size:10px;color:var(--muted);margin-top:6px;display:flex;align-items:center;gap:8px;}
.xp-earn{color:var(--a3);font-weight:700;}
.typing{display:flex;gap:4px;align-items:center;padding:2px 0;}
.typing span{width:6px;height:6px;border-radius:50%;animation:pulse 1.2s infinite;}
.typing span:nth-child(1){background:var(--accent);}
.typing span:nth-child(2){background:var(--a2);animation-delay:.2s;}
.typing span:nth-child(3){background:var(--a3);animation-delay:.4s;}
.ask-footer{padding:12px 20px;border-top:1px solid var(--border);background:rgba(7,9,18,.95);backdrop-filter:blur(16px);}
.ask-sugs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.ask-sug{background:var(--bg3);border:1px solid var(--border);padding:3px 10px;border-radius:14px;font-size:11px;color:var(--muted);cursor:pointer;transition:all .2s;}
.ask-sug:hover{border-color:var(--accent);color:var(--accent);}
.ask-row{display:flex;gap:8px;align-items:flex-end;}
.ask-inp{flex:1;background:var(--card);border:1.5px solid var(--border);border-radius:11px;padding:11px 14px;font-family:var(--body);font-size:13px;color:var(--text);resize:none;min-height:44px;max-height:140px;outline:none;transition:border-color .2s;line-height:1.5;}
.ask-inp:focus{border-color:var(--accent);}
.ask-inp::placeholder{color:var(--muted);}
.ask-send{background:linear-gradient(135deg,var(--accent),#5049cc);border:none;color:#fff;padding:11px 18px;border-radius:10px;font-family:var(--body);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;height:44px;}
.ask-send:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 18px rgba(108,99,255,.35);}
.ask-send:disabled{opacity:.45;cursor:not-allowed;transform:none;}
.ask-clear{background:transparent;border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:7px;font-size:10px;cursor:pointer;font-weight:600;transition:all .2s;}
.ask-clear:hover{border-color:var(--err);color:var(--err);}
.code-review-area{flex:1;background:var(--card);border:1.5px solid var(--border);border-radius:11px;padding:11px 14px;font-family:var(--mono);font-size:12px;color:var(--text);resize:none;min-height:90px;max-height:180px;outline:none;transition:border-color .2s;line-height:1.65;}
.code-review-area:focus{border-color:var(--a2);}
.review-send{background:linear-gradient(135deg,var(--a2),#0db087);border:none;color:#021a14;padding:11px 16px;border-radius:10px;font-family:var(--body);font-size:13px;font-weight:800;cursor:pointer;transition:all .2s;height:44px;}
.review-send:hover:not(:disabled){transform:translateY(-1px);}

/* AI Info panel */
.ai-info{background:linear-gradient(135deg,rgba(108,99,255,.07),rgba(0,245,200,.04));border:1px solid rgba(108,99,255,.2);border-radius:14px;padding:20px;margin:20px;max-width:640px;}
.ai-info h3{font-family:var(--head);font-size:15px;font-weight:700;margin-bottom:8px;color:var(--a2);}
.ai-info p{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:12px;}
.ai-topics{display:flex;flex-wrap:wrap;gap:6px;}
.ai-topic{background:var(--bg3);border:1px solid var(--border);padding:5px 12px;border-radius:20px;font-size:11px;color:var(--muted);}

/* PRACTICE */
.code-block{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;font-family:var(--mono);font-size:13px;line-height:1.8;margin-bottom:14px;}
.code-blank{background:transparent;border:none;border-bottom:2px solid var(--accent);color:var(--a2);font-family:var(--mono);font-size:13px;width:120px;text-align:center;outline:none;padding:0 4px;}
.code-blank.correct{border-color:var(--ok);color:var(--ok);}
.code-blank.wrong{border-color:var(--err);color:var(--err);}

/* FLASHCARDS */
.flash-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:36px;text-align:center;cursor:pointer;min-height:170px;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:all .3s;max-width:560px;margin:14px 0;user-select:none;}
.flash-card:hover{border-color:rgba(108,99,255,.35);}
.flash-front{font-family:var(--head);font-size:17px;font-weight:700;}
.flash-back{font-size:13px;color:var(--a2);line-height:1.7;display:none;}
.flash-hint{font-size:10px;color:var(--muted);margin-top:10px;}
.flash-card.flipped .flash-front{display:none;}
.flash-card.flipped .flash-back{display:block;}
.flash-card.flipped{background:rgba(0,245,200,.03);border-color:rgba(0,245,200,.2);}

/* LEADERBOARD */
.lb-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 15px;display:flex;align-items:center;gap:10px;margin-bottom:5px;transition:all .2s;}
.lb-item:hover{transform:translateX(4px);}
.lb-rank{font-family:var(--mono);font-size:13px;font-weight:700;width:28px;text-align:center;}
.lb-name{font-weight:600;flex:1;font-size:13px;}
.lb-score{font-family:var(--mono);color:var(--a2);font-weight:700;font-size:13px;}
.lb-me{border-color:var(--accent)!important;background:rgba(108,99,255,.06)!important;}
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;}
.badge-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 6px;text-align:center;transition:all .2s;}
.badge-item:hover{transform:translateY(-2px);}
.badge-icon{font-size:26px;margin-bottom:5px;}
.badge-name{font-size:10px;font-weight:700;margin-bottom:2px;}
.badge-desc{font-size:9px;color:var(--muted);}
.badge-item.locked{opacity:.3;filter:grayscale(1);}

@media(max-width:768px){
  .sidebar{display:none;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .dash-cols,.analytics-grid,.runner-wrap{grid-template-columns:1fr;}
  .runner-wrap{height:auto;}
  .ch-modes{grid-template-columns:1fr;}
}
</style>

<script>
// ═══════════════════════════════════
// DATA
// ═══════════════════════════════════
const TOPICS=[
  {id:'basics',name:'Basics',icon:'⚡',color:'#6c63ff',qs:[]},
  {id:'strings',name:'Strings',icon:'📝',color:'#ffd166',qs:[]},

];

const QS=[
  {t:'basics',d:1,q:"What kind of language is Python?",o:["Compiled","Interpreted","Machine Level","Assembly"],a:1,e:"Python is interpreted — it runs line by line.",c:"python script.py  # runs directly"},
  {t:'basics',d:1,q:"Which data type stores whole numbers?",o:["str","bool","int","char"],a:2,e:"int stores integers like 10, -5, 0.",c:"age = 25\ntype(age)  # <class 'int'>"},
  {t:'basics',d:1,q:"How do you write a comment?",o:["// comment","/* comment */","# comment","-- comment"],a:2,e:"# is used for single-line comments in Python.",c:"# This is a comment\nprint('hi')  # inline"},
  {t:'basics',d:1,q:"What does print('2' + '3') output?",o:["5","23","Error","None"],a:1,e:"Both are strings, + concatenates them.",c:"print('2'+'3')  # '23'"},
  {t:'basics',d:1,q:"What does type(3.14) return?",o:["int","str","float","number"],a:2,e:"3.14 has a decimal point, so it's a float.",c:"type(3.14)  # <class 'float'>"},
  {t:'basics',d:2,q:"What does bool('') return?",o:["True","False","Error","None"],a:1,e:"Empty string is falsy, bool('') = False.",c:"bool('')   # False\nbool('hi') # True"},
  {t:'basics',d:2,q:"What is 10 % 3?",o:["3","1","0.33","7"],a:1,e:"% is the modulo operator — gives the remainder.",c:"10 % 3  # 1"},
  {t:'basics',d:3,q:"What is 2 ** 10?",o:["20","100","1024","512"],a:2,e:"** is the exponentiation operator. 2^10 = 1024.",c:"2 ** 10  # 1024"},
  {t:'basics',d:3,q:"What is (True and False) or True?",o:["True","False","None","Error"],a:0,e:"and evaluates first: False, then False or True = True.",c:"(True and False) or True  # True"},
  {t:'basics',d:3,q:"Is 0.1 + 0.2 == 0.3 True or False?",o:["True","False","Error","None"],a:1,e:"Floating point precision: 0.1+0.2 = 0.30000000000000004",c:"0.1 + 0.2 == 0.3  # False!"},
  {t:'strings',d:1,q:"What does 'hello'[1] return?",o:["h","e","l","o"],a:1,e:"Indexing starts at 0. Index 1 = 'e'.",c:"'hello'[1]  # 'e'"},
  {t:'strings',d:1,q:"What does 'Python'[-1] return?",o:["P","y","n","o"],a:2,e:"-1 refers to the last character.",c:"'Python'[-1]  # 'n'"},
  {t:'strings',d:2,q:"What does 'a,b,c'.split(',') return?",o:["'a b c'","['a','b','c']","('a','b','c')","Error"],a:1,e:".split() divides a string into a list.",c:"'a,b,c'.split(',')  # ['a','b','c']"},
  {t:'strings',d:2,q:"What does '  hello  '.strip() return?",o:["'  hello  '","'hello'","'hello  '","Error"],a:1,e:".strip() removes whitespace from both ends.",c:"'  hello  '.strip()  # 'hello'"},
  {t:'strings',d:3,q:"What does '-'.join(['a','b','c']) return?",o:["a-b-c","['a-b-c']","-a-b-c-","abc"],a:0,e:".join() inserts the separator between elements.",c:"'-'.join(['a','b','c'])  # 'a-b-c'"},
  {t:'strings',d:3,q:"What does 'hello'[1:4:2] return?",o:["el","helo","eo","he"],a:0,e:"[start:stop:step] — picks index 1, then 3: e, l",c:"'hello'[1:4:2]  # 'el'"},
  {t:'lists',d:1,q:"After append('mango'), what is ['apple','banana']?",o:["['apple','banana']","['mango','apple','banana']","['apple','banana','mango']","Error"],a:2,e:".append() adds the item to the end.",c:"fruits.append('mango')"},

  }
  if (msg.includes('tuple')) {
    return "**Tuples in Python**\n\nTuples are like lists but **immutable** (cannot be changed after creation).\n\n```python\n# Create a tuple\npoint = (3, 4)\ncoords = (10, 20, 30)\nsingleton = (1,)  # note the comma!\n\n# Access (same as list)\npoint[0]   # 3\npoint[-1]  # 4\n\n# Unpack\nx, y = point\nprint(x, y)  # 3 4\n\n# Cannot modify!\npoint[0] = 5  # TypeError! Tuples are immutable\n\n# Good for:\n# - Coordinates, RGB colors\n# - Returning multiple values from functions\n# - Dictionary keys (lists can't be keys!)\n\ndef get_range(nums):\n    return min(nums), max(nums)  # returns a tuple\n```";
  }
  if (msg.includes('set')) {
    return "**Sets in Python**\n\nSets store **unique** values with no order.\n\n```python\n# Create\nfruits = {'apple', 'banana', 'mango'}\nnums = set([1, 2, 2, 3, 3])  # {1, 2, 3}\n\n# Add / Remove\nfruits.add('grape')\nfruits.remove('banana')  # KeyError if not found\nfruits.discard('kiwi')   # safe, no error\n\n# Set operations\na = {1, 2, 3, 4}\nb = {3, 4, 5, 6}\n\na | b  # union: {1,2,3,4,5,6}\na & b  # intersection: {3,4}\na - b  # difference: {1,2}\n\n# Check membership (very fast!)\n'apple' in fruits  # True\n\n# Remove duplicates from a list\nunique = list(set([1,2,2,3,3]))\n```";
  }
  if (msg.includes('import') || msg.includes('module')) {
    return "**Modules and Imports in Python**\n\nModules let you reuse code across files.\n\n```python\n# Import whole module\nimport math\nmath.sqrt(16)   # 4.0\nmath.pi         # 3.14159...\n\n# Import specific functions\nfrom math import sqrt, pi\nsqrt(25)  # 5.0\n\n# Import with alias\nimport numpy as np\nimport pandas as pd\n\n# Useful built-in modules\nimport os          # file system\nimport sys         # system info\nimport datetime    # dates & times\nimport random      # random numbers\nimport json        # JSON parsing\nimport re          # regex\nimport collections # extra data structures\n\n# Example: random\nimport random\nrandom.randint(1, 10)     # random int\nrandom.choice(['a','b'])  # random element\nrandom.shuffle(my_list)   # shuffle in place\n```";
  }
  if (msg.includes('scope') || msg.includes('global') || msg.includes('local')) {
    return "**Variable Scope in Python**\n\nScope determines where a variable can be accessed.\n\n```python\n# Global scope\nx = 10\n\ndef func():\n    # Local scope\n    y = 20\n    print(x)  # can read global\n    print(y)  # local variable\n\n# global keyword\ncount = 0\n\ndef increment():\n    global count  # modify global\n    count += 1\n\nincrement()\nprint(count)  # 1\n```\n\n**LEGB Rule** (Python's lookup order):\n1. **L**ocal — inside current function\n2. **E**nclosing — outer function (closures)\n3. **G**lobal — module level\n4. **B**uilt-in — Python built-ins (print, len...)";
  }

}

function renderCalendar(){
  const cal=document.getElementById('streak-cal');if(!cal)return;
  const today=new Date();const days=[];
  for(let i=90;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);days.push(d.toDateString());}
  cal.innerHTML=days.slice(-91).map(d=>{
    const cnt=state.calData[d]||0;
    const lvl=cnt===0?0:cnt<=2?1:cnt<=5?2:cnt<=8?3:4;
    const isToday=d===today.toDateString();
    return `<div class="cd l${lvl}${isToday?' today':''}" title="${cnt} questions"></div>`;
  }).join('');
}

function addActivity(icon,text,color){
  const t=new Date();const time=t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0');
  state.activity.push({icon,text,color,time});
  if(state.activity.length>30)state.activity=state.activity.slice(-30);
  state.calData[new Date().toDateString()]=(state.calData[new Date().toDateString()]||0)+1;
}

        const btn=document.getElementById('run-btn');if(btn)btn.disabled=false;
        const out=document.getElementById('output-box');if(out)out.innerHTML='<div class="o-sys">✅ Pyodide ready! Start coding.</div>';
      }catch(e){setRunnerErr('Init failed: '+e.message);}
    };
    script.onerror=()=>setRunnerErr('Pyodide failed to load. Check your internet.');
    document.head.appendChild(script);
  }catch(e){setRunnerErr(e.message);}
}
function setRunnerErr(msg){
  const dot=document.getElementById('py-dot');if(dot){dot.className='py-dot error';}
  const st=document.getElementById('py-status');if(st)st.textContent='Error';
  const out=document.getElementById('output-box');if(out)out.innerHTML=`<div class="o-err">❌ ${esc(msg)}</div><div class="o-sys">Try: allow cdn.jsdelivr.net in your browser.</div>`;
}
async function runCode(){
  if(!pyReady){showToast('Pyodide not ready yet!','error');return;}
  const code=document.getElementById('code-editor').value;
  const out=document.getElementById('output-box');const btn=document.getElementById('run-btn');
  out.innerHTML='<div class="o-sys">▶ Running...</div>';btn.disabled=true;btn.textContent='⏳';
  try{
    const output=[];pyodideInst.globals.set('print_output',output);
    await pyodideInst.runPythonAsync(`
import sys, io
_old=sys.stdout;sys.stdout=io.StringIO()
try:
    exec("""${code.replace(/\\/g,'\\\\').replace(/"/g,'\\"').replace(/\n/g,'\\n')}""")
except Exception as e:
    print(f"Error: {type(e).__name__}: {e}")
finally:
    _o=sys.stdout.getvalue();sys.stdout=_old;print_output.append(_o)
`);
    const result=output[0]||'';
    if(result.trim()){
      out.innerHTML=result.split('\n').map(l=>l.startsWith('Error:')?`<div class="o-err">❌ ${esc(l)}</div>`:`<div class="o-out">${esc(l)}</div>`).join('');
    }else{out.innerHTML='<div class="o-sys">✅ Code ran — no output.</div>';}
    state.ranCode=true;addActivity('▶','Ran code in Python Runner','var(--a2)');addXP(3);checkBadges();save();
  }catch(e){out.innerHTML=`<div class="o-err">❌ ${esc(e.message)}</div>`;}
  btn.disabled=false;btn.textContent='▶ Run';
}

function startTopicQuiz(tid){showView('learn');initQuiz(tid,0);}
function startDiffQuiz(d){showView('learn');initQuiz(null,d);}

function initQuiz(tid,diff){
  let qs=tid?TOPICS.find(t=>t.id===tid).qs:[...QS];
  if(diff>0)qs=qs.filter(q=>q.d===diff);
  qs=shuffle([...qs]).slice(0,Math.min(qs.length,15));
  if(!qs.length)qs=shuffle([...QS]).slice(0,10);
  quizState={questions:qs,idx:0,score:0,answered:false,topic:tid,diff};
  renderLearnView();
}

function renderLearnView(){
  const v=document.getElementById('view-learn');
  const tName=quizState.topic?TOPICS.find(t=>t.id===quizState.topic)?.name+' Quiz':'Mixed Quiz';
  v.innerHTML=`
    <div class="tabs">
      <div class="tab active" onclick="switchTab('mcq',this)">Multiple Choice</div>
      <div class="tab" onclick="switchTab('tf',this)">True / False</div>
    </div>
    <div id="tab-mcq" class="tab-content active">
      <div class="diff-bar">
        <button class="db ${!quizState.diff?'active':''}" onclick="initQuiz(${quizState.topic?`'${quizState.topic}'`:'null'},0)">All</button>
        <button class="db ${quizState.diff===1?'active':''}" onclick="initQuiz(${quizState.topic?`'${quizState.topic}'`:'null'},1)">★ Basic</button>
        <button class="db ${quizState.diff===2?'active':''}" onclick="initQuiz(${quizState.topic?`'${quizState.topic}'`:'null'},2)">★★ Mid</button>
        <button class="db ${quizState.diff===3?'active':''}" onclick="initQuiz(${quizState.topic?`'${quizState.topic}'`:'null'},3)">★★★ Advanced</button>
      </div>
      <div class="lh"><button class="lh-back" onclick="showView('dashboard')">←</button><div class="lh-title">${tName}</div><div class="lh-prog"><div class="lh-pf" id="qprog" style="width:0%"></div></div><div class="lh-ct" id="qcount"></div></div>
      <div class="q-area" id="mcq-area"></div>
    </div>
    <div id="tab-tf" class="tab-content">
      <div class="lh"><button class="lh-back" onclick="showView('dashboard')">←</button><div class="lh-title">True or False?</div></div>
      <div class="q-area" id="tf-area"></div>
    </div>`;
  renderMCQ();
}

function renderMCQ(){
  const area=document.getElementById('mcq-area');if(!area)return;
  const{questions,idx}=quizState;
  if(idx>=questions.length){showResult();return;}
  const q=questions[idx];
  const dMap=['','Basic','Intermediate','Advanced'],dClass=['','b','m','a'];
  document.getElementById('qprog').style.width=(idx/questions.length*100)+'%';
  document.getElementById('qcount').textContent=`${idx+1}/${questions.length}`;
  area.innerHTML=`
    <div class="q-badge">${TOPICS.find(t=>t.id===q.t)?.icon||'?'} ${TOPICS.find(t=>t.id===q.t)?.name||q.t}<span class="diff-tag ${dClass[q.d]}">${dMap[q.d]}</span></div>
    <div class="q-text">${q.q}</div>
    <div class="opts">${q.o.map((o,i)=>`<button class="opt" onclick="selOpt(${i})"><span class="opt-l">${'ABCD'[i]}</span>${esc(o)}</button>`).join('')}</div>
    <div class="expl" id="expl"><div class="expl-t">Explanation</div><div>${q.e}</div>${q.c?`<div class="expl-code">${esc(q.c)}</div>`:''}</div>
    <div class="q-acts"><button class="btn btn-p hidden" id="btn-next" onclick="nextQ()">Next →</button><button class="btn btn-g" onclick="skipQ()">Skip</button></div>`;
  quizState.answered=false;
}

function selOpt(i){
  if(quizState.answered)return;quizState.answered=true;
  const q=quizState.questions[quizState.idx];
  document.querySelectorAll('.opt').forEach((o,idx)=>{o.disabled=true;if(idx===q.a)o.classList.add('correct');else if(idx===i)o.classList.add('wrong');});
  document.getElementById('expl').classList.add('show');
  document.getElementById('btn-next').classList.remove('hidden');
  const ok=i===q.a,xpG=q.d*5+(ok?q.d*5:0);
  if(ok){quizState.score++;state.correct++;showToast(`+${xpG} XP ✓`,'success');}else showToast('Incorrect!','error');
  state.solved++;addXP(xpG);
  if(!state.topicScores[q.t])state.topicScores[q.t]={done:0,correct:0};
  state.topicScores[q.t].done++;if(ok)state.topicScores[q.t].correct++;
  const today=new Date().toDateString();
  if(quizState.score>=8&&state.dailyDone!==today){state.dailyDone=today;addXP(50);addActivity('🔥','Daily challenge complete! +50 XP','var(--a3)');}
  addActivity(ok?'✔️':'✘',(ok?'Correct: ':'Wrong: ')+q.q.substring(0,36)+'...',ok?'var(--ok)':'var(--err)');
  updateStreak();checkBadges();save();
}
function nextQ(){quizState.idx++;renderMCQ();}
function skipQ(){quizState.idx++;renderMCQ();}

function showResult(){
  const area=document.getElementById('mcq-area');if(!area)return;
  const{questions,score}=quizState;const pct=Math.round(score/questions.length*100);
  const xpE=score*15+questions.reduce((s,q)=>s+q.d*3,0);
  area.innerHTML=`<div class="result-card"><div style="font-size:44px;margin-bottom:8px">${pct>=80?'🎉':pct>=50?'👍':'😅'}</div><div class="result-score">${pct}%</div><div style="font-size:13px;color:var(--muted);margin-bottom:6px">${pct>=80?'Excellent!':pct>=50?'Good job!':'Keep practicing!'}</div><div style="font-size:12px;color:var(--a3);font-weight:700;margin-bottom:16px">+${xpE} XP earned</div><div class="result-bd"><div class="rb"><div class="rb-n" style="color:var(--a2)">${score}</div><div class="rb-l">Correct</div></div><div class="rb"><div class="rb-n" style="color:var(--err)">${questions.length-score}</div><div class="rb-l">Wrong</div></div></div><button class="btn btn-p" onclick="initQuiz(quizState.topic,quizState.diff)" style="margin-right:8px">Retry</button><button class="btn btn-g" onclick="showView('dashboard')">Home</button></div>`;
}

let tfState={questions:[],idx:0,score:0};
function initTF(){
  const qs=shuffle(QS.map(q=>{const isT=Math.random()>.5;return{text:isT?q.q:q.o[(q.a+1)%q.o.length]+' — this is correct?',answer:isT,exp:q.e,d:q.d};})).slice(0,10);
  tfState={questions:qs,idx:0,score:0};renderTF();
}
function renderTF(){
  const area=document.getElementById('tf-area');if(!area)return;
  const{questions,idx}=tfState;
  if(idx>=questions.length){area.innerHTML=`<div class="result-card"><div style="font-size:44px;margin-bottom:8px">🎯</div><div class="result-score">${Math.round(tfState.score/questions.length*100)}%</div><div style="font-size:13px;color:var(--muted)">True/False Complete!</div><div style="margin-top:16px"><button class="btn btn-p" onclick="initTF()">Play Again</button></div></div>`;return;}
  area.innerHTML=`<div class="q-badge">Q${idx+1}/${questions.length}</div><div class="q-text" style="font-size:16px">"${questions[idx].text}"<br><br><span style="color:var(--muted);font-size:14px;font-weight:400">True or False?</span></div><div style="display:flex;gap:12px;margin-bottom:16px"><button class="opt" style="flex:1;justify-content:center;font-size:16px" onclick="ansTF(true)">✅ True</button><button class="opt" style="flex:1;justify-content:center;font-size:16px" onclick="ansTF(false)">❌ False</button></div><div class="expl hidden" id="tf-expl"><div class="expl-t">Answer</div><div id="tf-et"></div></div><button class="btn btn-p hidden" id="tf-next">Next →</button>`;
}
function ansTF(val){
  const q=tfState.questions[tfState.idx];const ok=val===q.answer;
  if(ok)tfState.score++;
  document.querySelectorAll('.opt').forEach(o=>o.disabled=true);
  document.getElementById('tf-expl').classList.remove('hidden');
  document.getElementById('tf-et').textContent=(ok?'✅ Correct! ':'❌ Wrong! ')+q.exp;
  showToast(ok?'Correct!':'Wrong!',ok?'success':'error');
  const nb=document.getElementById('tf-next');nb.classList.remove('hidden');nb.onclick=()=>{tfState.idx++;renderTF();};
  state.solved++;if(ok)state.correct++;addXP(ok?q.d*5:q.d*2);updateStreak();checkBadges();
  addActivity(ok?'✔️':'✘','T/F: '+q.text.substring(0,30)+'...',ok?'var(--ok)':'var(--err)');save();
}
function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(el)el.classList.add('active');
  if(tab==='tf')initTF();else renderMCQ();
}

        <div class="ch-mode" onclick="startChallenge(120)"><div class="icon">💪</div><h4>2 Minutes</h4><p>Max questions!</p></div>
      </div>

        <p style="font-size:11px;color:var(--muted)">Correct = +10 pts | Wrong = -3 pts</p>
      </div>
    </div>`;

function startChallenge(secs){
  const qs=shuffle([...QS]);
  challengeState={active:true,score:0,wrong:0,skipped:0,questions:qs,idx:0,timeLeft:secs,total:secs,timer:null,mode:secs};
  renderChActive();
  challengeState.timer=setInterval(()=>{challengeState.timeLeft--;updateTimerUI();if(challengeState.timeLeft<=0)endChallenge();},1000);
}

function renderChActive(){
  const body=document.getElementById('ch-body');if(!body)return;
  const circ=2*Math.PI*38;
  const q=challengeState.questions[challengeState.idx%challengeState.questions.length];
  body.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="ch-scores">
        <div class="ch-sc-item"><div class="ch-sc-n" style="color:var(--a2)" id="ch-sc">0</div><div class="ch-sc-l">Score</div></div>
        <div class="ch-sc-item"><div class="ch-sc-n" style="color:var(--ok)" id="ch-cr">0</div><div class="ch-sc-l">Correct</div></div>
        <div class="ch-sc-item"><div class="ch-sc-n" style="color:var(--err)" id="ch-wr">0</div><div class="ch-sc-l">Wrong</div></div>
      </div>
      <div class="timer-ring">
        <svg viewBox="0 0 90 90"><circle class="t-bg" cx="45" cy="45" r="38"/><circle class="t-fg" id="t-arc" cx="45" cy="45" r="38" stroke-dasharray="${circ}" stroke-dashoffset="0"/></svg>
        <div class="t-center"><div class="t-num" id="t-num">${challengeState.timeLeft}</div></div>
      </div>
    </div>
    <div id="ch-question"></div>
    <button class="btn btn-g" onclick="chSkip()" style="margin-top:8px;font-size:11px">Skip →</button>`;
  renderChQ(q);
}

function renderChQ(q){
  const area=document.getElementById('ch-question');if(!area)return;
  const dMap=['','★','★★','★★★'];
  area.innerHTML=`
    <div class="q-badge">${TOPICS.find(t=>t.id===q.t)?.icon||'?'} ${TOPICS.find(t=>t.id===q.t)?.name||q.t} <span class="diff-tag ${['','b','m','a'][q.d]}">${dMap[q.d]}</span></div>
    <div class="q-text" style="font-size:15px">${q.q}</div>
    <div class="opts" id="ch-opts">${q.o.map((o,i)=>`<button class="opt" onclick="chAnswer(${i})"><span class="opt-l">${'ABCD'[i]}</span>${esc(o)}</button>`).join('')}</div>`;
}
function chAnswer(i){
  const q=challengeState.questions[challengeState.idx%challengeState.questions.length];
  const ok=i===q.a;
  document.querySelectorAll('#ch-opts .opt').forEach((o,idx)=>{o.disabled=true;if(idx===q.a)o.classList.add('correct');else if(idx===i)o.classList.add('wrong');});
  if(ok){challengeState.score+=10+(q.d*2);state.correct++;}else{challengeState.score=Math.max(0,challengeState.score-3);challengeState.wrong++;}
  state.solved++;addXP(ok?q.d*3:1);
  const sc=document.getElementById('ch-sc'),cr=document.getElementById('ch-cr'),wr=document.getElementById('ch-wr');
  if(sc)sc.textContent=challengeState.score;if(cr)cr.textContent=challengeState.idx-challengeState.wrong-challengeState.skipped;if(wr)wr.textContent=challengeState.wrong;
  setTimeout(()=>{challengeState.idx++;if(challengeState.active)renderChActive();},700);
}
function chSkip(){challengeState.skipped++;challengeState.idx++;if(challengeState.active)renderChActive();}
function updateTimerUI(){
  const num=document.getElementById('t-num'),arc=document.getElementById('t-arc');if(!num||!arc)return;
  const t=challengeState.timeLeft,total=challengeState.total,circ=2*Math.PI*38;
  arc.style.strokeDashoffset=circ*(1-t/total);num.textContent=t;
  const cls=t<=10?'danger':t<=20?'warn':'';num.className='t-num '+cls;arc.className='t-fg '+cls;
}
function stopChallenge(){if(challengeState.timer)clearInterval(challengeState.timer);challengeState.active=false;}
function endChallenge(){
  stopChallenge();
  const{score,wrong,skipped,idx}=challengeState;const correct=Math.max(0,idx-wrong-skipped);
  if(score>state.challengeHS)state.challengeHS=score;
  addXP(Math.floor(score/2));addActivity('⚡',`Challenge: ${score} pts, ${correct} correct`,'var(--a3)');checkBadges();save();
  const body=document.getElementById('ch-body');if(!body)return;
  body.innerHTML=`<div class="result-card"><div style="font-size:44px;margin-bottom:8px">${score>=100?'🏆':score>=50?'🎉':'💪'}</div><div class="result-score">${score}</div><div style="font-size:13px;color:var(--muted);margin-bottom:12px">${score>=state.challengeHS?'🎊 New High Score!':score>=100?'Excellent!':score>=50?'Great job!':'Keep practicing!'}</div><div class="result-bd"><div class="rb"><div class="rb-n" style="color:var(--a2)">${correct}</div><div class="rb-l">Correct</div></div><div class="rb"><div class="rb-n" style="color:var(--err)">${wrong}</div><div class="rb-l">Wrong</div></div></div><div style="font-size:12px;color:var(--muted);margin-bottom:16px">Best: <strong style="color:var(--a3)">${state.challengeHS}</strong></div><button class="btn btn-p" onclick="startChallenge(${challengeState.mode})" style="margin-right:8px">Play Again ⚡</button><button class="btn btn-g" onclick="renderChallenge()">Menu</button></div>`;
}

function renderDetective(){
  document.getElementById('view-detective').innerHTML=`
    <div class="lh"><button class="lh-back" onclick="showView('dashboard')">←</button><div class="lh-title">🔍 Bug Detective</div><div class="lh-prog"><div class="lh-pf" id="det-prog" style="width:0%"></div></div><div class="lh-ct" id="det-count"></div></div>
    <div class="detective-wrap" id="det-body"></div>`;
  detectiveState={idx:0,hintsUsed:0,score:0,answered:false};
  renderDetQ();
}
function renderDetQ(){
  const body=document.getElementById('det-body');if(!body)return;
  if(detectiveState.idx>=BUGS.length){
    const pct=Math.round(detectiveState.score/BUGS.length*100);
    body.innerHTML=`<div class="result-card"><div style="font-size:44px;margin-bottom:8px">🕵️</div><div class="result-score">${pct}%</div><div style="font-size:13px;color:var(--muted);margin-bottom:12px">Bug Detective Complete!</div><div class="result-bd"><div class="rb"><div class="rb-n" style="color:var(--a2)">${detectiveState.score}</div><div class="rb-l">Found</div></div><div class="rb"><div class="rb-n" style="color:var(--a3)">${detectiveState.hintsUsed}</div><div class="rb-l">Hints Used</div></div></div><button class="btn btn-p" onclick="renderDetective()">Play Again</button></div>`;
    return;
  }
  document.getElementById('det-prog').style.width=(detectiveState.idx/BUGS.length*100)+'%';
  document.getElementById('det-count').textContent=`${detectiveState.idx+1}/${BUGS.length}`;
  const bug=BUGS[detectiveState.idx];detectiveState.answered=false;
  const lines=bug.code.split('\n');
  body.innerHTML=`
    <div class="det-stats">
      <div class="det-stat"><div class="det-sn" style="color:var(--a2)">${detectiveState.score}</div><div class="det-sl">Found</div></div>
      <div class="det-stat"><div class="det-sn" style="color:var(--a3)">${detectiveState.hintsUsed}</div><div class="det-sl">Hints</div></div>
    </div>
    <div class="q-badge" style="margin-bottom:12px">🐛 Bug #${detectiveState.idx+1}: ${bug.title}</div>
    <div class="q-text" style="font-size:15px;margin-bottom:14px">What's wrong with this code? Find the bug!</div>
    <div class="buggy-code">${lines.map((l,i)=>`<div class="bug-line${i===bug.bugLine?' hl':''}">${i===bug.bugLine?'❌ ':''}<span style="color:var(--muted);margin-right:10px;font-size:10px;user-select:none">${i+1}</span>${esc(l)}</div>`).join('')}</div>
    <div style="margin-bottom:10px">
      <span class="hint-pill" onclick="showHint(1)">💡 Hint 1</span>
      <span class="hint-pill" onclick="showHint(2)">💡 Hint 2</span>
      <span class="hint-pill" onclick="showHint(3)">💡 Reveal Answer</span>
    </div>
    <div class="hint-reveal" id="h1">🤔 ${bug.hint1}</div>
    <div class="hint-reveal" id="h2">🔍 ${bug.hint2}</div>
    <div class="hint-reveal" id="h3">✅ ${bug.hint3}</div>
    <input class="bug-input" id="bug-ans" placeholder="Describe the bug or type your fix..." />
    <div id="det-fb" style="display:none;border-radius:10px;padding:12px;margin-bottom:10px;font-size:12px;line-height:1.6;background:var(--bg3);border:1px solid var(--border)"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-s" onclick="checkBug()">Check 🔍</button>
      <button class="btn btn-g" onclick="nextBug()">Skip →</button>
    </div>`;
  setTimeout(()=>{const inp=document.getElementById('bug-ans');if(inp){inp.focus();inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkBug();});}},50);
}
function showHint(n){
  document.getElementById('h'+n).classList.add('show');
  if(!detectiveState['h'+n+'u']){detectiveState.hintsUsed++;detectiveState['h'+n+'u']=true;}
}
function checkBug(){
  if(detectiveState.answered)return;
  const val=document.getElementById('bug-ans').value.toLowerCase().trim();
  const bug=BUGS[detectiveState.idx];
  const ok=bug.answer.some(a=>val.includes(a.toLowerCase()));
  detectiveState.answered=true;
  const fb=document.getElementById('det-fb');fb.style.display='block';
  if(ok){
    detectiveState.score++;
    fb.style.borderColor='var(--ok)';
    fb.innerHTML=`✅ <strong>Correct!</strong><br>${bug.bug}<br><br><strong>Fix:</strong><pre style="background:var(--bg2);padding:8px;border-radius:6px;font-family:var(--mono);font-size:11px;color:var(--a3);margin-top:6px">${esc(bug.fix)}</pre>`;
    showToast('Bug found! +15 XP','success');addXP(15);
    addActivity('🔍','Found bug: '+bug.title,'var(--a2)');state.detectiveSolved++;
  }else{
    fb.style.borderColor='var(--a3)';
    fb.innerHTML=`⚠️ Not quite. Check the hints! Bug: ${bug.bug}`;
    showToast('Check the hints!','info');
  }
  checkBadges();save();
  setTimeout(nextBug,ok?2000:3000);
}
function nextBug(){detectiveState.idx++;renderDetQ();}

function renderPractice(){

function checkPractice(){

function analyzeCode(code){
  const issues=[];const good=[];const suggestions=[];
  if(!code.includes('def ')&&code.length>50)good.push("Code is concise");
  if(code.includes('def '))good.push("Using functions — great for code organization!");
  if(code.includes('f"')||code.includes("f'"))good.push("Using f-strings — modern Python style! ✅");
  if(code.includes('print('))good.push("Using print() for output");
  if(code.includes('for ')||code.includes('while '))good.push("Loop structure detected");
  if(code.includes('try:'))good.push("Exception handling — great defensive coding!");
  if(code.includes('class '))good.push("Using OOP — well structured!");
  // Detect potential issues
  if(/def [a-z_]+\(.*\)\s*$/.test(code.split('\n').find(l=>l.startsWith('def '))||''))issues.push("Missing colon `:` after function definition");
  if(code.includes('print '))issues.push("Looks like `print` without parentheses — use `print(value)` in Python 3");
  if(code.split('\n').some(l=>l.startsWith('  ')&&!l.startsWith('    ')))suggestions.push("Use 4 spaces for indentation (PEP 8 standard)");
  if(!code.includes('return')&&code.includes('def '))suggestions.push("Consider adding a `return` statement to your function");
  if(code.includes('='))good.push("Variable assignment found");
  let resp=`**Code Review 🔍**\n\n`;
  if(issues.length)resp+=`**🐛 Potential Issues:**\n${issues.map(i=>`- ${i}`).join('\n')}\n\n`;
  else resp+=`**🐛 Bugs Found:** None detected — looks syntactically correct!\n\n`;
  resp+=`**✅ Good Practices:**\n${good.length?good.map(g=>`- ${g}`).join('\n'):'- Keep writing more code!'}\n\n`;
  if(suggestions.length)resp+=`**💡 Suggestions:**\n${suggestions.map(s=>`- ${s}`).join('\n')}\n\n`;
  resp+=`**📚 Keep Learning:**\nTry the Quiz and Practice sections to reinforce these concepts!\n\n`;
  resp+=`\`\`\`python\n${code}\n\`\`\`\n\n*Note: I'm a built-in reviewer and catch common patterns. For deep code analysis, ask specific questions like "how can I improve this function?"*`;
  return resp;
}

function fmtResp(txt){
  return txt
    .replace(/```python\n?([\s\S]*?)```/g,(_,c)=>{const id='c'+Math.random().toString(36).slice(2,7);return `<pre id="${id}"><button class="cp" onclick="cpCode('${id}')">Copy</button>${esc(c.trim())}</pre>`;})
    .replace(/```\n?([\s\S]*?)```/g,(_,c)=>`<pre>${esc(c.trim())}</pre>`)
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/^#{1,3} (.+)$/gm,'<h3>$1</h3>')
    .replace(/^[-*] (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>\n?)+/g,m=>`<ul>${m}</ul>`)
    .replace(/\n\n+/g,'</p><p>')
    .replace(/\n/g,'<br>');
}
function cpCode(id){const el=document.getElementById(id);if(!el)return;navigator.clipboard.writeText(el.innerText.replace(/^Copy\n/,'')).then(()=>showToast('Copied!','success'));}
function nowT(){return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});}

  {id:'fifty',i:'🏅',n:'Half Century',d:'50 questions solved',c:s=>s.solved>=50},
  {id:'hundred',i:'💯',n:'Century',d:'100 questions solved',c:s=>s.solved>=100},
  {id:'streak3',i:'🔥',n:'On Fire',d:'3-day streak',c:s=>s.streak>=3},
  {id:'streak7',i:'⚡',n:'Unstoppable',d:'7-day streak',c:s=>s.streak>=7},
  {id:'acc80',i:'🎯',n:'Sharpshooter',d:'80%+ accuracy',c:s=>s.solved>10&&(s.correct/s.solved)>=.8},
  {id:'explorer',i:'🗺️',n:'Explorer',d:'All 8 topics attempted',c:s=>Object.keys(s.topicScores||{}).length>=8},
  {id:'asker5',i:'❓',n:'Curious',d:'Ask AI 5 times',c:s=>s.askCount>=5},
  {id:'asker20',i:'💡',n:'Scholar',d:'Ask AI 20 times',c:s=>s.askCount>=20},
  {id:'lvl5',i:'👑',n:'Rising Star',d:'Reach Level 5',c:s=>getLevel()>=5},
  {id:'runner',i:'▶',n:'Code Runner',d:'Run your first code',c:s=>s.ranCode},
];
function checkBadges(){
  BADGES_DEF.forEach(b=>{
    if(!state.badges.includes(b.id)&&b.c(state)){
      state.badges.push(b.id);
      showToast(`🏆 Badge: ${b.i} ${b.n}!`,'success');
      addActivity('🏆','Badge earned: '+b.n,'var(--a3)');
    }
  });
}

function renderLB(){
  const myScore=state.xp;
  const all=[...lbPlayers.map(p=>({...p,isMe:false})),{name:'You 👉',score:myScore,streak:state.streak,isMe:true}].sort((a,b)=>b.score-a.score);
  document.getElementById('view-leaderboard').innerHTML=`
    <div style="padding:20px">
      <h2 style="font-family:var(--head);margin-bottom:14px;font-size:18px">🏆 Leaderboard</h2>
      <div>${all.map((p,i)=>`<div class="lb-item ${p.isMe?'lb-me':''}">
        <div class="lb-rank" style="color:${i===0?'#ffd166':i===1?'#aaa':i===2?'#cd7f32':'var(--muted)'}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
        <div class="lb-name">${p.name}</div>
        <div style="font-size:11px;color:var(--muted)">${p.streak}🔥</div>
        <div class="lb-score">${p.score} XP</div>
      </div>`).join('')}</div>
      <h2 style="font-family:var(--head);margin:22px 0 12px;font-size:18px">Achievements (${state.badges.length}/${BADGES_DEF.length})</h2>
      <div class="badge-grid">${BADGES_DEF.map(b=>`<div class="badge-item ${state.badges.includes(b.id)?'':'locked'}"><div class="badge-icon">${b.i}</div><div class="badge-name">${b.n}</div><div class="badge-desc">${b.d}</div></div>`).join('')}</div>
    </div>`;
}

// ═══════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════
function renderSidebar(){
  document.getElementById('sidebar').innerHTML=`
    <div class="sb-sec">Difficulty</div>
    <div class="sbi" onclick="startDiffQuiz(1);showView('learn')"><div class="sbi-dot" style="background:var(--ok)"></div>Basic ★</div>
    <div class="sbi" onclick="startDiffQuiz(2);showView('learn')"><div class="sbi-dot" style="background:var(--a3)"></div>Intermediate ★★</div>
    <div class="sbi" onclick="startDiffQuiz(3);showView('learn')"><div class="sbi-dot" style="background:var(--err)"></div>Advanced ★★★</div>
    <div class="sb-sec">Topics</div>
    ${TOPICS.map(t=>{const done=(state.topicScores[t.id]||{}).done||0;const pct=t.qs.length?Math.round(done/t.qs.length*100):0;return `<div class="sbi ${currentView==='learn'&&quizState.topic===t.id?'active':''}" onclick="startTopicQuiz('${t.id}');showView('learn')"><div class="sbi-dot" style="background:${t.color}"></div>${t.icon} ${t.name}<span class="sbi-badge">${pct}%</span></div>`;}).join('')}
    <div class="sb-sec">Tools</div>
    <div class="sbi" onclick="showView('runner')">▶ Runner <span class="sbi-badge new">run</span></div>
    <div class="sbi" onclick="showView('challenge')">⚡ Challenge</div>
    <div class="sbi" onclick="showView('detective')">🔍 Bug Detective</div>
    <div class="sbi" onclick="showView('cheatsheet')">📋 Cheat Sheet</div>
    <div class="sbi" onclick="showView('analytics')">📊 Analytics</div>
    <div class="sbi" onclick="showView('mastery')">🏆 Mastery</div>
    <div class="sb-sec">AI Tutor</div>
    <div class="sbi" onclick="showView('ask');setAskMode('chat')">💬 Chat</div>
    <div class="sbi" onclick="showView('ask');setAskMode('review')">🔍 Code Review</div>`;
}

// ═══════════════════════════════════
// UTILS
// ═══════════════════════════════════
function updateStreak(){
  const today=new Date().toDateString();
  if(state.lastDate!==today){
    const yest=new Date(Date.now()-86400000).toDateString();
    state.streak=(state.lastDate===yest)?state.streak+1:1;
    state.lastDate=today;
  }
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showToast(msg,type=''){
  const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+type;
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);
}

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
updateLB();
updateStreak();
renderDashboard();
renderSidebar();
document.getElementById('nav-lvl').textContent='LV '+getLevel();
</script>
