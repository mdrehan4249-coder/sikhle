<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PySeekho — Master Python Interactively</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0c16;--bg2:#111425;--bg3:#191d34;--card:#1a1e36;--border:#282d52;--accent:#7c6af7;--accent2:#5ee7b5;--accent3:#f7c76a;--accent4:#f76a8a;--text:#e8eaf6;--muted:#7a7e9e;--correct:#5ee7b5;--wrong:#f76a8a;--mono:'Space Mono',monospace;--sans:'Nunito',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg2);}::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px;}

.bg-grid{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;
background-image:linear-gradient(rgba(124,106,247,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(124,106,247,.03) 1px,transparent 1px);background-size:60px 60px;}
.glow-orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.08;pointer-events:none;z-index:0;animation:orbFloat 20s ease-in-out infinite alternate;}
.glow-orb.a{width:400px;height:400px;background:var(--accent);top:-100px;left:-100px;}
.glow-orb.b{width:300px;height:300px;background:var(--accent2);bottom:-50px;right:-50px;animation-delay:-10s;}
.glow-orb.c{width:250px;height:250px;background:var(--accent3);top:50%;left:50%;animation-delay:-5s;}
@keyframes orbFloat{0%{transform:translate(0,0)}50%{transform:translate(40px,30px)}100%{transform:translate(-20px,50px)}}

nav{background:rgba(17,20,37,.85);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;backdrop-filter:blur(16px);}
.logo{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--accent);letter-spacing:-1px;}
.logo span{color:var(--accent2);}
.nav-links{display:flex;gap:4px;flex-wrap:wrap;}
.nav-btn{background:transparent;border:1px solid transparent;color:var(--muted);padding:6px 12px;border-radius:8px;cursor:pointer;font-family:var(--sans);font-size:12px;font-weight:700;transition:all .2s;white-space:nowrap;}
.nav-btn:hover{color:var(--text);background:var(--bg3);}
.nav-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}

.app{display:flex;height:calc(100vh - 56px);position:relative;z-index:1;}
.sidebar{width:200px;background:rgba(17,20,37,.6);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;backdrop-filter:blur(8px);}
.sb-section{padding:14px 14px 8px;font-size:10px;font-weight:800;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.sb-item{padding:8px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;border-radius:8px;margin:2px 6px;transition:all .15s;font-size:13px;font-weight:600;color:var(--muted);}
.sb-item:hover{background:var(--bg3);color:var(--text);}
.sb-item.active{background:rgba(124,106,247,.12);color:var(--accent);}
.sb-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sb-pct{margin-left:auto;font-size:11px;font-family:var(--mono);}
.content{flex:1;overflow-y:auto;padding:0;}

.hidden{display:none!important;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.fade-up{animation:fadeUp .4s ease both;}

/* DASHBOARD */
#view-dashboard{padding:24px;}
.dash-top{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.dash-hero{background:linear-gradient(135deg,var(--bg3) 0%,rgba(124,106,247,.08) 100%);border:1px solid var(--border);border-radius:16px;padding:28px;position:relative;overflow:hidden;}
.dash-hero::after{content:'';position:absolute;top:-30px;right:-30px;width:150px;height:150px;border-radius:50%;background:var(--accent);opacity:.06;}
.dash-hero h1{font-size:22px;font-weight:900;margin-bottom:4px;}
.dash-hero h1 span{color:var(--accent2);}
.dash-hero p{color:var(--muted);font-size:13px;line-height:1.5;}

.xp-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.xp-ring{width:110px;height:110px;position:relative;margin-bottom:12px;}
.xp-ring svg{width:100%;height:100%;transform:rotate(-90deg);}
.xp-ring circle{fill:none;stroke-width:6;stroke-linecap:round;}
.xp-ring .bg-ring{stroke:var(--bg3);}
.xp-ring .fg-ring{stroke:var(--accent);transition:stroke-dashoffset .8s ease;}
.xp-ring .fg-ring.gold{stroke:var(--accent3);}
.xp-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.xp-lvl{font-family:var(--mono);font-size:28px;font-weight:700;color:var(--accent);}
.xp-lvl.gold{color:var(--accent3);}
.xp-label{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:1px;}
.xp-bar{width:100%;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:6px;}
.xp-bar-fill{height:100%;border-radius:3px;transition:width .5s;}
.xp-text{font-size:11px;color:var(--muted);}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;transition:all .2s;}
.stat-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.stat-icon{font-size:20px;margin-bottom:6px;}
.stat-num{font-family:var(--mono);font-size:24px;font-weight:700;margin-bottom:2px;}
.stat-label{font-size:11px;color:var(--muted);font-weight:600;}

.dash-cols{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;}
.dash-section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;}
.dash-section h3{font-size:15px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.dash-section h3 span{color:var(--accent);}

.daily-challenge{background:linear-gradient(135deg,rgba(124,106,247,.1),rgba(94,231,181,.08));border:1px solid rgba(124,106,247,.2);border-radius:10px;padding:14px;margin-bottom:12px;cursor:pointer;transition:all .2s;}
.daily-challenge:hover{border-color:var(--accent);transform:translateX(4px);}
.dc-title{font-size:13px;font-weight:800;margin-bottom:4px;}
.dc-desc{font-size:11px;color:var(--muted);}
.dc-reward{font-size:11px;color:var(--accent3);font-weight:700;margin-top:6px;}
.dc-done{font-size:11px;color:var(--accent2);font-weight:700;margin-top:6px;}

.activity-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.activity-item:last-child{border-bottom:none;}
.act-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.act-text{font-size:12px;color:var(--muted);line-height:1.4;flex:1;}
.act-text strong{color:var(--text);}
.act-time{font-size:10px;color:var(--muted);font-family:var(--mono);white-space:nowrap;}

.topic-chips{display:flex;flex-wrap:wrap;gap:8px;}
.topic-chip{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px;min-width:140px;}
.topic-chip:hover{border-color:var(--accent);transform:translateY(-1px);}
.topic-chip .tc-icon{font-size:18px;}
.topic-chip .tc-info h4{font-size:12px;font-weight:800;}
.topic-chip .tc-info p{font-size:10px;color:var(--muted);}

/* LEARN VIEW */
#view-learn{padding:0;}
.lh{padding:16px 24px;border-bottom:1px solid var(--border);background:rgba(17,20,37,.6);display:flex;align-items:center;gap:12px;flex-wrap:wrap;backdrop-filter:blur(8px);}
.lh-back{background:transparent;border:1px solid var(--border);color:var(--muted);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.lh-back:hover{border-color:var(--accent);color:var(--accent);}
.lh-title{font-size:16px;font-weight:800;}
.lh-prog{flex:1;min-width:80px;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.lh-prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .3s;}
.lh-count{font-size:12px;color:var(--muted);font-family:var(--mono);}

.diff-selector{display:flex;gap:6px;padding:12px 24px;background:var(--bg2);border-bottom:1px solid var(--border);}
.diff-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);padding:6px 16px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;transition:all .2s;}
.diff-btn:hover{border-color:var(--accent);color:var(--text);}
.diff-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.diff-btn .diff-star{color:var(--accent3);}

.q-area{padding:24px;max-width:680px;}
.q-badge{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);padding:3px 10px;border-radius:16px;font-size:11px;color:var(--muted);margin-bottom:14px;font-weight:700;}
.q-diff{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:800;margin-left:8px;}
.q-diff.basic{background:rgba(94,231,181,.15);color:var(--correct);}
.q-diff.inter{background:rgba(247,199,106,.15);color:var(--accent3);}
.q-diff.adv{background:rgba(247,106,138,.15);color:var(--wrong);}
.q-text{font-size:18px;font-weight:800;line-height:1.4;margin-bottom:20px;}
.opts{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.opt{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s;text-align:left;color:var(--text);display:flex;align-items:center;gap:10px;}
.opt:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,.06);}
.opt.correct{border-color:var(--correct);background:rgba(94,231,181,.08);color:var(--correct);}
.opt.wrong{border-color:var(--wrong);background:rgba(247,106,138,.08);color:var(--wrong);}
.opt:disabled{cursor:default;}
.opt-l{width:26px;height:26px;border-radius:6px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;flex-shrink:0;}
.opt.correct .opt-l{background:var(--correct);color:#0d1a12;}
.opt.wrong .opt-l{background:var(--wrong);color:#1a0d10;}
.expl{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:16px;font-size:13px;line-height:1.6;display:none;}
.expl.show{display:block;animation:fadeUp .3s ease;}
.expl-t{font-size:11px;font-weight:700;color:var(--accent2);margin-bottom:4px;letter-spacing:1px;text-transform:uppercase;}
.expl-code{font-family:var(--mono);background:var(--bg2);padding:6px 10px;border-radius:6px;font-size:11px;margin-top:6px;color:var(--accent3);border-left:3px solid var(--accent);line-height:1.6;}
.q-acts{display:flex;gap:8px;}
.btn-next{background:var(--accent);border:none;color:#fff;padding:10px 24px;border-radius:8px;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-next:hover{background:#6a59e0;transform:translateY(-1px);}
.btn-skip{background:transparent;border:1px solid var(--border);color:var(--muted);padding:10px 16px;border-radius:8px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-skip:hover{border-color:var(--muted);}

.result-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;text-align:center;max-width:460px;margin:32px auto;}
.result-emoji{font-size:48px;margin-bottom:12px;}
.result-score{font-family:var(--mono);font-size:44px;font-weight:700;color:var(--accent2);margin-bottom:6px;}
.result-msg{font-size:14px;color:var(--muted);margin-bottom:8px;}
.result-xp{font-size:13px;color:var(--accent3);font-weight:700;margin-bottom:20px;}
.result-bd{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.rb-item{background:var(--bg3);border-radius:10px;padding:12px;}
.rb-num{font-family:var(--mono);font-size:20px;font-weight:700;margin-bottom:2px;}
.rb-label{font-size:11px;color:var(--muted);}
.btn-retry{background:var(--accent);border:none;color:#fff;padding:10px 24px;border-radius:8px;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;margin-right:8px;transition:all .2s;}
.btn-dash{background:transparent;border:1px solid var(--border);color:var(--text);padding:10px 16px;border-radius:8px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}

.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 24px;background:rgba(17,20,37,.6);backdrop-filter:blur(8px);}
.tab{padding:10px 16px;cursor:pointer;font-size:13px;font-weight:700;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;white-space:nowrap;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-content{display:none;padding:24px;}.tab-content.active{display:block;}

/* PRACTICE */
.code-block{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;font-family:var(--mono);font-size:13px;line-height:1.8;margin-bottom:16px;}
.code-blank{background:transparent;border:none;border-bottom:2px solid var(--accent);color:var(--accent2);font-family:var(--mono);font-size:13px;width:110px;text-align:center;outline:none;padding:0 4px;}
.code-blank.correct{border-color:var(--correct);color:var(--correct);}
.code-blank.wrong{border-color:var(--wrong);color:var(--wrong);}
.check-btn{background:var(--accent2);border:none;color:#0d1a12;padding:8px 20px;border-radius:8px;font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;margin-right:8px;transition:all .2s;}
.check-btn:hover{transform:translateY(-1px);}

/* FLASHCARDS */
.flash-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:36px;text-align:center;cursor:pointer;min-height:180px;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:all .3s;max-width:560px;margin:16px 0;user-select:none;}
.flash-card:hover{border-color:var(--accent);}
.flash-front{font-size:18px;font-weight:800;}
.flash-back{font-size:14px;color:var(--accent2);line-height:1.7;display:none;}
.flash-hint{font-size:10px;color:var(--muted);margin-top:12px;}
.flash-card.flipped .flash-front{display:none;}
.flash-card.flipped .flash-back{display:block;}
.flash-card.flipped{background:rgba(94,231,181,.04);border-color:var(--accent2);}
.flash-nav{display:flex;gap:10px;align-items:center;margin-top:8px;}
.flash-btn{background:var(--card);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.flash-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ═══════════════════════════════════
   ASK — UPGRADED WITH CLAUDE AI
   ═══════════════════════════════════ */
#view-ask{display:flex;flex-direction:column;height:100%;}

.ask-header{
  padding:16px 24px;
  border-bottom:1px solid var(--border);
  background:rgba(17,20,37,.8);
  backdrop-filter:blur(16px);
  display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:10;
}
.ask-header-left{display:flex;align-items:center;gap:10px;flex:1;}
.ask-ai-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,rgba(124,106,247,.2),rgba(94,231,181,.1));
  border:1px solid rgba(124,106,247,.3);
  padding:4px 12px;border-radius:20px;
  font-size:11px;font-weight:700;color:var(--accent2);
}
.ask-ai-dot{width:7px;height:7px;border-radius:50%;background:var(--accent2);animation:pulse 2s infinite;}
.ask-mode-tabs{display:flex;gap:4px;}
.ask-mode-btn{
  background:var(--bg3);border:1px solid var(--border);
  color:var(--muted);padding:5px 12px;border-radius:8px;
  cursor:pointer;font-size:11px;font-weight:700;
  transition:all .2s;
}
.ask-mode-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.ask-mode-btn:hover:not(.active){border-color:var(--accent);color:var(--text);}

.ask-body{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px;}

/* Welcome Screen */
.ask-welcome{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:40px 20px;text-align:center;
  gap:20px;
}
.ask-welcome-icon{
  font-size:56px;
  animation:orbFloat 4s ease-in-out infinite;
}
.ask-welcome h2{font-size:22px;font-weight:900;}
.ask-welcome h2 span{color:var(--accent);}
.ask-welcome p{color:var(--muted);font-size:13px;max-width:420px;line-height:1.6;}

.quick-actions{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;width:100%;max-width:520px;}
.qa-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:14px;cursor:pointer;
  transition:all .2s;text-align:left;
}
.qa-card:hover{border-color:var(--accent);background:rgba(124,106,247,.06);transform:translateY(-2px);}
.qa-icon{font-size:20px;margin-bottom:6px;}
.qa-title{font-size:12px;font-weight:800;margin-bottom:3px;}
.qa-desc{font-size:11px;color:var(--muted);}

/* Chat Messages */
.chat-msg{display:flex;gap:10px;animation:fadeUp .3s ease;max-width:760px;}
.chat-avatar{
  width:34px;height:34px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;margin-top:2px;
}
.chat-user .chat-avatar{background:linear-gradient(135deg,var(--accent),#5b4ac7);color:#fff;font-size:13px;font-weight:800;}
.chat-bot .chat-avatar{background:linear-gradient(135deg,#1a3d2e,var(--accent2));color:#0d1a12;font-size:18px;}
.chat-bubble{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:14px 16px;flex:1;
  line-height:1.6;font-size:13px;
}
.chat-user .chat-bubble{border-color:rgba(124,106,247,.3);background:rgba(124,106,247,.06);}
.chat-bot .chat-bubble{border-color:rgba(94,231,181,.15);background:rgba(94,231,181,.03);}
.chat-bubble p{margin-bottom:8px;}
.chat-bubble p:last-child{margin-bottom:0;}
.chat-bubble code{font-family:var(--mono);background:var(--bg2);padding:2px 6px;border-radius:5px;font-size:12px;color:var(--accent3);}
.chat-bubble pre{
  background:var(--bg2);padding:12px 16px;border-radius:10px;
  margin:10px 0;font-family:var(--mono);font-size:12px;
  overflow-x:auto;border-left:3px solid var(--accent2);
  color:var(--accent3);line-height:1.6;
  position:relative;
}
.chat-bubble pre .copy-code{
  position:absolute;top:8px;right:8px;
  background:var(--bg3);border:1px solid var(--border);
  color:var(--muted);padding:2px 8px;border-radius:6px;
  font-size:10px;cursor:pointer;font-family:var(--sans);
  transition:all .2s;font-weight:700;
}
.chat-bubble pre .copy-code:hover{border-color:var(--accent);color:var(--accent);}
.chat-bubble ul,.chat-bubble ol{margin:8px 0 8px 20px;}
.chat-bubble li{margin-bottom:4px;}
.chat-bubble h3{font-size:14px;font-weight:800;margin:10px 0 6px;color:var(--accent2);}
.chat-bubble strong{color:var(--text);}
.chat-bubble .tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;margin-bottom:8px;}
.chat-bubble .tag.correct{background:rgba(94,231,181,.12);color:var(--correct);}
.chat-bubble .tag.error{background:rgba(247,106,138,.12);color:var(--wrong);}
.chat-bubble .tag.info{background:rgba(124,106,247,.12);color:var(--accent);}
.chat-meta{font-size:10px;color:var(--muted);margin-top:8px;display:flex;align-items:center;gap:8px;}
.chat-meta .xp-earn{color:var(--accent3);font-weight:700;}

/* Streaming Cursor */
.stream-cursor{display:inline-block;width:2px;height:14px;background:var(--accent2);margin-left:2px;border-radius:1px;animation:pulse .8s infinite;}

/* Typing indicator */
.typing-indicator{display:flex;gap:5px;align-items:center;padding:4px 0;}
.typing-indicator span{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 1.2s infinite;}
.typing-indicator span:nth-child(2){animation-delay:.2s;background:var(--accent2);}
.typing-indicator span:nth-child(3){animation-delay:.4s;background:var(--accent3);}

/* Input Area */
.ask-footer{
  padding:16px 24px;
  border-top:1px solid var(--border);
  background:rgba(10,12,22,.9);
  backdrop-filter:blur(16px);
}
.ask-suggestions{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.ask-sug{
  background:var(--bg3);border:1px solid var(--border);
  padding:4px 12px;border-radius:16px;font-size:11px;
  color:var(--muted);cursor:pointer;transition:all .2s;
  white-space:nowrap;
}
.ask-sug:hover{border-color:var(--accent);color:var(--accent);}
.ask-input-row{display:flex;gap:10px;align-items:flex-end;}
.ask-input-box{
  flex:1;background:var(--card);
  border:1.5px solid var(--border);border-radius:12px;
  padding:12px 16px;font-family:var(--sans);font-size:14px;
  color:var(--text);resize:none;min-height:48px;max-height:160px;
  outline:none;transition:border-color .2s;line-height:1.5;
}
.ask-input-box:focus{border-color:var(--accent);}
.ask-input-box::placeholder{color:var(--muted);}
.ask-actions{display:flex;flex-direction:column;gap:6px;}
.ask-send{
  background:linear-gradient(135deg,var(--accent),#5b4ac7);
  border:none;color:#fff;padding:12px 18px;
  border-radius:10px;font-family:var(--sans);
  font-size:14px;font-weight:700;cursor:pointer;
  transition:all .2s;height:48px;
  display:flex;align-items:center;gap:6px;
}
.ask-send:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 16px rgba(124,106,247,.4);}
.ask-send:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.ask-clear{
  background:transparent;border:1px solid var(--border);
  color:var(--muted);padding:4px 10px;border-radius:8px;
  font-size:11px;cursor:pointer;font-weight:700;
  transition:all .2s;
}
.ask-clear:hover{border-color:var(--wrong);color:var(--wrong);}

/* Mode: Code Review */
.code-review-panel{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:20px;margin-bottom:16px;
}
.code-review-panel h3{font-size:14px;font-weight:800;margin-bottom:12px;color:var(--accent2);}
.code-textarea{
  width:100%;background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:14px;font-family:var(--mono);
  font-size:13px;color:var(--text);resize:vertical;
  min-height:140px;outline:none;transition:border-color .2s;
  line-height:1.6;
}
.code-textarea:focus{border-color:var(--accent);}
.code-textarea::placeholder{color:var(--muted);}
.review-btn{
  background:linear-gradient(135deg,var(--accent2),#3bc49a);
  border:none;color:#0d1a12;padding:10px 22px;
  border-radius:10px;font-family:var(--sans);
  font-size:13px;font-weight:800;cursor:pointer;
  transition:all .2s;margin-top:10px;
}
.review-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(94,231,181,.3);}
.review-btn:disabled{opacity:.5;cursor:not-allowed;}

/* Leaderboard */
.lb-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:6px;transition:all .2s;}
.lb-item:hover{transform:translateX(3px);}
.lb-rank{font-family:var(--mono);font-size:14px;font-weight:700;width:30px;text-align:center;}
.lb-name{font-weight:700;flex:1;font-size:14px;}
.lb-streak{font-size:11px;color:var(--muted);}
.lb-score{font-family:var(--mono);color:var(--accent2);font-weight:700;font-size:14px;}
.lb-change{font-size:11px;font-weight:700;padding:2px 6px;border-radius:6px;}
.lb-up{color:var(--correct);background:rgba(94,231,181,.1);}
.lb-down{color:var(--wrong);background:rgba(247,106,138,.1);}
.lb-same{color:var(--muted);background:var(--bg3);}
.lb-me{border-color:var(--accent)!important;background:rgba(124,106,247,.06)!important;}
.lb-timer{font-size:11px;color:var(--muted);font-family:var(--mono);display:flex;align-items:center;gap:6px;margin-bottom:16px;}
.lb-timer .spin{display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;}

.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;}
.badge-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 8px;text-align:center;transition:all .2s;}
.badge-item:hover{transform:translateY(-2px);}
.badge-icon{font-size:28px;margin-bottom:6px;}
.badge-name{font-size:11px;font-weight:700;margin-bottom:3px;}
.badge-desc{font-size:10px;color:var(--muted);}
.badge-item.locked{opacity:.3;filter:grayscale(1);}

.roadmap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
.rm-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;gap:12px;align-items:flex-start;transition:all .2s;}
.rm-item:hover{border-color:var(--accent);transform:translateY(-1px);}
.rm-icon{font-size:22px;flex-shrink:0;}
.rm-text h4{font-size:13px;font-weight:800;margin-bottom:3px;}
.rm-text p{font-size:11px;color:var(--muted);line-height:1.4;}
.rm-status{font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;margin-top:4px;display:inline-block;}
.rm-soon{background:rgba(94,231,181,.12);color:var(--correct);}
.rm-later{background:rgba(247,199,106,.12);color:var(--accent3);}
.rm-plan{background:rgba(139,143,173,.12);color:var(--muted);}

.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600;z-index:999;transform:translateY(70px);opacity:0;transition:all .3s;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-color:var(--correct);color:var(--correct);}
.toast.error{border-color:var(--wrong);color:var(--wrong);}
.toast.info{border-color:var(--accent);color:var(--accent);}

@media(max-width:768px){
  .sidebar{display:none;}
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .dash-top,.dash-cols{grid-template-columns:1fr;}
  .nav-btn{padding:5px 8px;font-size:11px;}
  .quick-actions{grid-template-columns:1fr;}
  .ask-input-row{flex-direction:column;}
  .ask-actions{flex-direction:row;}
}

async function callClaude(messages, systemPrompt){
  const response = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:1000,
      system: systemPrompt,
      messages: messages
    })
  });
  if(!response.ok) throw new Error(`API Error: ${response.status}`);
  const data = await response.json();
  return data.content.find(b=>b.type==='text')?.text || '';
}

// Format markdown-ish text to HTML
function formatResponse(text){
  return text
    .replace(/```python\n?([\s\S]*?)```/g, (_, code) => {
      const id = 'c' + Math.random().toString(36).slice(2,7);
      return `<pre id="${id}"><button class="copy-code" onclick="copyCode('${id}')">Copy</button>${escapeHtml(code.trim())}</pre>`;
    })
    .replace(/```\n?([\s\S]*?)```/g, (_, code) => `<pre>${escapeHtml(code.trim())}</pre>`)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h3>$1</h3>')
    .replace(/^# (.+)$/gm, '<h3>$1</h3>')
    .replace(/^\* (.+)$/gm, '<li>$1</li>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>(\n|$))+/g, m => `<ul>${m}</ul>`)
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(?!<[hupol]|$)(.+)$/gm, '<p>$1</p>')
    .replace(/<p><\/p>/g, '')
    .replace(/<p>(<[hupol])/g, '$1')
    .replace(/<\/[hupol][^>]*>(<\/p>)/g, m => m.replace('</p>',''));
}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function copyCode(id){
  const el=document.getElementById(id);
  if(!el)return;
  const text=el.innerText.replace(/^Copy\n/,'');
  navigator.clipboard.writeText(text).then(()=>showToast('Code copied!','success'));
}

async function sendChat(){

  inp.value='';inp.style.height='auto';

    const msgs=chatHistory.slice(-10).map(m=>({role:m.role,content:m.content}));

  document.getElementById('qprog').style.width=(idx/questions.length*100)+'%';
  document.getElementById('qcount').textContent=`${idx+1}/${questions.length}`;
  area.innerHTML=`<div class="q-badge">${TOPICS.find(t=>t.id===q.t)?.icon||'?'} ${TOPICS.find(t=>t.id===q.t)?.name||q.t}<span class="q-diff ${dCls[q.d]}">${dLabels[q.d]}</span></div><div class="q-text">${q.q}</div><div class="opts" id="opts">${q.o.map((o,i)=>`<button class="opt" onclick="selectOpt(${i})"><span class="opt-l">${'ABCD'[i]}</span>${o}</button>`).join('')}</div><div class="expl" id="expl"><div class="expl-t">Explanation</div><div>${q.e}</div>${q.c?`<div class="expl-code">${q.c.replace(/\n/g,'<br>')}</div>`:''}</div><div class="q-acts"><button class="btn-next hidden" id="btn-next" onclick="nextQ()">Next →</button><button class="btn-skip" onclick="skipQ()">Skip</button></div>`;
  quizState.answered=false;
}

function selectOpt(i){
  if(quizState.answered)return;quizState.answered=true;
  const q=quizState.questions[quizState.idx];
  document.querySelectorAll('.opt').forEach((o,idx)=>{o.disabled=true;if(idx===q.a)o.classList.add('correct');else if(idx===i)o.classList.add('wrong');});
  document.getElementById('expl').classList.add('show');
  document.getElementById('btn-next').classList.remove('hidden');
  const ok=i===q.a;const xpGain=q.d*5+(ok?q.d*5:0);
  if(ok){quizState.score++;state.correct++;showToast(`+${xpGain} XP`,'success');addActivity('✔️','Correct: '+q.q.substring(0,40)+'...','var(--correct)');}
  else{showToast('Wrong!','error');addActivity('✘','Wrong: '+q.q.substring(0,40)+'...','var(--wrong)');}
  state.solved++;addXP(xpGain);
  if(!state.topicScores[q.t])state.topicScores[q.t]={done:0,correct:0};
  state.topicScores[q.t].done++;if(ok)state.topicScores[q.t].correct++;
  const today=new Date().toDateString();
  if(quizState.score>=8&&state.dailyDone!==today){state.dailyDone=today;addXP(50);addActivity('🔥','Daily challenge complete!','var(--accent3)');}
  updateStreak();checkBadges();saveState();
}
function nextQ(){quizState.idx++;renderMCQ();}
function skipQ(){quizState.idx++;renderMCQ();}

function showResult(){
  const area=document.getElementById('mcq-area');if(!area)return;
  const{questions,score}=quizState;const pct=Math.round(score/questions.length*100);
  const xpEarned=questions.reduce((s,q)=>s+q.d*5,0)+score*questions.reduce((s,q)=>s+q.d,0);
  area.innerHTML=`<div class="result-card fade-up"><div class="result-emoji">${pct>=80?'🎉':pct>=50?'👍':'😅'}</div><div class="result-score">${pct}%</div><div class="result-msg">${pct>=80?'Excellent!':pct>=50?'Good effort!':'Keep practicing!'}</div><div class="result-xp">+${xpEarned} XP earned</div><div class="result-bd"><div class="rb-item"><div class="rb-num" style="color:var(--accent2)">${score}</div><div class="rb-label">Correct</div></div><div class="rb-item"><div class="rb-num" style="color:var(--accent4)">${questions.length-score}</div><div class="rb-label">Wrong</div></div></div><button class="btn-retry" onclick="initQuiz(quizState.topic,quizState.diff)">Retry</button><button class="btn-dash" onclick="showView('dashboard')">Dashboard</button></div>`;
}

// TRUE/FALSE
function initTF(){
  const qs=shuffle(QS.map(q=>{const isTrue=Math.random()>.5;return{text:isTrue?q.q:q.o[(q.a+1)%q.o.length]+' — correct?',answer:isTrue,exp:q.e,d:q.d};})).slice(0,10);
  tfState={questions:qs,idx:0,score:0};renderTF();
}
function renderTF(){
  const area=document.getElementById('tf-area');if(!area)return;
  const{questions,idx}=tfState;
  if(idx>=questions.length){area.innerHTML=`<div class="result-card fade-up"><div class="result-emoji">🎯</div><div class="result-score">${Math.round(tfState.score/questions.length*100)}%</div><div class="result-msg">True/False Complete!</div><button class="btn-retry" onclick="initTF()">Again</button></div>`;return;}
  area.innerHTML=`<div class="q-badge">Q${idx+1}/${questions.length}</div><div class="q-text">"${questions[idx].text}"<br><br><span style="color:var(--muted);font-size:14px">True or False?</span></div><div style="display:flex;gap:12px;margin-bottom:16px"><button class="opt" style="flex:1;justify-content:center;font-size:16px" onclick="answerTF(true)">✅ True</button><button class="opt" style="flex:1;justify-content:center;font-size:16px" onclick="answerTF(false)">❌ False</button></div><div class="expl hidden" id="tf-expl"><div class="expl-t">Answer</div><div id="tf-et"></div></div><button class="btn-next hidden" id="tf-next">Next →</button>`;
}
function answerTF(val){
  const q=tfState.questions[tfState.idx];const ok=val===q.answer;
  if(ok)tfState.score++;
  document.querySelectorAll('.opt').forEach(o=>o.disabled=true);
  document.getElementById('tf-expl').classList.remove('hidden');
  document.getElementById('tf-et').textContent=(ok?'✅ Correct! ':'❌ Wrong! ')+q.exp;
  showToast(ok?'Correct!':'Wrong!',ok?'success':'error');
  const nb=document.getElementById('tf-next');nb.classList.remove('hidden');nb.onclick=()=>{tfState.idx++;renderTF();};
  state.solved++;if(ok)state.correct++;addXP(ok?q.d*5:q.d*2);updateStreak();checkBadges();saveState();
}
function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(el)el.classList.add('active');
  if(tab==='tf')initTF();else renderMCQ();
}

// ═════════════════════════════════════
// PRACTICE
// ═════════════════════════════════════
function renderPractice(){
  const area=document.getElementById('view-practice');
  if(practiceState.idx>=PRACTICE_Qs.length){area.innerHTML=`<div class="lh"><button class="lh-back" onclick="showView('dashboard')">←</button><div class="lh-title">Practice</div></div><div class="q-area"><div class="result-card"><div class="result-emoji">🎉</div><div class="result-score">Done!</div><div class="result-msg">Sab practice complete!</div><button class="btn-retry" onclick="practiceState.idx=0;renderPractice()">Restart</button></div></div>`;return;}
  const q=PRACTICE_Qs[practiceState.idx];
  area.innerHTML=`<div class="lh"><button class="lh-back" onclick="showView('dashboard')">←</button><div class="lh-title">Fill the Blanks</div><div class="lh-prog"><div class="lh-prog-fill" style="width:${practiceState.idx/PRACTICE_Qs.length*100}%"></div></div><div class="lh-count">${practiceState.idx+1}/${PRACTICE_Qs.length}</div></div><div class="q-area"><div class="q-badge">Practice ${practiceState.idx+1}</div><div class="q-text" style="font-size:16px">${q.q}</div><div class="code-block"><code>${q.pre?q.pre.replace(/\n/g,'<br>')+'<br>':''}<input class="code-blank" id="blank-input" placeholder="${q.hint}" autocomplete="off">${q.post.replace(/\n/g,'<br>')}</code></div><div class="expl hidden" id="p-expl"><div class="expl-t">Answer</div><div id="p-et"></div></div><div style="display:flex;gap:8px"><button class="check-btn" onclick="checkPractice()">Check ✓</button><button class="btn-skip" onclick="practiceState.idx++;renderPractice()">Skip</button></div></div>`;
  setTimeout(()=>{const inp=document.getElementById('blank-input');if(inp){inp.focus();inp.onkeydown=e=>{if(e.key==='Enter')checkPractice();};}},50);
}
function checkPractice(){
  const q=PRACTICE_Qs[practiceState.idx];const val=document.getElementById('blank-input').value.trim();
  const ok=q.ans.some(a=>val.toLowerCase()===a.toLowerCase());
  const inp=document.getElementById('blank-input');inp.classList.add(ok?'correct':'wrong');inp.disabled=true;
  document.getElementById('p-expl').classList.remove('hidden');
  document.getElementById('p-et').innerHTML=ok?`✅ Correct! <code>${q.ans[0]}</code>`:`❌ Wrong. Answer: <code>${q.ans[0]}</code>`;
  showToast(ok?'Correct!':'Wrong!',ok?'success':'error');
  state.solved++;if(ok)state.correct++;addXP(ok?8:2);updateStreak();checkBadges();saveState();
  setTimeout(()=>{practiceState.idx++;renderPractice();},1600);
}

// ═════════════════════════════════════
// FLASHCARDS
// ═════════════════════════════════════
function initFlash(){
  flashState={questions:shuffle([...QS]),idx:0};renderFlash();
}
function renderFlash(){
  const area=document.getElementById('view-flashcards');
  const{questions,idx}=flashState;const q=questions[idx];
  area.innerHTML=`<div class="lh"><button class="lh-back" onclick="showView('dashboard')">←</button><div class="lh-title">Flashcards</div><div class="lh-count">${idx+1}/${questions.length}</div></div><div class="q-area"><div class="flash-card" id="fc" onclick="document.getElementById('fc').classList.toggle('flipped')"><div class="flash-front">${q.q}</div><div class="flash-back">${q.e}${q.c?`<div class="expl-code">${q.c.replace(/\n/g,'<br>')}</div>`:''}</div><div class="flash-hint">Click to flip 👆</div></div><div class="flash-nav"><button class="flash-btn" onclick="if(flashState.idx>0){flashState.idx--;renderFlash();}">←</button><span style="color:var(--muted);font-size:12px">${idx+1}/${questions.length}</span><button class="flash-btn" onclick="if(flashState.idx<flashState.questions.length-1){flashState.idx++;renderFlash();}">→</button><button class="flash-btn" onclick="initFlash()" style="margin-left:8px;width:auto;padding:0 10px;font-size:11px">Shuffle</button></div></div>`;
}

// ═════════════════════════════════════
// LEADERBOARD + BADGES
// ═════════════════════════════════════
const BADGES_DEF=[
  {id:'first',i:'🌱',n:'First Step',d:'First question',c:s=>s.solved>=1},
  {id:'ten',i:'🔟',n:'Warming Up',d:'10 questions',c:s=>s.solved>=10},
  {id:'fifty',i:'🏅',n:'Half Century',d:'50 questions',c:s=>s.solved>=50},
  {id:'hundred',i:'💯',n:'Century',d:'100 questions',c:s=>s.solved>=100},
  {id:'streak3',i:'🔥',n:'On Fire',d:'3 day streak',c:s=>s.streak>=3},
  {id:'streak7',i:'⚡',n:'Unstoppable',d:'7 day streak',c:s=>s.streak>=7},
  {id:'acc',i:'🎯',n:'Sharpshooter',d:'80%+ accuracy',c:s=>s.solved>10&&(s.correct/s.solved)>=.8},
  {id:'explorer',i:'🗺️',n:'Explorer',d:'All 8 topics',c:s=>Object.keys(s.topicScores||{}).length>=8},
  {id:'asker',i:'❓',n:'Curious',d:'Ask AI 5 times',c:s=>s.askCount>=5},
  {id:'asker20',i:'💡',n:'Scholar',d:'Ask AI 20 times',c:s=>s.askCount>=20},
  {id:'lvl5',i:'👑',n:'Rising Star',d:'Reach Level 5',c:s=>getLevel()>=5},
  {id:'lvl10',i:'🏆',n:'Expert',d:'Reach Level 10',c:s=>getLevel()>=10},
];
function checkBadges(){BADGES_DEF.forEach(b=>{if(!state.badges.includes(b.id)&&b.c(state)){state.badges.push(b.id);showToast('Badge: '+b.i+' '+b.n,'success');addActivity('🏆','Earned: '+b.n,'var(--accent3)');}});}
function updateStreak(){const today=new Date().toDateString();if(state.lastDate!==today){const yest=new Date(Date.now()-86400000).toDateString();state.streak=(state.lastDate===yest)?state.streak+1:1;state.lastDate=today;}}

function renderLeaderboard(){
  const myScore=state.xp;
  const all=[...lbPlayers.map(p=>({...p,isMe:false})),{name:'Aap 👉',score:myScore,streak:state.streak,isMe:true,change:0}].sort((a,b)=>b.score-a.score);
  document.getElementById('view-leaderboard').innerHTML=`
  <div style="padding:24px">
    <h2 style="margin-bottom:16px;font-size:20px">Leaderboard 🏆</h2>
    <div>${all.map((p,i)=>`<div class="lb-item ${p.isMe?'lb-me':''}">
      <div class="lb-rank" style="color:${i===0?'#f7c76a':i===1?'#aaa':i===2?'#cd7f32':'var(--muted)'}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
      <div class="lb-name">${p.name}</div>
      <div class="lb-streak">${p.streak}🔥</div>
      ${!p.isMe?`<div class="lb-change ${p.change>5?'lb-up':p.change<-5?'lb-down':'lb-same'}">${p.change>5?'↑':'↓'}${Math.abs(p.change)||'—'}</div>`:'<div></div>'}
      <div class="lb-score">${p.score} XP</div>
    </div>`).join('')}</div>
    <h2 style="margin:24px 0 12px;font-size:20px">Badges (${state.badges.length}/${BADGES_DEF.length})</h2>
    <div class="badge-grid">${BADGES_DEF.map(b=>`<div class="badge-item ${state.badges.includes(b.id)?'':'locked'}"><div class="badge-icon">${b.i}</div><div class="badge-name">${b.n}</div><div class="badge-desc">${b.d}</div></div>`).join('')}</div>
  </div>`;
}

// ═════════════════════════════════════
// UTILS
// ═════════════════════════════════════
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+type;clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}

// ═════════════════════════════════════
updateLeaderboard();
renderDashboard();
