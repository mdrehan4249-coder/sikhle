<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PySeekho — Master Python</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ══════ THEME SYSTEM ══════ */
[data-theme="dark"]{
  --bg:#080a14;--bg2:#0e1120;--bg3:#161a30;--card:#141830;--card2:#1a1f3a;
  --border:#252a48;--border2:#2d3360;--accent:#8b7aff;--accent2:#4aeabc;--accent3:#ffc46b;
  --accent4:#ff6b8a;--text:#eef0ff;--text2:#c8cce8;--muted:#6a70a0;
  --glow:rgba(139,122,255,.12);--glow2:rgba(74,234,188,.08);--code-bg:#0c0f1c;
  --input-bg:#121628;--hover:rgba(139,122,255,.06);
}
[data-theme="light"]{
  --bg:#f4f5fb;--bg2:#ffffff;--bg3:#eef0f8;--card:#ffffff;--card2:#f8f9fd;
  --border:#dde0f0;--border2:#cdd1e8;--accent:#6c5ce7;--accent2:#00b894;--accent3:#fdcb6e;
  --accent4:#e17055;--text:#1a1c2e;--text2:#3d4060;--muted:#888daa;
  --glow:rgba(108,92,231,.08);--glow2:rgba(0,184,148,.06);--code-bg:#f0f1f8;
  --input-bg:#f0f2fa;--hover:rgba(108,92,231,.04);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg2);}::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px;}

/* ══════ BACKGROUND EFFECTS ══════ */
.bg-mesh{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.bg-mesh .orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:.5;animation:orbDrift 25s ease-in-out infinite alternate;}
[data-theme="light"] .bg-mesh .orb{opacity:.3;}
.bg-mesh .o1{width:500px;height:500px;background:var(--accent);top:-15%;left:-10%;animation-delay:0s;}
.bg-mesh .o2{width:400px;height:400px;background:var(--accent2);bottom:-10%;right:-5%;animation-delay:-8s;}
.bg-mesh .o3{width:300px;height:300px;background:var(--accent3);top:40%;left:50%;animation-delay:-16s;}
@keyframes orbDrift{0%{transform:translate(0,0) scale(1)}33%{transform:translate(50px,-30px) scale(1.1)}66%{transform:translate(-30px,50px) scale(.9)}100%{transform:translate(20px,20px) scale(1.05)}}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;
background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
background-size:80px 80px;opacity:.15;}
[data-theme="light"] .bg-grid{opacity:.3;}

/* ══════ NAV ══════ */
nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);transition:background .3s;}
.logo{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;color:var(--accent);display:flex;align-items:center;gap:6px;}
.logo .dot{width:8px;height:8px;border-radius:50%;background:var(--accent2);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.nav-center{display:flex;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.nav-center::-webkit-scrollbar{display:none;}
.nav-btn{background:transparent;border:none;color:var(--muted);padding:8px 14px;border-radius:10px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;transition:all .15s;white-space:nowrap;position:relative;}
.nav-btn:hover{color:var(--text);background:var(--hover);}
.nav-btn.active{color:#fff;background:var(--accent);}
.nav-right{display:flex;align-items:center;gap:8px;}
.theme-toggle{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;color:var(--accent3);}
.theme-toggle:hover{border-color:var(--accent);transform:scale(1.05);}

/* ══════ LAYOUT ══════ */
.app{display:flex;height:calc(100vh - 54px);position:relative;z-index:1;}
.sidebar{width:210px;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;transition:background .3s,transform .3s;}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;}
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:0;}
.hidden{display:none!important;}
.menu-btn{display:none;width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:18px;color:var(--text);align-items:center;justify-content:center;}

/* ══════ SIDEBAR ══════ */
.sb-label{padding:16px 16px 8px;font-size:10px;font-weight:800;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.sb-item{padding:10px 14px;margin:2px 8px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--muted);transition:all .12s;}
.sb-item:hover{background:var(--hover);color:var(--text);}
.sb-item.active{background:var(--glow);color:var(--accent);}
.sb-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sb-pct{margin-left:auto;font-size:10px;font-family:'Space Mono',monospace;color:var(--muted);}
.sb-diff{display:flex;gap:3px;margin-top:2px;}
.sb-star{font-size:8px;}
.sb-star.f1{color:var(--accent2);}
.sb-star.f2{color:var(--accent3);}
.sb-star.f3{color:var(--accent4);}

/* ══════ ANIMATIONS ══════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideR{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes dotPulse{0%,100%{opacity:.3}50%{opacity:1}}
.fade-up{animation:fadeUp .4s ease both;}
.fade-in{animation:fadeIn .3s ease both;}
.stagger>*:nth-child(1){animation-delay:.05s}.stagger>*:nth-child(2){animation-delay:.1s}.stagger>*:nth-child(3){animation-delay:.15s}.stagger>*:nth-child(4){animation-delay:.2s}.stagger>*:nth-child(5){animation-delay:.25s}.stagger>*:nth-child(6){animation-delay:.3s}.stagger>*:nth-child(7){animation-delay:.35s}.stagger>*:nth-child(8){animation-delay:.4s}

/* ══════ DASHBOARD ══════ */
.dash{padding:20px;max-width:900px;margin:0 auto;}
.hero-card{background:linear-gradient(135deg,var(--card2),var(--glow));border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px;position:relative;overflow:hidden;}
.hero-card::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:var(--accent);opacity:.06;}
.hero-card h1{font-size:22px;font-weight:900;line-height:1.3;margin-bottom:8px;}
.hero-card h1 em{font-style:normal;color:var(--accent2);}
.hero-card p{color:var(--muted);font-size:14px;line-height:1.5;margin-bottom:20px;}
.hero-btns{display:flex;gap:10px;flex-wrap:wrap;}
.btn-start{background:var(--accent);color:#fff;border:none;padding:14px 32px;border-radius:14px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(139,122,255,.3);}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(139,122,255,.4);}
.btn-start:active{transform:translateY(0);}
.btn-outline{background:transparent;color:var(--accent);border:2px solid var(--accent);padding:12px 28px;border-radius:14px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-outline:hover{background:var(--accent);color:#fff;transform:translateY(-1px);}

.stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;transition:all .2s;}
.stat-card:hover{border-color:var(--border2);transform:translateY(-2px);}
.stat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.stat-icon{font-size:20px;}
.stat-num{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;}
.stat-label{font-size:11px;color:var(--muted);font-weight:600;}

.xp-row{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:20px;}
.xp-ring{width:60px;height:60px;flex-shrink:0;position:relative;}
.xp-ring svg{width:100%;height:100%;transform:rotate(-90deg);}
.xp-ring circle{fill:none;stroke-width:5;stroke-linecap:round;}
.xp-ring .bg-r{stroke:var(--bg3);}
.xp-ring .fg-r{stroke:var(--accent);transition:stroke-dashoffset .6s;}
.xp-ring .fg-r.gold{stroke:var(--accent3);}
.xp-lvl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:16px;font-weight:700;color:var(--accent);}
.xp-lvl.gold{color:var(--accent3);}
.xp-info{flex:1;}
.xp-bar{width:100%;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-bottom:6px;}
.xp-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s;}
.xp-bar-fill.gold{background:linear-gradient(90deg,var(--accent3),var(--accent4));}
.xp-text{font-size:11px;color:var(--muted);}

.section-title{font-size:16px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.section-title span{color:var(--accent);}

.topics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:20px;}
.topic-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.topic-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.2);}
.topic-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0;}
.topic-card .tc-icon{font-size:24px;margin-bottom:8px;}
.topic-card h3{font-size:13px;font-weight:800;margin-bottom:2px;}
.topic-card p{font-size:11px;color:var(--muted);}
.tc-bar{height:3px;background:var(--bg3);border-radius:2px;margin-top:10px;overflow:hidden;}
.tc-fill{height:100%;border-radius:2px;transition:width .4s;}
.tc-diff{display:flex;gap:4px;margin-top:6px;font-size:9px;}
.tc-diff span{padding:1px 6px;border-radius:4px;font-weight:700;}

.daily-card{background:linear-gradient(135deg,rgba(139,122,255,.1),rgba(74,234,188,.06));border:1px solid rgba(139,122,255,.2);border-radius:14px;padding:16px;margin-bottom:20px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s;}
.daily-card:hover{transform:translateX(4px);border-color:var(--accent);}
.daily-icon{font-size:28px;}
.daily-text h4{font-size:14px;font-weight:800;margin-bottom:2px;}
.daily-text p{font-size:12px;color:var(--muted);}
.daily-reward{font-size:11px;color:var(--accent3);font-weight:700;background:rgba(255,196,107,.1);padding:2px 8px;border-radius:6px;margin-top:4px;display:inline-block;}

/* ══════ PROBLEM SOLVING ══════ */
.ps-tabs{display:flex;gap:8px;padding:20px 20px 0;flex-wrap:wrap;}
.ps-tab{padding:10px 20px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;font-size:13px;font-weight:700;transition:all .2s;display:flex;align-items:center;gap:6px;}
.ps-tab:hover{border-color:var(--accent);color:var(--text);}
.ps-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.ps-tab .ps-count{background:rgba(255,255,255,.15);padding:1px 6px;border-radius:6px;font-size:11px;}
.ps-tab.active .ps-count{background:rgba(255,255,255,.2);}
.ps-content{padding:20px;}
.ps-item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px;cursor:pointer;transition:all .2s;display:flex;gap:14px;align-items:flex-start;}
.ps-item:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.15);}
.ps-num{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;flex-shrink:0;}
.ps-num.easy{background:rgba(74,234,188,.12);color:var(--accent2);}
.ps-num.medium{background:rgba(255,196,107,.12);color:var(--accent3);}
.ps-num.hard{background:rgba(255,107,138,.12);color:var(--accent4);}
.ps-body{flex:1;}
.ps-body h4{font-size:14px;font-weight:800;margin-bottom:4px;line-height:1.3;}
.ps-body p{font-size:12px;color:var(--muted);line-height:1.4;}
.ps-tags{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;}
.ps-tag{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:700;background:var(--bg3);color:var(--muted);}
.ps-done{font-size:16px;color:var(--accent2);}

/* ══════ QUIZ ══════ */
.diff-bar{display:flex;gap:6px;padding:12px 20px;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;}
.diff-btn{padding:8px 16px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;font-size:12px;font-weight:700;transition:all .15s;white-space:nowrap;}
.diff-btn:hover{border-color:var(--accent);color:var(--text);}
.diff-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.lh{padding:14px 20px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;gap:10px;}
.lh-back{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px;transition:all .15s;flex-shrink:0;}
.lh-back:hover{border-color:var(--accent);color:var(--accent);}
.lh-title{font-size:15px;font-weight:800;flex-shrink:0;}
.lh-prog{flex:1;min-width:60px;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.lh-prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .3s;}
.lh-count{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;flex-shrink:0;}

.q-area{padding:20px;max-width:640px;margin:0 auto;}
.q-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:8px;font-size:11px;color:var(--muted);margin-bottom:14px;font-weight:700;background:var(--bg3);}
.q-diff{font-size:9px;padding:2px 7px;border-radius:6px;font-weight:800;margin-left:4px;}
.q-diff.basic{background:rgba(74,234,188,.12);color:var(--accent2);}
.q-diff.inter{background:rgba(255,196,107,.12);color:var(--accent3);}
.q-diff.adv{background:rgba(255,107,138,.12);color:var(--accent4);}
.q-text{font-size:17px;font-weight:800;line-height:1.4;margin-bottom:18px;}
.opts{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
.opt{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:13px 16px;cursor:pointer;font-size:14px;font-weight:600;transition:all .15s;text-align:left;color:var(--text);display:flex;align-items:center;gap:10px;}
.opt:hover:not(:disabled){border-color:var(--accent);background:var(--hover);}
.opt.correct{border-color:var(--accent2);background:rgba(74,234,188,.08);color:var(--accent2);}
.opt.wrong{border-color:var(--accent4);background:rgba(255,107,138,.08);color:var(--accent4);}
.opt:disabled{cursor:default;}
.opt-l{width:26px;height:26px;border-radius:7px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:11px;flex-shrink:0;transition:all .15s;}
.opt.correct .opt-l{background:var(--accent2);color:var(--bg);}
.opt.wrong .opt-l{background:var(--accent4);color:var(--bg);}
.expl{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:16px;font-size:13px;line-height:1.5;display:none;}
.expl.show{display:block;animation:fadeUp .3s ease;}
.expl-t{font-size:10px;font-weight:800;color:var(--accent2);margin-bottom:4px;letter-spacing:1px;text-transform:uppercase;}
.expl-code{font-family:'Space Mono',monospace;background:var(--code-bg);padding:8px 12px;border-radius:8px;font-size:11px;margin-top:6px;color:var(--accent3);border-left:3px solid var(--accent);line-height:1.6;white-space:pre-wrap;}
.q-acts{display:flex;gap:8px;}
.btn-next{background:var(--accent);color:#fff;border:none;padding:12px 28px;border-radius:12px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-next:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(139,122,255,.3);}
.btn-skip{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:12px 20px;border-radius:12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-skip:hover{border-color:var(--muted);}

.result-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px;text-align:center;max-width:420px;margin:28px auto;}
.result-emoji{font-size:48px;margin-bottom:10px;}
.result-score{font-family:'Space Mono',monospace;font-size:42px;font-weight:700;color:var(--accent2);margin-bottom:6px;}
.result-msg{font-size:14px;color:var(--muted);margin-bottom:6px;}
.result-xp{font-size:13px;color:var(--accent3);font-weight:700;margin-bottom:20px;}
.result-bd{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.rb-item{background:var(--bg3);border-radius:10px;padding:12px;}
.rb-num{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;}
.rb-label{font-size:11px;color:var(--muted);}
.btn-retry{background:var(--accent);color:#fff;border:none;padding:12px 24px;border-radius:12px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-right:8px;transition:all .2s;}
.btn-retry:hover{transform:translateY(-1px);}
.btn-dash{background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px 20px;border-radius:12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}

/* ══════ ASK ENGINE ══════ */
.ask-wrap{max-width:660px;padding:20px;margin:0 auto;}
.ask-hints{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.ask-hint{background:var(--bg3);border:1px solid var(--border);padding:5px 12px;border-radius:20px;font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s;}
.ask-hint:hover{border-color:var(--accent);color:var(--accent);}
.ask-input-wrap{display:flex;gap:8px;margin-bottom:16px;align-items:flex-end;}
.ask-ta{flex:1;background:var(--input-bg);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;font-family:'Nunito',sans-serif;font-size:14px;color:var(--text);resize:vertical;min-height:50px;max-height:160px;outline:none;transition:border-color .2s;}
.ask-ta:focus{border-color:var(--accent);}
.ask-ta::placeholder{color:var(--muted);}
.ask-send{width:50px;height:50px;border-radius:14px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.ask-send:hover{transform:scale(1.05);box-shadow:0 4px 16px rgba(139,122,255,.3);}
.ask-send:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.chat{display:flex;flex-direction:column;gap:12px;}
.cmsg{display:flex;gap:10px;animation:fadeUp .3s ease;}
.cavatar{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.cuser .cavatar{background:var(--accent);color:#fff;}
.cbot .cavatar{background:var(--accent2);color:var(--bg);}
.cbubble{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;flex:1;line-height:1.5;font-size:13px;transition:background .3s,border-color .3s;}
.cuser .cbubble{border-color:var(--accent);background:var(--glow);}
.cbot .cbubble{border-color:rgba(74,234,188,.15);}
.cbubble code{font-family:'Space Mono',monospace;background:var(--code-bg);padding:1px 5px;border-radius:4px;font-size:11px;color:var(--accent3);}
.cbubble pre{background:var(--code-bg);padding:10px 14px;border-radius:8px;margin:6px 0;font-family:'Space Mono',monospace;font-size:11px;overflow-x:auto;border-left:3px solid var(--accent2);color:var(--accent3);line-height:1.5;white-space:pre-wrap;}
.cbubble .etag{display:inline-block;background:rgba(255,107,138,.1);color:var(--accent4);padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;margin-bottom:6px;}
.cbubble .ctag{display:inline-block;background:rgba(74,234,188,.1);color:var(--accent2);padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;margin-bottom:6px;}
.cbubble .itag{display:inline-block;background:rgba(139,122,255,.1);color:var(--accent);padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;margin-bottom:6px;}
.cbubble .wtag{display:inline-block;background:rgba(255,196,107,.1);color:var(--accent3);padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;margin-bottom:6px;}
.dots span{animation:dotPulse 1.2s infinite;display:inline-block;}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}

/* ══════ LEADERBOARD ══════ */
.lb-timer{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;display:flex;align-items:center;gap:6px;margin-bottom:14px;}
.spin-icon{display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;}

.lb-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:6px;transition:all .15s;}
.lb-item:hover{transform:translateX(3px);}
.lb-rank{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;width:28px;text-align:center;}
.lb-name{font-weight:700;flex:1;font-size:13px;}
.lb-str{font-size:10px;color:var(--muted);}
.lb-chg{font-size:10px;font-weight:700;padding:2px 5px;border-radius:5px;}
.lb-up{color:var(--accent2);background:rgba(74,234,188,.1);}
.lb-dn{color:var(--accent4);background:rgba(255,107,138,.1);}
.lb-sm{color:var(--muted);background:var(--bg3);}
.lb-sc{font-family:'Space Mono',monospace;color:var(--accent2);font-weight:700;font-size:13px;}
.lb-me{border-color:var(--accent)!important;background:var(--glow)!important;}
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;}
.badge-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 6px;text-align:center;transition:all .15s;}
.badge-item:hover{transform:translateY(-2px);}
.badge-icon{font-size:26px;margin-bottom:4px;}
.badge-name{font-size:10px;font-weight:700;margin-bottom:2px;}
.badge-desc{font-size:9px;color:var(--muted);}
.badge-item.locked{opacity:.25;filter:grayscale(1);}

/* ══════ PRACTICE ══════ */
.code-block{background:var(--code-bg);border:1px solid var(--border);border-radius:12px;padding:14px 18px;font-family:'Space Mono',monospace;font-size:13px;line-height:1.8;margin-bottom:16px;}
.code-blank{background:transparent;border:none;border-bottom:2px solid var(--accent);color:var(--accent2);font-family:'Space Mono',monospace;font-size:13px;width:100px;text-align:center;outline:none;padding:0 4px;}
.code-blank.correct{border-color:var(--accent2);color:var(--accent2);}
.code-blank.wrong{border-color:var(--accent4);color:var(--accent4);}
.check-btn{background:var(--accent2);border:none;color:var(--bg);padding:10px 22px;border-radius:10px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.check-btn:hover{transform:translateY(-1px);}

/* ══════ FLASHCARDS ══════ */
.fc{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;text-align:center;cursor:pointer;min-height:170px;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:all .25s;max-width:520px;margin:14px auto;user-select:none;}

.fc-h{font-size:10px;color:var(--muted);margin-top:12px;}
.fc.flip .fc-f{display:none;}

.fc-nav{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:8px;}
.fc-btn{background:var(--card);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.fc-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ══════ ROADMAP ══════ */
.rm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px;}
.rm-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;display:flex;gap:10px;align-items:flex-start;transition:all .15s;}
.rm-item:hover{border-color:var(--accent);transform:translateY(-1px);}
.rm-i{font-size:20px;flex-shrink:0;}
.rm-t h4{font-size:12px;font-weight:800;margin-bottom:2px;}
.rm-t p{font-size:11px;color:var(--muted);line-height:1.4;}
.rm-s{font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;margin-top:3px;display:inline-block;}
.rm-soon{background:rgba(74,234,188,.1);color:var(--accent2);}
.rm-later{background:rgba(255,196,107,.1);color:var(--accent3);}
.rm-plan{background:var(--bg3);color:var(--muted);}

.toast{position:fixed;bottom:16px;right:16px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 18px;font-size:13px;font-weight:600;z-index:999;transform:translateY(70px);opacity:0;transition:all .3s;backdrop-filter:blur(12px);}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-color:var(--accent2);color:var(--accent2);}
.toast.error{border-color:var(--accent4);color:var(--accent4);}
.toast.info{border-color:var(--accent);color:var(--accent);}

const PROBLEMS=[
  // EASY
  {d:'easy',q:"Write a function that returns the sum of two numbers.",tags:['Functions','Basics'],solution:"def add(a, b):\n    return a + b\n\nprint(add(3, 5))  # 8"},

  {d:'easy',q:"Find the largest number in a list without using max().",tags:['Lists','Loops'],solution:"def find_max(nums):\n    largest = nums[0]\n    for n in nums:\n        if n > largest:\n            largest = n\n    return largest\n\nprint(find_max([3,7,2,9,1]))  # 9"},

  {d:'medium',q:"Check if a string is a palindrome.",tags:['Strings','Logic'],solution:"def is_palindrome(s):\n    s = s.lower().replace(' ', '')\n    return s == s[::-1]\n\nprint(is_palindrome('racecar'))  # True\nprint(is_palindrome('hello'))    # False"},
  {d:'medium',q:"Find the factorial of a number using recursion.",tags:['Functions','Recursion'],solution:"def factorial(n):\n    if n <= 1:\n        return 1\n    return n * factorial(n - 1)\n\nprint(factorial(5))  # 120"},
  {d:'medium',q:"Count frequency of each character in a string using a dictionary.",tags:['Dicts','Strings'],solution:"def char_freq(s):\n    freq = {}\n    for char in s:\n        freq[char] = freq.get(char, 0) + 1\n    return freq\n\nprint(char_freq('hello'))\n# {'h':1,'e':1,'l':2,'o':1}"},
  {d:'medium',q:"Implement bubble sort on a list.",tags:['Lists','Algorithms'],solution:"def bubble_sort(arr):\n    n = len(arr)\n    for i in range(n):\n        for j in range(0, n-i-1):\n            if arr[j] > arr[j+1]:\n                arr[j], arr[j+1] = arr[j+1], arr[j]\n    return arr\n\nprint(bubble_sort([64,34,25,12,22]))\n# [12,22,25,34,64]"},

  {d:'hard',q:"Write a function that checks if two strings are anagrams.",tags:['Strings','Dicts','Logic'],solution:"def is_anagram(s1, s2):\n    s1 = s1.lower().replace(' ', '')\n    s2 = s2.lower().replace(' ', '')\n    return sorted(s1) == sorted(s2)\n\n# Or with dict:\ndef is_anagram2(s1, s2):\n    s1, s2 = s1.lower(), s2.lower()\n    if len(s1) != len(s2):\n        return False\n    count = {}\n    for c in s1: count[c] = count.get(c,0)+1\n    for c in s2: count[c] = count.get(c,0)-1\n    return all(v==0 for v in count.values())\n\nprint(is_anagram('listen','silent'))  # True"},
  {d:'hard',q:"Implement a basic linked list with insert, delete, and display.",tags:['OOP','Data Structures','Pointers'],solution:"class Node:\n    def __init__(self, data):\n        self.data = data\n        self.next = None\n\nclass LinkedList:\n    def __init__(self):\n        self.head = None\n    def insert(self, data):\n        new_node = Node(data)\n        new_node.next = self.head\n        self.head = new_node\n    def delete(self, key):\n        curr = self.head\n        prev = None\n        while curr:\n            if curr.data == key:\n                if prev: prev.next = curr.next\n                else: self.head = curr.next\n                return\n            prev = curr\n            curr = curr.next\n    def display(self):\n        result = []\n        curr = self.head\n        while curr:\n            result.append(str(curr.data))\n            curr = curr.next\n        print(' -> '.join(result))\n\nll = LinkedList()\nll.insert(10)\nll.insert(20)\nll.insert(30)\nll.display()  # 30 -> 20 -> 10\nll.delete(20)\nll.display()  # 30 -> 10"},

  {keys:['is vs ==','identity','equality','same object'],resp:"<span class='wtag'>COMMON MISTAKE</span><br><code>==</code> compares values. <code>is</code> compares identity.<pre>a = [1,2,3]\nb = [1,2,3]\n\na == b    # True (same values)\na is b    # False (different objects!)\n\na = [1,2,3]\nb = a\na is b    # True (same object)\n\n# For None, always use 'is'\nx = None\nx == None  # True but not recommended\nx is None  # True (correct!)\n\n# Cache behavior (small ints)\na = 256\nb = 256\na is b  # True (cached)\n\na = 257\nb = 257\na is b  # False (not cached!)\n\n# Strings\na = 'hello'\nb = 'hello'\na is b  # True (interned)</pre>"},
  {keys:['mutable','immutable','change','modify','cannot change'],resp:"<span class='itag'>MUTABILITY</span><br><pre># MUTABLE (can change after creation)\nlist  = [1,2,3]\ndict  = {'a':1}\nset   = {1,2,3}\nbytearray = b'abc'\n\n# IMMUTABLE (cannot change)\nint     = 42\nfloat   = 3.14\nstr     = 'hello'\ntuple   = (1,2,3)\nfrozenset = frozenset([1,2])\nbytes   = b'abc'\n\n# Why it matters:\ndef add_item(lst, item):\n    lst.append(item)  # modifies original!\n\ndef bad_func(x):\n    x = x + '!'  # creates NEW string\n    # original unchanged!\n\n# Tuple as dict key (immutable)\nd = {(1,2): 'value'}  # OK\n# d = {[1,2]: 'value'}  # TypeError!</pre>"},
  {keys:['deep copy','shallow copy','copy','deepcopy','reference'],resp:"<span class='wtag'>COMMON MISTAKE</span><br><pre>import copy\n\n# Assignment = same reference\na = [1,2,[3,4]]\nb = a             # b points to SAME list\nb[0] = 99\nprint(a)  # [99,2,[3,4]] — a changed too!\n\n# Shallow copy\nb = a.copy()       # or list(a)\nb[0] = 99\nprint(a)  # [1,2,[3,4]] — a safe\nb[2][0] = 99\nprint(a)  # [1,2,[99,4]] — nested CHANGED!\n\n# Deep copy (safe!)\nb = copy.deepcopy(a)\nb[2][0] = 99\nprint(a)  # [1,2,[3,4]] — fully safe!\n\n# For dicts\nd2 = d.copy()           # shallow\nd2 = copy.deepcopy(d)    # deep\n\n# For tuples (immutable, but...)\nt = ([1,2], [3,4])\nt2 = copy.deepcopy(t)  # needed if nested</pre>"},
];

const WRONG_PAT=[
  {p:/list\s*(is|are)\s*(immutable|unchangeable|can'?t change)/i,w:"Lists are <strong>mutable</strong> — you CAN change them. You're thinking of tuples.",f:"my_list = [1,2,3]\nmy_list[0] = 99  # Works!\n\nmy_tuple = (1,2,3)\nmy_tuple[0] = 99  # TypeError!"},
  {p:/tuple\s*(is|are)\s*(mutable|changeable|can change)/i,w:"Tuples are <strong>immutable</strong> — cannot change after creation.",f:"t = (1,2,3)\nt[0] = 99  # TypeError!"},
  {p:/input\s*\(\s*\)\s*(returns|gives)\s*(an?\s*)?(int|integer|number)/i,w:"input() <strong>always returns string</strong>. Convert with int() or float().",f:"x = input()      # '25' (string!)\nx = int(input())  # 25 (int)"},
  {p:/(python|it)\s*(is|are)\s*(a\s*)?compiled/i,w:"Python is <strong>interpreted</strong>. It compiles to bytecode internally but is fundamentally interpreted.",f:"python script.py  # runs directly\n# C is compiled:\ngcc program.c -o program"},
  {p:/none\s*(is|means|equals)\s*(0|zero|empty|false|'')/i,w:"None is NOT 0, False, or ''. It's <code>NoneType</code>.",f:"type(None)  # <class 'NoneType'>\nNone == 0   # False\nNone == ''   # False\nNone is None  # True"},
  {p:/#\s*(is|does not|doesn'?t)\s*(not\s*)?(work|comment)/i,w:"# <strong>IS</strong> how you write comments in Python.",f:"# This is a comment\nprint('hi')  # inline comment"},
  {p:/(=|==)\s*(is|are)\s*(the same|same thing|identical)/i,w:"<code>=</code> assigns. <code>==</code> compares. Completely different.",f:"x = 10   # assign\nx == 10  # compare -> True"},
  {p:/append\s*(returns|gives|gives back)/i,w:".append() returns <strong>None</strong>! It modifies the list in place.",f:"# WRONG:\nresult = my_list.append(4)\nprint(result)  # None!\n\n# RIGHT:\nmy_list.append(4)\nprint(my_list)  # [..., 4]"},
  {p:/is\s+vs\s+==|==\s+vs\s+is/i,w:"<code>==</code> checks value equality. <code>is</code> checks object identity (same object in memory).",f:"a = [1,2]\nb = [1,2]\na == b  # True (same values)\na is b  # False (different objects)\n\na = None\na is None  # True (correct for None)"},
];

function processQuestion(input){
  const q=input.trim().toLowerCase();
  // Wrong patterns
  for(const wp of WRONG_PAT){if(wp.p.test(q))return `<span class='etag'>INCORRECT STATEMENT</span><br><br>${wp.w}<pre>${wp.f}</pre>`;}
  // Code evaluation
  const cr=evalCode(input.trim());
  if(cr)return cr;
  // Knowledge base
  let best=null,bs=0;
  for(const e of KB){let s=0;for(const k of e.keys)if(q.includes(k.toLowerCase()))s+=k.length;if(s>bs){bs=s;best=e;}}
  if(best&&bs>=2)return best.resp;
  // Fallback
  const suggestions=KB.slice(0,6).map(e=>`"${e.keys[0]}"`).join(', ');
  return `<span class='itag'>NO EXACT MATCH</span><br><br>I don't have a specific entry for that. Try asking about:<br><br><pre>${suggestions}\n\n# Or paste code like:\n# print(2 + 3)\n# x = [1,2,3]\n# type(3.14)</pre>`;
}

function evalCode(input){
  const lines=input.trim().split('\n');const results=[];
  for(const line of lines){
    const lt=line.trim();if(!lt||lt.startsWith('#'))continue;
    const pm=lt.match(/^print\s*\(\s*(.+?)\s*\)$/);
    if(pm){
      const expr=pm[1].trim();let r=null;
      if(/^['"][^'"]+['"]\s*\+\s*['"][^'"]+['"]$/.test(expr)){const p=expr.match(/['"]([^'"]+)['"]/g);if(p)r=p.map(x=>x.slice(1,-1)).join('');}
      else if(/^len\s*\(\s*['"]([^'"]+)['"]\s*\)$/.test(expr)){const s=expr.match(/['"]([^'"]+)['"]/);if(s)r=s[1].length;}
      else if(/^type\s*\(\s*(.+?)\s*\)$/.test(expr)){const inner=expr.match(/type\s*\(\s*(.+?)\s*\)/)[1].trim();if(/^['"]/.test(inner))r="<class 'str'>";else if(/^\d+$/.test(inner))r="<class 'int'>";else if(/^\d+\.\d+$/.test(inner))r="<class 'float'>";else if(inner==='True'||inner==='False')r="<class 'bool'>";else if(inner==='None')r="<class 'NoneType'>";}
      else if(/^[\d\s\+\-\*\/\%\(\)\.]+$/.test(expr)){try{r=eval(expr);}catch(e){}}
      else if(expr==='True')r='True';else if(expr==='False')r='False';else if(expr==='None')r='None';
      else if(/^list\s*\(\s*range\s*\(.+\)\s*\)$/.test(expr)){const args=expr.match(/range\s*\((.+)\)/)[1].split(',').map(s=>parseInt(s.trim()));let st=0,sp=args[0],step=1;if(args.length===2){st=args[0];sp=args[1];}if(args.length===3){st=args[0];sp=args[1];step=args[2];}const arr=[];if(step>0){for(let i=st;i<sp;i+=step)arr.push(i);}else if(step<0){for(let i=st;i>sp;i+=step)arr.push(i);}r='['+arr.join(', ')+']';}
      if(r!==null)results.push(`print(${esc(expr)})  # ${r}`);
    }
    const am=lt.match(/^(\w+)\s*=\s*(.+)$/);
    if(am&&!lt.includes('def ')&&!lt.includes('class ')){const v=am[2].trim();let vt='unknown';if(/^['"]/.test(v))vt='str';else if(/^\d+$/.test(v))vt='int';else if(/^\d+\.\d+$/.test(v))vt='float';else if(v==='True'||v==='False')vt='bool';else if(v==='None')vt='NoneType';else if(v.startsWith('['))vt='list';else if(v.startsWith('('))vt='tuple';else if(v.startsWith('{')&&v.includes(':'))vt='dict';else if(v.startsWith('{'))vt='set';if(vt!=='unknown')results.push(`${am[1]} = ${esc(v)}  # <class '${vt}'>`);}
  }
  if(results.length)return `<span class='ctag'>CODE ANALYSIS</span><br><pre>${results.join('\n')}</pre>`;
  return null;
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  if(diff>0)qs=qs.filter(q=>q.d===diff);
  qs=shuffle([...qs]).slice(0,Math.min(qs.length,12));
  if(!qs.length)qs=shuffle([...QS]).slice(0,10);
  qS={qs,i:0,sc:0,ans:false,topic:tid,diff};
  renderQuiz();
}
function renderQuiz(){
  const tName=qS.topic?T.find(t=>t.id===qS.topic)?.name+' Quiz':'Mixed Quiz';
  const diffNames=['All','Basic ★','Intermediate ★★','Advanced ★★★'];
  const diffCls=['','basic','inter','adv'];
  document.getElementById('mc').innerHTML=`<div class="diff-bar">
    <button class="diff-btn ${qS.diff===0?'active':''}" onclick="initQuiz(${qS.topic?`'${qS.topic}'`:'null'},0)">All</button>
    <button class="diff-btn ${qS.diff===1?'active':''}" onclick="initQuiz(${qS.topic?`'${qS.topic}'`:'null'},1)">★ Basic</button>
    <button class="diff-btn ${qS.diff===2?'active':''}" onclick="initQuiz(${qS.topic?`'${qS.topic}'`:'null'},2)">★★ Intermediate</button>
    <button class="diff-btn ${qS.diff===3?'active':''}" onclick="initQuiz(${qS.topic?`'${qS.topic}'`:'null'},3)">★★★ Advanced</button>
  </div>
  <div class="lh"><button class="lh-back" onclick="go('dash')">←</button><div class="lh-title">${tName}</div><div class="lh-prog"><div class="lh-prog-fill" id="qp" style="width:0%"></div></div><div class="lh-count" id="qc">0/0</div></div>
  <div class="q-area" id="qa"></div>`;
  renderQ();
}
function renderQ(){
  const a=document.getElementById('qa');if(!a)return;
  if(qS.i>=qS.qs.length){showRes();return;}
  const q=qS.qs[qS.i];const dl=['','Basic','Intermediate','Advanced'];
  document.getElementById('qp').style.width=(qS.i/qS.qs.length*100)+'%';
  document.getElementById('qc').textContent=`${qS.i+1}/${qS.qs.length}`;
  a.innerHTML=`<div class="q-badge">${T.find(t=>t.id===q.t)?.icon||'?'} ${T.find(t=>t.id===q.t)?.name||q.t}<span class="q-diff ${dl[q.d].toLowerCase()}">${dl[q.d]}</span></div><div class="q-text">${q.q}</div><div class="opts">${q.o.map((o,i)=>`<button class="opt" onclick="selOpt(${i})"><span class="opt-l">${'ABCD'[i]}</span>${o}</button>`).join('')}</div><div class="expl" id="ex"><div class="expl-t">Explanation</div><div>${q.e}</div>${q.c?`<div class="expl-code">${q.c.replace(/\n/g,'<br>')}</div>`:''}</div><div class="q-acts"><button class="btn-next hidden" id="bn" onclick="qS.i++;renderQ()">Next →</button><button class="btn-skip" onclick="qS.i++;renderQ()">Skip</button></div>`;
  qS.ans=false;
}
function selOpt(i){
  if(qS.ans)return;qS.ans=true;const q=qS.qs[qS.i];
  document.querySelectorAll('.opt').forEach((o,idx)=>{o.disabled=true;if(idx===q.a)o.classList.add('correct');else if(idx===i)o.classList.add('wrong');});
  document.getElementById('ex').classList.add('show');document.getElementById('bn').classList.remove('hidden');
  const ok=i===q.a;const xp=q.d*5+(ok?q.d*5:0);
  if(ok){qS.sc++;S.correct++;showToast(`+${xp} XP`,'success');}else showToast('Wrong!','error');
  S.solved++;addXP(xp);if(!S.ts[q.t])S.ts[q.t]={d:0,c:0};S.ts[q.t].d++;if(ok)S.ts[q.t].c++;
  if(qS.sc>=8&&S.dailyDone!==new Date().toDateString()){S.dailyDone=new Date().toDateString();addXP(50);}
  updateStreak();checkBadges();save();
}
function showRes(){
  const a=document.getElementById('qa');if(!a)return;
  const pct=Math.round(qS.sc/qS.qs.length*100);const xp=qS.qs.reduce((s,q)=>s+q.d*5,0)+qS.sc*qS.qs.reduce((s,q)=>s+q.d,0);
  a.innerHTML=`<div class="result-card fade-up"><div class="result-emoji">${pct>=80?'🎉':pct>=50?'👍':'😅'}</div><div class="result-score">${pct}%</div><div class="result-msg">${pct>=80?'Excellent!':pct>=50?'Good effort!':'Keep trying!'}</div><div class="result-xp">+${xp} XP earned</div><div class="result-bd"><div class="rb-item"><div class="rb-num" style="color:var(--accent2)">${qS.sc}</div><div class="rb-label">Correct</div></div><div class="rb-item"><div class="rb-num" style="color:var(--accent4)">${qS.qs.length-qS.sc}</div><div class="rb-label">Wrong</div></div></div><button class="btn-retry" onclick="initQuiz(qS.topic,qS.diff)">Retry</button><button class="btn-dash" onclick="go('dash')">Home</button></div>`;
}

// ═══════════════════════════════════
// PRACTICE
// ═══════════════════════════════════
let pIdx=0;
function renderPractice(){
  const a=document.getElementById('mc');
  if(pIdx>=PRACTICE_Qs.length){a.innerHTML=`<div class="lh"><button class="lh-back" onclick="go('dash')">←</button><div class="lh-title">Practice</div></div><div class="q-area"><div class="result-card"><div class="result-emoji">🎉</div><div class="result-score">Done!</div><div class="result-msg">All practice complete!</div><button class="btn-retry" onclick="pIdx=0;renderPractice()">Restart</button></div></div>`;return;}
  const q=PRACTICE_Qs[pIdx];
  a.innerHTML=`<div class="lh"><button class="lh-back" onclick="go('dash')">←</button><div class="lh-title">Fill the Blanks</div><div class="lh-prog"><div class="lh-prog-fill" style="width:${pIdx/PRACTICE_Qs.length*100}%"></div></div><div class="lh-count">${pIdx+1}/${PRACTICE_Qs.length}</div></div>
  <div class="q-area"><div class="q-badge">Practice ${pIdx+1}</div><div class="q-text" style="font-size:15px">${q.q}</div><div class="code-block"><code>${q.pre?q.pre.replace(/\n/g,'<br>')+'<br>':''}<input class="code-blank" id="bi" placeholder="${q.hint}" autocomplete="off">${q.post.replace(/\n/g,'<br>')}</code></div><div class="expl hidden" id="pe"><div class="expl-t">Answer</div><div id="pet"></div></div><div style="display:flex;gap:8px"><button class="check-btn" onclick="chkP()">Check</button><button class="btn-skip" onclick="pIdx++;renderPractice()">Skip</button></div></div>`;
  setTimeout(()=>{const inp=document.getElementById('bi');if(inp){inp.focus();inp.onkeydown=e=>{if(e.key==='Enter')chkP();};}},50);
}
function chkP(){
  const q=PRACTICE_Qs[pIdx];const v=document.getElementById('bi').value.trim();
  const ok=q.ans.some(a=>v.toLowerCase()===a.toLowerCase());
  const inp=document.getElementById('bi');inp.classList.add(ok?'correct':'wrong');inp.disabled=true;
  document.getElementById('pe').classList.remove('hidden');
  document.getElementById('pet').innerHTML=ok?`Correct! <code style="color:var(--accent2)">${q.ans[0]}</code>`:`Wrong. Answer: <code style="color:var(--accent2)">${q.ans[0]}</code>`;
  showToast(ok?'Correct!':'Wrong!',ok?'success':'error');S.solved++;if(ok)S.correct++;addXP(ok?8:2);updateStreak();checkBadges();save();
  setTimeout(()=>{pIdx++;renderPractice();},1400);
}

// ═══════════════════════════════════
// FLASHCARDS
// ═══════════════════════════════════
let fS={qs:[],i:0};
function initFlash(tid){fS={qs:shuffle(tid?T.find(t=>t.id===tid).qs:[...QS]),i:0};renderFlash();}
function renderFlash(){
  const q=fS.qs[fS.i];
  document.getElementById('mc').innerHTML=`<div class="lh"><button class="lh-back" onclick="go('dash')">←</button><div class="lh-title">Flashcards</div><div class="lh-count">${fS.i+1}/${fS.qs.length}</div></div>
  <div class="q-area"><div class="fc" id="fc" onclick="document.getElementById('fc').classList.toggle('flip')"><div class="fc-f">${q.q}</div><div class="fc-b">${q.e}${q.c?`<div class="expl-code">${q.c.replace(/\n/g,'<br>')}</div>`:''}</div><div class="fc-h">Tap to reveal</div></div><div class="fc-nav"><button class="fc-btn" onclick="if(fS.i>0){fS.i--;renderFlash();}">←</button><span style="color:var(--muted);font-size:12px">${fS.i+1}/${fS.qs.length}</span><button class="fc-btn" onclick="if(fS.i<fS.qs.length-1){fS.i++;renderFlash();}">→</button><button class="fc-btn" onclick="initFlash(null)" style="margin-left:6px;font-size:10px;width:auto;padding:0 10px">Shuffle</button></div></div>`;
}

// ═══════════════════════════════════
// ASK AI
// ═══════════════════════════════════
function renderAsk(){
  document.getElementById('mc').innerHTML=`<div class="lh"><button class="lh-back" onclick="go('dash')">←</button><div class="lh-title">Ask AI Anything</div></div>
  <div class="ask-wrap">
    <p style="color:var(--muted);font-size:13px;margin-bottom:12px">Ask questions, paste code, or explore concepts. Wrong statements get corrected!</p>
    <div class="ask-hints">
      <span class="ask-hint" onclick="document.getElementById('ai').value='What does len() do?'">len()</span>
      <span class="ask-hint" onclick="document.getElementById('ai').value='Explain decorators'">decorators</span>
      <span class="ask-hint" onclick="document.getElementById('ai').value='What is a generator?'">generators</span>
      <span class="ask-hint" onclick="document.getElementById('ai').value='Lists are immutable'">wrong statement</span>
      <span class="ask-hint" onclick="document.getElementById('ai').value='append returns the new list'">common mistake</span>
      <span class="ask-hint" onclick="document.getElementById('ai').value='is vs == difference'">is vs ==</span>
      <span class="ask-hint" onclick="document.getElementById('ai').value='deep copy vs shallow copy'">deep copy</span>
    </div>
    <div class="ask-input-wrap"><textarea class="ask-ta" id="ai" placeholder="Ask anything or paste code..." rows="2"></textarea><button class="ask-send" id="ab" onclick="sendQ()">➤</button></div>
    <div class="chat" id="ch"></div>
  </div>`;
  document.getElementById('ai').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendQ();}});
}
function sendQ(){
  const inp=document.getElementById('ai');if(!inp)return;const q=inp.value.trim();if(!q)return;
  const ch=document.getElementById('ch');
  ch.innerHTML+=`<div class="cmsg cuser fade-up"><div class="cavatar">?</div><div class="cbubble">${esc(q)}</div></div>`;
  inp.value='';const btn=document.getElementById('ab');btn.disabled=true;
  ch.innerHTML+=`<div class="cmsg cbot fade-up"><div class="cavatar">🤖</div><div class="cbubble dots"><span>.</span><span>.</span><span>.</span></div></div>`;
  ch.scrollTop=ch.scrollHeight;
  setTimeout(()=>{
    const last=ch.lastElementChild;last.querySelector('.cbubble').className='cbubble';
    last.querySelector('.cbubble').innerHTML=processQuestion(q);ch.scrollTop=ch.scrollHeight;
    btn.disabled=false;S.askCount++;addXP(3);checkBadges();save();
  },500+Math.random()*500);
}

// ═══════════════════════════════════
// LEADERBOARD
// ═════════════════════════════════
const BADGES=[{id:'f',i:'🌱',n:'First Step',d:'First question',c:s=>s.solved>=1},{id:'t',i:'🔟',n:'Warming Up',d:'10 questions',c:s=>s.solved>=10},{id:'h',i:'🏅',n:'Half Century',d:'50 questions',c:s=>s.solved>=50},{id:'s',i:'🔥',n:'On Fire',d:'3 day streak',c:s=>s.streak>=3},{id:'a',i:'🎯',n:'Sharpshooter',d:'80%+ accuracy',c:s=>s.solved>10&&s.correct/s.solved>=.8},{id:'e',i:'🗺️',n:'Explorer',d:'All 8 topics',c:s=>Object.keys(s.ts).length>=8},{id:'q',i:'❓',n:'Curious',d:'Ask 5',c:s=>s.askCount>=5},{id:'l',i:'👑',n:'Rising Star',d:'Level 5',c:s=>getLevel()>=5},{id:'p',i:'🧩',n:'Problem Solver',d:'Solve 5 problems',c:s=>s.solvedProblems.length>=5},{id:'m',i:'💎',n:'Master',d:'Level 10',c:s=>getLevel()>=10}];
function checkBadges(){BADGES.forEach(b=>{if(!S.badges.includes(b.id)&&b.c(S)){S.badges.push(b.id);showToast('Badge: '+b.i+' '+b.n,'success');}});}
function updateStreak(){const t=new Date().toDateString();if(S.lastDate!==t){S.streak=S.lastDate===new Date(Date.now()-864e5).toDateString()?S.streak+1:1;S.lastDate=t;}}

function renderRanks(){
  const my=S.xp;const all=[...lbP.map(p=>({...p})),{n:'You',sc:my,s:S.streak,isMe:true,ch:0}].sort((a,b)=>b.sc-a.sc);
  const el=Date.now()-lbT;const m=Math.floor(el/6e4);const s=Math.floor((el%6e4)/1e3);
  document.getElementById('mc').innerHTML=`<div style="padding:20px;max-width:600px;margin:0 auto;">
    <div class="lb-timer"><span class="spin-icon"></span>Shuffles in ${m}m ${s}s</div>
    <h2 style="margin-bottom:14px;font-size:18px">🏆 Leaderboard</h2>
    ${all.map((p,i)=>{const cc=p.ch>5?'lb-up':p.ch<-5?'lb-dn':'lb-sm';return`<div class="lb-item ${p.isMe?'lb-me':''}"><div class="lb-rank" style="color:${i===0?'var(--accent3)':i===1?'var(--muted)':i===2?'var(--accent4)':'var(--muted)'}">${i<3?['🥇','🥈','🥉'][i]:i+1}</div><div class="lb-name">${p.n}${p.isMe?' ←':''}</div><div class="lb-str">${p.s}🔥</div>${!p.isMe?`<div class="lb-chg ${cc}">${p.ch>5?'↑'+p.ch:p.ch<-5?'↓'+Math.abs(p.ch):'—'}</div>`:''}<div class="lb-sc">${p.sc}</div></div>`;}).join('')}
    <h2 style="margin:20px 0 10px;font-size:18px">🎖️ Badges (${S.badges.length}/${BADGES.length})</h2>
    <div class="badge-grid">${BADGES.map(b=>`<div class="badge-item ${S.badges.includes(b.id)?'':'locked'}"><div class="badge-icon">${b.i}</div><div class="badge-name">${b.n}</div><div class="badge-desc">${b.d}</div></div>`).join('')}</div>
  </div>`;
  setTimeout(()=>{if(cv==='ranks'){updLB();renderRanks();}},1000);
}

// ═══════════════════════════════════
// UTILS
// ═══════════════════════════════════
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+type;clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000);}

// INIT
updLB();renderDash();
</script>
